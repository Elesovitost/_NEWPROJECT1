            if (lesInsts.length > 0) {
                lesInsts.forEach(instId => {
                    const p = `bl_${instId}`;
                    let lok = [];
                    const addS = (id, lab) => {
                        let r = ctx.isActive(`${p}_p_${id}_r`), l = ctx.isActive(`${p}_p_${id}_l`);
                        if (r && l) {
                            if (id === 'mes') lok.push('v mesencephalu centrálně');
                            else if (id === 'pon') lok.push('v pontu centrálně');
                            else if (id === 'obl') lok.push('v oblongatě centrálně');
                            else lok.push(`${lab} bilat.`);
                        } else if (r) {
                            lok.push(`${lab} vpravo`);
                        } else if (l) {
                            lok.push(`${lab} vlevo`);
                        }
                    };
                    const labs = { fro:'frontálně', par:'parietálně', tem:'temporálně', occ:'okcipitálně', bg:'v BG', tal:'v talamu', moz:'v mozečku', mes:'v mesencephalu', pon:'v pontu', obl:'v oblongatě', men:'na meningách', kal:'v kalvě' };
                    Object.entries(labs).forEach(([k,v]) => addS(k, v));
                    const orR = ctx.text(`${p}_p_orb_r`), orL = ctx.text(`${p}_p_orb_l`);
                    const getOrbText = (val, side) => {
                        if (val === 'bulbus') return side === 'bilat' ? 'v obou bulbech' : (side === 'r' ? 'v pravém bulbu' : 'v levém bulbu');
                        const orbStr = side === 'bilat' ? 'v orbitách bilat.' : (side === 'r' ? 'v pravé orbitě' : 'v levé orbitě');
                        return `${orbStr} ${val === 'intra' ? 'intrakonálně' : 'extrakonálně'}`;
                    };
                    
                    if (orR !== '0' || orL !== '0') {
                        if (orR === orL) {
                            lok.push(getOrbText(orR, 'bilat'));
                        } else {
                            if (orR !== '0') lok.push(getOrbText(orR, 'r'));
                            if (orL !== '0') lok.push(getOrbText(orL, 'l'));
                        }
                    }
                    if (ctx.isActive(`${p}_p_epi`)) lok.push('v epifýze');
                    if (ctx.isActive(`${p}_p_intra`)) lok.push('intraselárně');
                    if (ctx.isActive(`${p}_p_supra`)) lok.push('supraselárně');
                    addS('para', 'paraselárně');
                    addS('latk', 'v postranní komoře');
                    if (ctx.isActive(`${p}_p_3k`)) lok.push('ve III. komoře');
                    if (ctx.isActive(`${p}_p_4k`)) lok.push('ve IV. komoře');
                    addS('mmk', 'v MMK');
                    let axSuffix = "";
                    if (ctx.isActive(`${p}_p_extra`)) axSuffix += " extraaxiálně";
                    if (ctx.isActive(`${p}_p_intra_ax`)) axSuffix += " intraaxiálně";

                    if (ctx.isActive(`${p}_p_mmk_r`) || ctx.isActive(`${p}_p_mmk_l`)) hasMmkLesion = true;
                    if (ctx.isActive(`${p}_p_supra`) || ctx.isActive(`${p}_p_para_r`) || ctx.isActive(`${p}_p_intra`) || ctx.isActive(`${p}_p_para_l`)) hasSellaLesion = true;
                    if (ctx.text(`${p}_mr_dwi`) === 'DWI +') hasDwiPlus = true;

                    let edem = ctx.text(`${p}_edem`);
                    let mshift = ctx.text(`${p}_mshift`);
                    let mshift_mm = ctx.field(`${p}_mshift_mm`);
                    let hern = ctx.text(`${p}_hern`);

                    let hasEdem = ctx.isActive(`${p}_edem`);
                    let hasMshift = ctx.isActive(`${p}_mshift`);
                    let hasHern = ctx.isActive(`${p}_hern`);

                    let d = LESIONS_DEFINITION.parseDetails(ctx, examId, 'brain', p, `${p}_met`, `${p}_e`, false);
                    
                    if (d.hasAny || lok.length > 0 || axSuffix || hasEdem || hasMshift || hasHern) {
                        let fullLok = formatCzechList(lok);
                        if (fullLok && axSuffix) fullLok += axSuffix; 
                        else if (axSuffix) fullLok = axSuffix.trim();

                        let repText = `${d.baseText} ${fullLok}${d.vzhledText}${d.metrikyStr}${d.doplneniStr}.`.replace(/\s+/g, ' ').replace(' .', '.');

                        let repSentences = [];
                        if (hasEdem) repSentences.push(`Je vyjádřen ${edem.includes('++') ? 'výraznější ' : ''}perifokální edém.`);
                        if (hasMshift) repSentences.push(`Je přítomen midline shift${mshift_mm ? ' '+mshift_mm+' mm' : ''} ${mshift.includes('doleva') ? 'doleva' : 'doprava'}.`);
                        if (hasHern) repSentences.push(`Jsou patrny známky ${hern} herniace.`);
                        if (repSentences.length > 0) repText += ` ${repSentences.join(' ')}`;

                        let cPart1 = `${d.baseText} ${fullLok}${d.actStr}${d.dynStr}`;
                        if (hasEdem) cPart1 += ` s ${edem.includes('++') ? 'výraznějším ' : ''}perifokálním edémem`;
                        let c = cPart1;
                        if (d.etioStr) c += `: ${d.etioStr}.`; else c += `.`;

                        let concSentences = [];
                        if (hasMshift || hasHern) {
                            let causes = [];
                            if (hasMshift) causes.push(`midline shift ${mshift.includes('doleva') ? 'doleva' : 'doprava'}${mshift_mm ? ' o '+mshift_mm+' mm' : ''}`);
                            if (hasHern) causes.push(`susp. ${hern === 'transtent.' ? 'transtentoriální' : hern} herniaci`);
                            concSentences.push(`Způsobuje ${causes.join(', ')}.`);
                        }
                        if (concSentences.length > 0) c += ` ${concSentences.join(' ')}`;

                        parsedLesions.push({ tableId: `brain_lesion_main__${instId}`, repText, concText: c.replace(/\s+/g, ' ').replace(' : ', ': ') });
                    }
                });
            }

            // ZPRACOVÁNÍ ISCHEMIÍ A KRVÁCENÍ (HEMO)
            if (hemoInsts.length > 0) {
                hemoInsts.forEach(instId => {
                    const p = `bh_${instId}`;
                    let lok = [];
                    const addS = (id, lab) => {
                        let r = ctx.isActive(`${p}_p_${id}_r`), l = ctx.isActive(`${p}_p_${id}_l`);
                        if (r && l) {
                            if (id === 'mes') lok.push('v mesencephalu centrálně');
                            else if (id === 'pon') lok.push('v pontu centrálně');
                            else if (id === 'obl') lok.push('v oblongatě centrálně');
                            else lok.push(`${lab} bilat.`);
                        } else if (r) {
                            lok.push(`${lab} vpravo`);
                        } else if (l) {
                            lok.push(`${lab} vlevo`);
                        }
                    };
                    const labs = { fro:'frontálně', par:'parietálně', tem:'temporálně', occ:'okcipitálně', bg:'v BG', tal:'v talamu', moz:'v mozečku', mes:'v mesencephalu', pon:'v pontu', obl:'v oblongatě' };
                    Object.entries(labs).forEach(([k,v]) => addS(k, v));

                    let spaces = [];
                    if (ctx.isActive(`${p}_sp_epi`)) spaces.push('epidurálně');
                    if (ctx.isActive(`${p}_sp_subd`)) spaces.push('subdurálně');
                    if (ctx.isActive(`${p}_sp_suba`)) spaces.push('subarachnoidálně');
                    if (ctx.isActive(`${p}_sp_iv`)) spaces.push('intraventrikulárně');
                    if (ctx.isActive(`${p}_sp_ks`)) spaces.push('kortiko-subkortikálně');
                    if (ctx.isActive(`${p}_sp_ip`)) spaces.push('intraparenchymatózně');

                    const pocetIds = [`${p}_c_soli`, `${p}_c_dve`, `${p}_c_vice`, `${p}_c_mnoho`];
                    let pocetRawId = pocetIds.find(id => ctx.isActive(id));
                    let pocetText = pocetRawId ? ButtonConfigs[`${examId}_brain_${pocetRawId}`].text : 'solitární';

                    const druhIds = [`${p}_k_lez`, `${p}_k_kol`, `${p}_k_lem`, `${p}_k_cust`];
                    let druhRawId = druhIds.find(id => ctx.isActive(id));
                    let druhRaw = 'léze';
                    if (druhRawId === `${p}_k_cust`) druhRaw = Store.customTexts[`${examId}_brain_${p}_k_cust`] || 'léze';
                    else if (druhRawId === `${p}_k_kol`) druhRaw = 'kolekce';
                    else if (druhRawId === `${p}_k_lem`) druhRaw = 'lem tekutiny';

                    let druhObj = GRAMMAR_DICT.druh[druhRaw] || { rod: 'f', plural: druhRaw };
                    let isPlural = pocetText !== 'solitární';
                    let pocetSlovo = GRAMMAR_DICT.pocet[pocetText]?.[druhObj.rod] || pocetText;
                    let druhSlovo = isPlural ? druhObj.plural : druhRaw;
                    let baseText = pocetText === 'solitární' ? cap(druhSlovo) : cap(`${pocetSlovo} ${druhSlovo}`.trim());

                    const phaseIds = ['hyp', 'ak', 'sub', 'chr'];
                    let phaseMRId = phaseIds.find(id => ctx.isActive(`${p}_mr_${id}`));
                    let phaseMR = phaseMRId ? ButtonConfigs[`${examId}_brain_${p}_mr_${phaseMRId}`].text : null;

                    let phaseCTId = phaseIds.find(id => ctx.isActive(`${p}_ct_${id}`));
                    let phaseCT = phaseCTId ? ButtonConfigs[`${examId}_brain_${p}_ct_${phaseCTId}`].text : null;

                    const etioIds = ['isc', 'ick', 'sdh', 'edh', 'sak', 'ivh'];
                    let etioId = etioIds.find(id => ctx.isActive(`${p}_e_${id}`));
                    let etio = etioId ? ButtonConfigs[`${examId}_brain_${p}_e_${etioId}`].text : null;

                    let isBleed = etio && etio !== 'ischemie';
                    let vzhledArr = [];

                    if (phaseMR) {
                        if (etio === 'ischemie') {
                            if (phaseMR === 'hyperakutní') { vzhledArr.push('s restrikcí difuze bez jasného T2/FLAIR korelátu'); hasDwiPlus = true; }
                            else if (phaseMR === 'akutní') { vzhledArr.push('s restrikcí difuze a T2/FLAIR hypersignálem'); hasDwiPlus = true; }
                            else if (phaseMR === 'subakutní') vzhledArr.push('s T2/FLAIR hypersignálem, postkontrastním sycením a pseudonormalizací ADC');
                            else if (phaseMR === 'chronické') vzhledArr.push('charakteru postmalatické pseudocysty s gliózou v okolí');
                        } else {
                            if (phaseMR === 'hyperakutní') vzhledArr.push('izo/hypersignální v T1 a hypersignální v T2');
                            else if (phaseMR === 'akutní') vzhledArr.push('izosignální v T1 a výrazně hyposignální v T2');
                            else if (phaseMR === 'subakutní') vzhledArr.push('hypersignální v T1 a T2');
                            else if (phaseMR === 'chronické') vzhledArr.push('s výrazným hyposignálním lemem v T2* obrazu - hemosiderin');
                        }
                    }
                    if (phaseCT) {
                         if (etio === 'ischemie') {
                             if (phaseCT === 'hyperakutní') vzhledArr.push('bez zřetelných hypodenzit, s event. setřením kortiko-medulární hranice');
                             else if (phaseCT === 'akutní') vzhledArr.push('s patrným edémem a hypodenzitou parenchymu');
                             else if (phaseCT === 'subakutní') vzhledArr.push('s hypodenzitou a event. sycením');
                             else if (phaseCT === 'chronické') vzhledArr.push('s postmalatickou hypodenzitou blížící se denzitě likvoru');
                         } else {
                             if (phaseCT === 'hyperakutní' || phaseCT === 'akutní') vzhledArr.push('hyperdenzní');
                             else if (phaseCT === 'subakutní') vzhledArr.push('izodenzní');
                             else if (phaseCT === 'chronické') vzhledArr.push('hypodenzní');
                         }
                    }

                    let vzhledText = vzhledArr.length > 0 ? ` (${vzhledArr.join(', v CT ')})` : '';

                    let rowNej = document.getElementById(`${p}_r7`);
                    if (rowNej) {
                        const wrapperTr = rowNej.closest('tr');
                        if (wrapperTr) wrapperTr.style.display = (pocetText === 'solitární') ? 'none' : '';
                    }

                    let metrikyStr = LESIONS_DEFINITION.parseLesionMetrics(ctx, `${p}_met`, pocetText, ctx.field(`${p}_nej_text`));
                    let doplneni = ctx.isActive(`${p}_doplneni`) ? (Store.customTexts[`${examId}_brain_${p}_doplneni`] || '') : '';
                    let doplneniStr = doplneni ? ` ${doplneni}` : '';

                    let edem = ctx.text(`${p}_edem`);
                    let mshift = ctx.text(`${p}_mshift`);
                    let mshift_mm = ctx.field(`${p}_mshift_mm`);
                    let hern = ctx.text(`${p}_hern`);
                    let hasEdem = ctx.isActive(`${p}_edem`);
                    let hasMshift = ctx.isActive(`${p}_mshift`);
                    let hasHern = ctx.isActive(`${p}_hern`);

                    let fullLok = spaces.join(' a ');
                    if (fullLok && lok.length > 0) fullLok += ` ${formatCzechList(lok)}`;
                    else if (lok.length > 0) fullLok = formatCzechList(lok);

                    if (baseText || fullLok || vzhledText || metrikyStr || doplneniStr) {
                        let repText = `${baseText} ${fullLok}${vzhledText}${metrikyStr}${doplneniStr}.`.replace(/\s+/g, ' ').replace(' .', '.');
                        let repSentences = [];
                        if (hasEdem) repSentences.push(`Je vyjádřen ${edem.includes('++') ? 'výraznější ' : ''}perifokální edém.`);
                        if (hasMshift) repSentences.push(`Je přítomen midline shift${mshift_mm ? ' '+mshift_mm+' mm' : ''} ${mshift.includes('doleva') ? 'doleva' : 'doprava'}.`);
                        if (hasHern) repSentences.push(`Jsou patrny známky ${hern} herniace.`);
                        if (repSentences.length > 0) repText += ` ${repSentences.join(' ')}`;

                        let phasePrefix = phaseMR || phaseCT || '';
                        if (phasePrefix) phasePrefix = cap(phasePrefix);
                        
                        let diag = etio === 'ischemie' ? 'Ischemie' : (etio || cap(druhSlovo));
                        if (etio === 'ICK') diag = 'Intracerebrální krvácení';
                        
                        let cDiag = phasePrefix ? `${phasePrefix} ${diag.toLowerCase()}` : diag;
                        
                        let cPart1 = `${cDiag} ${fullLok}`;
                        if (hasEdem) cPart1 += ` s ${edem.includes('++') ? 'výraznějším ' : ''}perifokálním edémem`;
                        let c = cPart1 + '.';

                        let concSentences = [];
                        if (hasMshift || hasHern) {
                            let causes = [];
                            if (hasMshift) causes.push(`midline shift ${mshift.includes('doleva') ? 'doleva' : 'doprava'}${mshift_mm ? ' o '+mshift_mm+' mm' : ''}`);
                            if (hasHern) causes.push(`susp. ${hern === 'transtent.' ? 'transtentoriální' : hern} herniaci`);
                            concSentences.push(`Způsobuje ${causes.join(', ')}.`);
                        }
                        if (concSentences.length > 0) c += ` ${concSentences.join(' ')}`;

                        parsedLesions.push({ tableId: `brain_hemo_main__${instId}`, repText, concText: c.replace(/\s+/g, ' ') });
                    }
                });
            }

            // --- 1. LÉZE ---
            if (parsedLesions.length === 0) {
                reportOut.push({ type: 'frame', text: isPET ? 'Není patrné ložisko se zvýšenou akumulací RF v mozku.' : 'Bez patologických ložiskových změn.', tableId: 'brain_lesion_main', dimmed: true });
            } else {
                parsedLesions.forEach(les => {
                    reportOut.push({ type: 'frame', text: cap(les.repText), tableId: les.tableId });
                    concMain.push({ type: 'frame', text: cap(les.concText), tableId: les.tableId });
                });
            }

            // --- 2. RESTRIKCE DIFUZE (Pouze MR) ---
            if (isMR && !hasDwiPlus) {
                reportOut.push({ type: 'frame', text: 'Bez zvýšené restrikce difuze.', tableId: 'brain_lesion_main', dimmed: true });
            }

            // --- BÍLÁ HMOTA: SVD & PVS ---
            let faz = ctx.text('br_faz');
            if (faz && faz !== '0') {
                if (faz === '1') { bilaHmotaRep.push('ojedinělá tečkovitá T2W+ FLAIR+ ložiska'); concInc.push({ type: 'frame', text: 'Mírná chronická ischemizace bílé hmoty (Fazekas 1).', tableId: 'brain_organ_main' }); }
                if (faz === '2') { bilaHmotaRep.push('mnohočetná T2W+ FLAIR+ ložiska s tendencí ke splývání'); concInc.push({ type: 'frame', text: 'Střední chronická ischemizace bílé hmoty (Fazekas 2).', tableId: 'brain_organ_main' }); }
                if (faz === '3') { bilaHmotaRep.push('rozsáhlé konfluující T2W+ FLAIR+ změny'); concInc.push({ type: 'frame', text: 'Pokročilá chronická ischemizace bílé hmoty (Fazekas 3).', tableId: 'brain_organ_main' }); }
            }

            let lak = ctx.text('br_lak');
            if (lak && lak !== '0') {
                const lMap = { 'difuzně': 'difuzně', 'BG': 'v BG', 'talamus': 'v talamu', 'kmen': 'v kmeni' };
                bilaHmotaRep.push(`vícečetné lakuny ${lMap[lak] || lak}`);
                concInc.push({ type: 'frame', text: `Postmalatické změny char. lakunárních infarktů ${lMap[lak] || lak}.`, tableId: 'brain_organ_main' });
            }

            let pvs = ctx.text('br_pvs');
            if (pvs && pvs !== '0') {
                const pMap = { 'BG': 'v BG', 'CSO': 'v centrum semiovale', 'etat': 'etat crible' };
                let pTxt = `zvýrazněné perivaskulární prostory (${pMap[pvs] || pvs})`;
                bilaHmotaRep.push(pTxt);
                concInc.push({ type: 'frame', text: cap(pTxt) + '.', tableId: 'brain_organ_main' });
            }

            let gli = ctx.text('br_gli');
            if (gli && gli !== '0') {
                let gLoc = ctx.text('br_gli_loc');
                let locStr = (gLoc && gLoc !== '0') ? ` ${gLoc}` : '';
                let gWord = gli === '+' ? 'ojedinělé' : (gli === '++' ? 'sporadické' : 'vícečetné');
                let gWordCap = gWord.charAt(0).toUpperCase() + gWord.slice(1);
                bilaHmotaRep.push(`${gWord} drobné T2W+ FLAIR+ léze v hlubší bílé hmotě${locStr}`);
                concInc.push({ type: 'frame', text: `${gWordCap} nespecifické drobné gliové léze${locStr}.`, tableId: 'brain_organ_main' });
            }

            // --- BÍLÁ HMOTA: DEMYELINIZACE ---
            const demLocs = [
                { id: 'br_dem_peri', name: 'periventrikulární' },
                { id: 'br_dem_jux', name: 'juxtakortikální' },
                { id: 'br_dem_inf', name: 'infratentoriální' },
                { id: 'br_dem_cc', name: 'v corpus callosum' }
            ];

            let demReportParts = [];
            let demConcParts = [];

            demLocs.forEach(l => {
                let val = ctx.text(l.id);
                if (val && val !== '0') {
                    let isPlural = val.includes('více');
                    let actSign = val.includes('-') ? '-' : (val.includes('+') ? '+' : '');

                    let countWord = isPlural ? 'vícečetné' : 'solitární';
                    let actRep = actSign === '-' ? ' bez sycení' : (actSign === '+' ? ' se sycením' : '');
                    let actConcAdj = actSign === '-' ? 'neaktivní ' : (actSign === '+' ? 'aktivní ' : '');

                    if (l.name === 'v corpus callosum') {
                        demReportParts.push(`${countWord} T2W+ FLAIR+ léze v corpus callosum${actRep}`);
                        demConcParts.push(`${countWord} ${actConcAdj}léze v corpus callosum`);
                    } else {
                        demReportParts.push(`${countWord} ${l.name} T2W+ FLAIR+ léze${actRep}`);
                        demConcParts.push(`${countWord} ${actConcAdj}${l.name} léze`);
                    }
                }
            });

            if (demReportParts.length > 0) {
                bilaHmotaRep.push(formatCzechList(demReportParts));
                let finalConc = cap(formatCzechList(demConcParts)) + " susp. demyelinizační etiologie.";
                concMain.push({ type: 'frame', text: finalConc, tableId: 'brain_organ_main' });
            }

            // --- 3. VÝSTUP: BÍLÁ HMOTA ---
            if (bilaHmotaRep.length === 0) {
                reportOut.push({ type: 'frame', text: 'Bez lézí v bílé hmotě.', tableId: 'brain_organ_main', dimmed: true });
            } else {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(bilaHmotaRep)) + '.', tableId: 'brain_organ_main' });
            }

            // --- ATROFIE A KORTEX ---
            let gca = ctx.text('br_gca');
            if (gca && gca !== '0') {
                if (gca === '1') { atrofieSaRep.push('mírné rozšíření kortikálních sulků'); concInc.push({ type: 'frame', text: 'Mírná globální kortikální atrofie (GCA 1).', tableId: 'brain_organ_main' }); }
                if (gca === '2') { atrofieSaRep.push('difuzní atrofie gyrů s rozšířením sulků'); concMain.push({ type: 'frame', text: 'Středně pokročilá globální kortikální atrofie (GCA 2).', tableId: 'brain_organ_main' }); }
                if (gca === '3') { atrofieSaRep.push('výrazná difuzní kortikální atrofie ("knife-blade")'); concMain.push({ type: 'frame', text: 'Pokročilá globální kortikální atrofie (GCA 3).', tableId: 'brain_organ_main' }); }
            }

            let mta = ctx.text('br_mta');
            if (mta && mta !== '0') {
                if (mta === '1') { atrofieSaRep.push('mírné rozšíření choroidálních fisur'); concInc.push({ type: 'frame', text: 'Mírná mediotemporální atrofie (MTA 1).', tableId: 'brain_organ_main' }); }
                if (mta === '2') { atrofieSaRep.push('rozšíření temporálních rohů postranních komor a choroidálních fisur'); concMain.push({ type: 'frame', text: 'Střední mediotemporální atrofie (MTA 2).', tableId: 'brain_organ_main' }); }
                if (mta === '3') { atrofieSaRep.push('výrazný úbytek objemu hipokampů'); concMain.push({ type: 'frame', text: 'Pokročilá mediotemporální atrofie (MTA 3).', tableId: 'brain_organ_main' }); }
                if (mta === '4') { atrofieSaRep.push('těžká atrofie hipokampů s rozsáhlou dilatací temporálních rohů'); concMain.push({ type: 'frame', text: 'Těžká mediotemporální atrofie (MTA 4).', tableId: 'brain_organ_main' }); }
            }

            let koedam = ctx.text('br_koedam');
            if (koedam && koedam !== '0') {
                if (koedam === '1') { atrofieSaRep.push('mírné rozšíření parietálních sulků'); concInc.push({ type: 'frame', text: 'Mírná parietální atrofie (Koedam 1).', tableId: 'brain_organ_main' }); }
                if (koedam === '2') { atrofieSaRep.push('zřetelná atrofie parietálního kortexu a precuneu'); concMain.push({ type: 'frame', text: 'Střední parietální atrofie (Koedam 2).', tableId: 'brain_organ_main' }); }
                if (koedam === '3') { atrofieSaRep.push('výrazná atrofie parietálních laloků'); concMain.push({ type: 'frame', text: 'Výrazná parietální atrofie (Koedam 3).', tableId: 'brain_organ_main' }); }
            }

            let saProstory = ctx.text('br_sa_prostory');
            if (saProstory && saProstory !== '0' && saProstory !== 'přiměřené') {
                if (saProstory === 'zúžené') {
                    atrofieSaRep.push('zúžené SA prostory');
                    concInc.push({ type: 'frame', text: 'Zúžení zevních likvorových prostorů.', tableId: 'brain_organ_main' });
                }
                else if (saProstory === 'vymizelé') {
                    atrofieSaRep.push('vymizelé SA prostory');
                    concMain.push({ type: 'frame', text: 'Vymizení SA prostorů (v.s. při edému mozku).', tableId: 'brain_organ_main' });
                }
                else if (saProstory === 'rozšířené') {
                    atrofieSaRep.push('rozšířené SA prostory');
                }
            }

            // --- 4. VÝSTUP: SA PROSTORY A ATROFIE ---
            if (atrofieSaRep.length === 0) {
                reportOut.push({ type: 'frame', text: 'Subarachnoidální prostory oboustranně šířkou přiměřené k věku.', tableId: 'brain_organ_main', dimmed: true });
            } else {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(atrofieSaRep)) + '.', tableId: 'brain_organ_main' });
            }

            // --- LIKVOR A KOMORY ---
            let komSire = ctx.text('br_kom_sire');
            if (komSire && komSire !== '0' && komSire !== 'štíhlé') {
                if (komSire === 'asym.') komoryRep.push('asymetrie postranních komor');
                else if (komSire === '+') {
                    komoryRep.push('mírná dilatace komorového systému');
                    concInc.push({ type: 'frame', text: 'Mírná dilatace komorového systému.', tableId: 'brain_organ_main' });
                }
                else if (komSire === '++') {
                    komoryRep.push('výraznější dilatace komorového systému');
                    concMain.push({ type: 'frame', text: 'Dilatace komorového systému ex vacuo.', tableId: 'brain_organ_main' });
                }
            }

            let hydro = ctx.text('br_hydro');
            if (hydro && hydro !== '0') {
                if (hydro === 'e vacuo') {
                    komoryRep.push('rozšíření komor a SA prostorů úměrné úbytku parenchymu');
                    concInc.push({ type: 'frame', text: 'Hydrocefalus ex vacuo v rámci atrofie.', tableId: 'brain_organ_main' });
                } else if (hydro === 'NPH') {
                    komoryRep.push('disproporční dilatace komorového systému, zúžení SA prostorů na konvexitě a rozšíření Sylvijských rýh (obraz DESH)');
                    concMain.push({ type: 'frame', text: 'Obraz suspektní z normotenzního hydrocefalu (NPH).', tableId: 'brain_organ_main' });
                } else if (hydro === 'obstrukční') {
                    komoryRep.push('balónovitá dilatace komor orálně od suspektní překážky s transependymálním prosáknutím a zúžením zevních SA prostorů');
                    concMain.push({ type: 'frame', text: 'Obstrukční hydrocefalus.', tableId: 'brain_organ_main' });
                } else if (hydro === 'komunikující') {
                    komoryRep.push('symetrická dilatace komorového systému s volnou komunikací do zevních SA prostorů bez zjevné překážky');
                    concMain.push({ type: 'frame', text: 'Komunikující hydrocefalus.', tableId: 'brain_organ_main' });
                }
            }

            // --- 5. VÝSTUP: KOMOROVÝ SYSTÉM ---
            if (komoryRep.length === 0) {
                reportOut.push({ type: 'frame', text: 'Komorový systém obvyklé konfigurace, nedilatován.', tableId: 'brain_organ_main', dimmed: true });
            } else {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(komoryRep)) + '.', tableId: 'brain_organ_main' });
            }

            // --- MOSTOMOZEČKOVÝ KOUT (CPA) ---
            const cpaSides = ['r', 'l'];
            cpaSides.forEach(side => {
                const sSuffix = side === 'r' ? 'vpravo' : 'vlevo';
                const sLat = side === 'r' ? 'l.dx.' : 'l.sin.';
                
                let exp = ctx.text(`br_cpa_exp_${side}`);
                if (exp && exp !== '0') {
                    if (exp === 'schwanom') {
                        cpaRep.push(`drobná ložisková expanze ve vchodu do vnitřního zvukovodu ${sSuffix}`);
                        concMain.push({ type: 'frame', text: `Drobné ložisko ve vchodu do vnitřního zvukovodu ${sSuffix} charakteru vestibulárního schwanomu.`, tableId: 'brain_organ_main' });
                    } else if (exp === 'meningeom') {
                        cpaRep.push(`drobná ložisková expanze nasedající na zadní plochu pyramidy ${sSuffix}`);
                        concMain.push({ type: 'frame', text: `Drobné ložisko nasedající na zadní plochu pyramidy ${sSuffix} charakteru meningeomu.`, tableId: 'brain_organ_main' });
                    } else if (exp === 'cysta') {
                        cpaRep.push(`drobná arachnoideální cysta v MMK ${sSuffix}`);
                        concInc.push({ type: 'frame', text: `Drobná arachnoideální cysta v MMK ${sLat}.`, tableId: 'brain_organ_main' });
                    }
                }

                // NV Konflikt
                let kon = ctx.text(`br_cpa_kon_${side}`);
                if (kon && kon !== '0') {
                    const konMap = { 'I': 'kontakt cévy s nervem (Grade I)', 'II': 'dislokace nervu cévní kličkou (Grade II)', 'III': 'imprese nervu cévní kličkou (Grade III)' };
                    cpaRep.push(`${konMap[kon]} v CPA ${sSuffix}`);
                    if (kon === 'I') {
                        concInc.push({ type: 'frame', text: `Neurovaskulární kontakt v CPA ${sLat} bez známek imprese.`, tableId: 'brain_organ_main' });
                    } else {
                        concMain.push({ type: 'frame', text: `Neurovaskulární konflikt v CPA ${sLat} s ${kon === 'II' ? 'dislokací' : 'impresí'} nervu.`, tableId: 'brain_organ_main' });
                    }
                }
            });

            // --- 6. VÝSTUP: MMK A ZVUKOVODY ---
            if (cpaRep.length === 0 && !hasMmkLesion) {
                reportOut.push({ type: 'frame', text: 'Struktury v MMK a vnitřních zvukovodech bez patrné patologie.', tableId: 'brain_organ_main', dimmed: true });
            } else if (cpaRep.length > 0) {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(cpaRep)) + '.', tableId: 'brain_organ_main' });
            }

            // --- SELLA A EPIFÝZA ---
            let sella = ctx.text('br_sella');
            if (sella && sella !== '0') {
                if (sella === 'cysta') {
                    sellaRep.push('drobná cysta v sella turcica v pars intermedia');
                    concInc.push({ type: 'frame', text: 'Intrasellárně drobná cysta rathkeho výchlipky.', tableId: 'brain_organ_main' });
                } else {
                    const sellaMap = { 'partial': 'parciálně prázdná sella', 'empty': 'obraz empty sella' };
                    sellaRep.push(sellaMap[sella]);
                    concInc.push({ type: 'frame', text: `${cap(sellaMap[sella])}.`, tableId: 'brain_organ_main' });
                }
            }

            // --- 7. VÝSTUP: HYPOFÝZA A SELLA ---
            if (sellaRep.length === 0 && !hasSellaLesion) {
                 reportOut.push({ type: 'frame', text: 'Nezvětšená hypofýza uložena v nerozšířeném tureckém sedle.', tableId: 'brain_organ_main', dimmed: true });
            } else if (sellaRep.length > 0) {
                 reportOut.push({ type: 'frame', text: cap(formatCzechList(sellaRep)) + '.', tableId: 'brain_organ_main' });
            }

            let epiRaw = ctx.text('br_epi');
            if (epiRaw && epiRaw !== '0') {
                let size = ctx.field('br_epi_mm');
                let sizeStr = size ? ` vel. ${size} mm` : '';
                if (epiRaw.toLowerCase().includes('cysta')) {
                    epiRep.push(`drobná cysta epifýzy bez abnormit${sizeStr}`);
                    concInc.push({ type: 'frame', text: `Drobná epifyzární cysta${sizeStr}.`, tableId: 'brain_organ_main' });
                } else {
                    epiRep.push(`ložisko epifýzy${sizeStr}`);
                    concInc.push({ type: 'frame', text: `Ložisková léze epifýzy${sizeStr}.`, tableId: 'brain_organ_main' });
                }
            }
            if (epiRep.length > 0) {
                 reportOut.push({ type: 'frame', text: cap(formatCzechList(epiRep)) + '.', tableId: 'brain_organ_main' });
            }

            // --- VLASTNÍ POPIS ---
            let brDesc = ctx.field('br_custom_desc');
            if (brDesc) {
                reportOut.push({ type: 'frame', text: cap(brDesc), tableId: 'brain_organ_main' });
            }

            let brConc = ctx.field('br_custom_conc');
            if (brConc) concInc.push({ type: 'frame', text: brConc, tableId: 'brain_organ_main' });

            // --- WILLISŮV OKRUH A ARTERIE ---
            let vesPat = ctx.text('br_ves_pat');
            if (vesPat && vesPat !== '0') {
                let actVes = [];
                // Nepárové cévy
                if (ctx.isActive('br_ves_acoa')) actVes.push('ACoA');
                if (ctx.isActive('br_ves_ba')) actVes.push('BA');

                // Párové cévy
                const pairedVes = ['aca', 'ica', 'mca', 'acop', 'pca', 'pica', 'va'];
                pairedVes.forEach(v => {
                    let isR = ctx.isActive(`br_ves_${v}_r`);
                    let isL = ctx.isActive(`br_ves_${v}_l`);
                    let r = ctx.text(`br_ves_${v}_r`);
                    let l = ctx.text(`br_ves_${v}_l`);
                    
                    if (isR && isL) {
                        if (r === l) actVes.push(`${r} bilat.`);
                        else actVes.push(`${r} vpravo a ${l} vlevo`);
                    } else if (isR) {
                        actVes.push(`${r} vpravo`);
                    } else if (isL) {
                        actVes.push(`${l} vlevo`);
                    }
                });

                if (actVes.length > 0) {
                    let vStr = actVes.join(' a ');
                    if (actVes.length > 1) vStr = `na rozhraní ${vStr}`;
                    
                    let repText = `${vesPat} ${vStr}`;
                    let vesCust = ctx.field('br_ves_custom_desc');
                    let fullRep = vesCust ? `${repText}, ${vesCust}` : repText;

                    vesRep.push(fullRep);
                    
                    if (['aneurysma', 'stenóza', 'uzávěr'].includes(vesPat)) {
                        concMain.push({ type: 'frame', text: `${cap(repText)}.`, tableId: 'brain_vessels_main' });
                    } else {
                        concInc.push({ type: 'frame', text: `${cap(repText)}.`, tableId: 'brain_vessels_main' });
                    }
                }
            }

            let vesDescOnly = ctx.field('br_ves_custom_desc');
            if (vesDescOnly && (vesPat === '0' || !vesPat)) {
                vesRep.push(vesDescOnly);
            }

            // VÝSTUP: CÉVY (Bez prefixu)
            if (vesRep.length > 0) {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(vesRep)) + '.', tableId: 'brain_vessels_main' });
            }

            let vesConc = ctx.field('br_ves_custom_conc');
            if (vesConc) concInc.push({ type: 'frame', text: vesConc, tableId: 'brain_vessels_main' });

            // --- ORBITY ---
            const checkOrbSide = (baseId) => {
                let r = ctx.isActive(`${baseId}_r`), l = ctx.isActive(`${baseId}_l`);
                if (!r && !l) return null;
                return r && l ? 'bilat.' : (r ? 'vpravo' : 'vlevo');
            };

            let orbItems = [
                { id: 'br_orb_exo', rep: 'exoftalmus {s}', conc: 'Exoftalmus {s}', type: 'inc' },
                { id: 'br_orb_pht', rep: 'phthisis bulbi {s}', conc: 'Phthisis bulbi {s}', type: 'inc' },
                { id: 'br_orb_iol', rep: 'stav po implantaci nitrooční čočky (IOL) {s}', type: null },
                { id: 'br_orb_amo', rep: 'známky odchlípení sítnice {s}', conc: 'Amotio retinae {s}', type: 'main' },
                { id: 'br_orb_no_ztl', rep: 'ztluštění nervus opticus {s}', conc: 'Ztluštění zrakového nervu {s}', type: 'inc' },
                { id: 'br_orb_no_atr', rep: 'atrofie nervus opticus {s}', conc: 'Atrofie zrakového nervu {s}', type: 'inc' },
                { id: 'br_orb_sval', rep: 'ztluštění okohybných svalů {s}', conc: 'Myopatie okohybných svalů {s} (např. v rámci endokrinní orbitopatie)', type: 'inc' },
                { id: 'br_orb_slz_zvet', rep: 'zvětšení slzné žlázy {s}', conc: 'Dakryoadenomegalie {s}', type: 'inc' },
                { id: 'br_orb_slz_res', rep: 'stav po resekci slzné žlázy {s}', type: null }
            ];

            let orbRep = [];
            orbItems.forEach(item => {
                let s = checkOrbSide(item.id);
                if (s) {
                    orbRep.push(item.rep.replace('{s}', s));
                    if (item.type === 'main') concMain.push({ type: 'frame', text: item.conc.replace('{s}', s) + '.', tableId: 'brain_orbits_main' });
                    else if (item.type === 'inc') concInc.push({ type: 'frame', text: item.conc.replace('{s}', s) + '.', tableId: 'brain_orbits_main' });
                }
            });

            let orbDesc = ctx.field('br_orb_custom_desc');
            if (orbDesc) orbRep.push(orbDesc);

            // --- 8. VÝSTUP: ORBITY ---
            if (orbRep.length === 0) {
                reportOut.push({ type: 'frame', text: 'Orbity bez patologie.', tableId: 'brain_orbits_main', dimmed: true });
            } else {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(orbRep)) + '.', tableId: 'brain_orbits_main' });
            }

            // --- SINY (Vedlejší nosní dutiny) ---
            let sinyStates = ctx.mapStates({
                separator: ', ',
                items: [
                    { id: 'sinus_front_r', 1: 'cysta/polyp ve frontálním sinu vpravo', 2: 'hyperplázie sliznic ve frontálním sinu vpravo', 3: 'výrazná hyperplázie sliznic ve frontálním sinu vpravo', 4: 'tekutina ve frontálním sinu vpravo' },
                    { id: 'sinus_front_l', 1: 'cysta/polyp ve frontálním sinu vlevo', 2: 'hyperplázie sliznic ve frontálním sinu vlevo', 3: 'výrazná hyperplázie sliznic ve frontálním sinu vlevo', 4: 'tekutina ve frontálním sinu vlevo' },
                    { id: 'sinus_ethmo_r', 1: 'cysta/polyp v ethmoidálním sinu vpravo', 2: 'hyperplázie sliznic v ethmoidálním sinu vpravo', 3: 'výrazná hyperplázie sliznic v ethmoidálním sinu vpravo', 4: 'tekutina v ethmoidálním sinu vpravo' },
                    { id: 'sinus_ethmo_l', 1: 'cysta/polyp v ethmoidálním sinu vlevo', 2: 'hyperplázie sliznic v ethmoidálním sinu vlevo', 3: 'výrazná hyperplázie sliznic v ethmoidálním sinu vlevo', 4: 'tekutina v ethmoidálním sinu vlevo' },
                    { id: 'sinus_sfeno_r', 1: 'cysta/polyp ve sfenoidálním sinu vpravo', 2: 'hyperplázie sliznic ve sfenoidálním sinu vpravo', 3: 'výrazná hyperplázie sliznic ve sfenoidálním sinu vpravo', 4: 'tekutina ve sfenoidálním sinu vpravo' },
                    { id: 'sinus_sfeno_l', 1: 'cysta/polyp ve sfenoidálním sinu vlevo', 2: 'hyperplázie sliznic ve sfenoidálním sinu vlevo', 3: 'výrazná hyperplázie sliznic ve sfenoidálním sinu vlevo', 4: 'tekutina ve sfenoidálním sinu vlevo' },
                    { id: 'sinus_maxil_r', 1: 'cysta/polyp v maxilárním sinu vpravo', 2: 'hyperplázie sliznic v maxilárním sinu vpravo', 3: 'výrazná hyperplázie sliznic v maxilárním sinu vpravo', 4: 'tekutina v maxilárním sinu vpravo' },
                    { id: 'sinus_maxil_l', 1: 'cysta/polyp v maxilárním sinu vlevo', 2: 'hyperplázie sliznic v maxilárním sinu vlevo', 3: 'výrazná hyperplázie sliznic v maxilárním sinu vlevo', 4: 'tekutina v maxilárním sinu vlevo' }
                ]
            });
            let sinyCustomDesc = ctx.field('sinus_custom_desc');
            let sinyParts = [];
            if (sinyStates) sinyParts.push(sinyStates);
            if (sinyCustomDesc) sinyParts.push(sinyCustomDesc);
            
            // --- 10. VÝSTUP: SINY ---
            if (sinyParts.length === 0) {
                reportOut.push({ type: 'frame', text: 'Dutiny vzdušné.', tableId: 'brain_sinus_main', dimmed: true });
            } else {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(sinyParts)) + '.', tableId: 'brain_sinus_main' });
            }

            const sinusItems = [
                { id: 'sinus_front_r', text: 've frontálním sinu vpravo' },
                { id: 'sinus_front_l', text: 've frontálním sinu vlevo' },
                { id: 'sinus_ethmo_r', text: 'v ethmoidálním sinu vpravo' },
                { id: 'sinus_ethmo_l', text: 'v ethmoidálním sinu vlevo' },
                { id: 'sinus_sfeno_r', text: 've sfenoidálním sinu vpravo' },
                { id: 'sinus_sfeno_l', text: 've sfenoidálním sinu vlevo' },
                { id: 'sinus_maxil_r', text: 'v maxilárním sinu vpravo' },
                { id: 'sinus_maxil_l', text: 'v maxilárním sinu vlevo' }
            ];
            
            let sinyConcStr = ctx.mapConditions([
                { states: [3], prefix: 'Chronická sinusitis (', suffix: ').', separator: ', ', items: sinusItems },
                { states: [4], prefix: 'Akutní sinusitis (', suffix: ').', separator: ', ', items: sinusItems }
            ]).trim();
            let customSinusConc = ctx.field('sinus_custom_conc');
            if (sinyConcStr || customSinusConc) {
                let s = [sinyConcStr, customSinusConc].filter(Boolean).join('\n');
                concInc.push({ type: 'frame', text: s, tableId: 'brain_sinus_main' });
            }

            // --- UŠI A MASTOIDY ---
            let uchoRep = [];
            const earItems = [
                { id: 'ucho_stred', loc: 'středouší' },
                { id: 'ucho_mast', loc: 'mastoidy' }
            ];

            earItems.forEach(item => {
                let r = ctx.text(`${item.id}_r`), l = ctx.text(`${item.id}_l`);
                if ((!r || r === '0') && (!l || l === '0')) return;

                const makeEarText = (state, side) => {
                    let textR = '', textC = '', typeC = 'incidental';
                    const sideL = side === 'vpravo' ? 'l.dx.' : (side === 'vlevo' ? 'l.sin.' : 'bilat.');
                    
                    if (item.loc === 'středouší') {
                        if (state === 'tekutina') { textR = `tekutina ve středoušní dutině ${side}`; textC = `Fluidotympanum ${sideL}.`; }
                        else if (state === 'zastření') { textR = `zastření středoušní dutiny ${side}`; textC = `Zánětlivé změny středouší ${sideL}.`; }
                        else if (state === 'sklerotizace') { textR = `chronické sklerotické změny středouší ${side}`; textC = `Chronické změny středouší ${sideL}.`; }
                        else if (state === 'defekt') { textR = `stav po operaci středouší ${side}`; textC = ``; typeC = null; }
                    } else if (item.loc === 'mastoidy') {
                        if (state === 'tekutina') { textR = `tekutina v mastoidálních sklípcích ${side}`; textC = `Fluidomastoid ${sideL}.`; }
                        else if (state === 'zastření') { textR = `snížená vzdušnost až zastření mastoidálních sklípků ${side}`; textC = `Mastoiditis ${sideL}.`; typeC = 'main'; }
                        else if (state === 'sklerotizace') { textR = `sklerotizace mastoidálních sklípků ${side}`; textC = `Chronická mastoiditis ${sideL}.`; }
                        else if (state === 'defekt') { textR = `stav po mastoidektomii ${side}`; textC = ``; typeC = null; }
                    }
                    return { textR, textC, typeC };
                };

                if (r === l && r !== '0') {
                    const t = makeEarText(r, 'bilat.');
                    uchoRep.push(t.textR);
                    if (t.typeC === 'main') concMain.push({ type: 'frame', text: t.textC, tableId: 'brain_sinus_main' });
                    else if (t.typeC === 'incidental') concInc.push({ type: 'frame', text: t.textC, tableId: 'brain_sinus_main' });
                } else {
                    if (r && r !== '0') {
                        const t = makeEarText(r, 'vpravo');
                        uchoRep.push(t.textR);
                        if (t.typeC === 'main') concMain.push({ type: 'frame', text: t.textC, tableId: 'brain_sinus_main' });
                        else if (t.typeC === 'incidental') concInc.push({ type: 'frame', text: t.textC, tableId: 'brain_sinus_main' });
                    }
                    if (l && l !== '0') {
                        const t = makeEarText(l, 'vlevo');
                        uchoRep.push(t.textR);
                        if (t.typeC === 'main') concMain.push({ type: 'frame', text: t.textC, tableId: 'brain_sinus_main' });
                        else if (t.typeC === 'incidental') concInc.push({ type: 'frame', text: t.textC, tableId: 'brain_sinus_main' });
                    }
                }
            });

            // --- 9. VÝSTUP: UŠI A MASTOIDY ---
            if (uchoRep.length === 0) {
                reportOut.push({ type: 'frame', text: 'Mastoideální sklípky vzdušné.', tableId: 'brain_sinus_main', dimmed: true });
            } else {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(uchoRep)) + '.', tableId: 'brain_sinus_main' });
            }

            return { report: reportOut, conclusion: { main: concMain, incidental: concInc } };
        }
    },

    neck: RegionNeck,

    thorax: RegionThorax,
    
    abdomen: RegionAbdomen,

    skeleton: RegionSkeleton,

    knee: RegionKnee,

    ls_spine: {
        title: 'L bederní páteř',
        reportLayout: 'block',
        layout: (helpers) => {
            return [];
        },
        compile: (ctx) => {
            return { report: [], conclusion: { main: [], incidental: [] } };
        }
    }

}; // <-- Tohle už je uzavření celého REGIONS objektu

/* ═══════════════════════════════════════════════
   DOM HELPERS
═══════════════════════════════════════════════ */
function createImageViewer(viewerKey) {
    const cfg = SLICE_VIEWERS[viewerKey];
    if (!cfg) return null;

    return el('div', { className: 'slice-viewer' }, [
        el('div', { className: 'sub-table-title', textContent: cfg.title }),
        el('img', { 
            id: 'slice-image', 
            src: `${cfg.folder}/${cfg.prefix}-${String(Store.activeSlice).padStart(2, '0')}.${cfg.ext}`, 
            draggable: false,
            style: `width: ${cfg.width || '450px'};`
        }),
        el('div', { className: 'slice-hint', textContent: 'Kolečko myši / Táhnout' })
    ]);
}

function el(tag, attrs = {}, children = []) {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
        if (k === 'className') node.className = v;
        else if (k.startsWith('data-')) node.setAttribute(k, v);
        else node[k] = v;
    }
    for (const child of children)
        node.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
    return node;
}

   CONTEXT HELPER FOR REPORTS
═══════════════════════════════════════════════ */

function createContext(regionId, examId) {
    const isPET = examId.includes('pet');
    const isPetOnly = (id) => !isPET && (id.includes('_suv') || id.includes('_act') || id.includes('_akt') || id.includes('_neakt') || id.includes('_fok') || id.includes('_poly') || id.includes('ji_aktdist') || id.includes('ji_aktdif'));
    return {
        examId,
        _val(localId) {
            if (isPetOnly(localId)) return 0;
            return Store.buttonStates[`${examId}_${regionId}_${localId}`];
        },
        isActive(localId, statesArray = null) {
            if (isPetOnly(localId)) return false;
            const globalId = `${examId}_${regionId}_${localId}`;
            const val = this._val(localId);
            const cfg = ButtonConfigs[globalId];
            if (!cfg) return false;
            
            if (cfg.type === 'standard') {
                if (statesArray) return statesArray.includes(val || 0);
                return (val || 0) > 0;
            }
            return val === true || val === 'custom';
        },
        text(localId, lowercase = false) {
            if (isPetOnly(localId)) return '';
            const globalId = `${examId}_${regionId}_${localId}`;
            const val = Store.buttonStates[globalId] || 0;
            const cfg = ButtonConfigs[globalId];
            if (!cfg) return '';
            
            let txt = '';
            if (cfg.type === 'standard') {
                const stateNameRaw = cfg.states[val];
                if (stateNameRaw === 'custom') {
                    txt = Store.customTexts[globalId] || '[Nevyplněno]';
                } else {
                    const fieldMatch = stateNameRaw.match(/^(.*?)\s*\[field:([^:]+):([^:\]]+)(?::([^\]]+))?\]$/);
                    if (fieldMatch) {
                        const baseName = fieldMatch[1].trim();
                        const fieldGlobalId = `${globalId}_${fieldMatch[3].trim()}`;
                        const fieldVal = Store.fields[fieldGlobalId] || '[Nevyplněno]';
                        txt = `${baseName} ${fieldVal}`;
                    } else {
                        txt = stateNameRaw;
                    }
                }
            } else if (cfg.type === 'basic') {
                if (val === 'custom') txt = Store.customTexts[globalId] || '[Nevyplněno]';
                else if (val === true) txt = cfg.text;
                else txt = 'Negativní';
            } else if (cfg.type === 'basic_custom') {
                txt = val ? (Store.customTexts[globalId] || '[Nevyplněno]') : 'Negativní';
            }
            
            return lowercase ? txt.toLowerCase() : txt;
        },
        field(fieldId) {
            if (isPetOnly(fieldId)) return '';
            return Store.fields[`${examId}_${regionId}_${fieldId}`] || '';
        },
        getDynamics(sizeId, sizeOldId, suvId, suvOldId) {
            if (!Store.pastDate) return "";

            const currSize = this.field(sizeId);
            const minSize = this.field(sizeOldId);
            const currSuv = this.field(suvId);
            const minSuv = this.field(suvOldId);
            
            const cLiv = parseFloat((Store.fields['suv_jater'] || '3.0').replace(',', '.'));
            const mLiv = parseFloat((Store.fields['suv_jater_minule'] || '3.0').replace(',', '.'));

            return MetricsEngine.calculateDynamics(currSize, minSize, currSuv, minSuv, cLiv, mLiv, Store.recist);
        },
        mapStates(config) {
            const found = [];
            for (const item of config.items) {
                const globalId = `${examId}_${regionId}_${item.id}`;
                const val = Store.buttonStates[globalId] || 0;
                
                if (val > 0 && item[val]) {
                    found.push(item[val]);
                } else if (val === 'custom' || (val > 0 && ButtonConfigs[globalId]?.states[val] === 'custom')) {
                    const customTxt = Store.customTexts[globalId];
                    if (customTxt) found.push(customTxt);
                }
            }
            if (found.length === 0) return '';
            const merged = formatCzechList(found);
            return (config.prefix || '') + merged + (config.suffix || '');
        },
        mapConditions(rules) {
            let result = "";
            for (const rule of rules) {
                const matched = [];
                for (const item of rule.items) {
                    if (this.isActive(item.id, rule.states)) matched.push(item.text);
                }
                if (matched.length > 0) {
                    result += `${rule.prefix || ''}${matched.join(rule.separator || ', ')}${rule.suffix || ''}\n`;
                }
            }
            return result;
        }
    };
}

/* ═══════════════════════════════════════════════
   METRICS HELPER
═══════════════════════════════════════════════ */
const MetricsEngine = {
    getSuvText: function(suvStr) {
        if (!APP_SETTINGS.suvWord) return `se SUVmax = ${suvStr}`;
        const suv = parseFloat(String(suvStr).replace(',', '.'));
        if (isNaN(suv)) return `se SUVmax = ${suvStr}`;
        
        const refLiv = parseFloat((Store.fields['suv_jater'] || '3.0').replace(',', '.'));
        const refPar = parseFloat((Store.fields['suv_parotid'] || '20.0').replace(',', '.'));
        const refSle = parseFloat((Store.fields['suv_sleziny'] || '15.0').replace(',', '.'));
        const exam = (Store.activeTab || '').toLowerCase();
        
        if (exam.includes('psma')) {
            const pctLiv = suv / refLiv;
            if (pctLiv <= 0.1) return "bez patrné akumulace RF";
            if (pctLiv <= 0.3) return "s akumulací RF pod úrovní ref. poolu";
            if (pctLiv <= 1.0) return "s akumulací RF pod úrovní ref. jater";
            if (suv < refPar) return "s akumulací RF nad úrovní ref. jater";
            return "s akumulací RF nad úrovní ref. parotid";
        } else if (exam.includes('dotatoc')) {
            const pctLiv = suv / refLiv;
            if (pctLiv <= 0.1) return "bez patrné akumulace RF";
            if (pctLiv < 0.9) return "s akumulací RF pod úrovní ref. jater";
            if (pctLiv <= 1.1) return "s akumulací RF na úrovni ref. jater";
            if (suv < refSle) return "s akumulací RF nad úrovní ref. jater";
            return "s akumulací RF nad úrovní ref. sleziny";
        } else {
            const pctLiv = suv / refLiv;
            if (pctLiv <= 0.2) return "bez patrné akumulace RF";
            if (pctLiv < 0.8) {
                const diff = Math.round((1 - pctLiv) * 10) * 10;
                return `s akumulací RF o ${diff} % nižší než ref. játra`;
            }
            if (pctLiv <= 1.2) return "s akumulací RF obdobnou jako ref. játra";
            if (pctLiv < 1.9) {
                const diff = Math.round((pctLiv - 1) * 10) * 10;
                return `s akumulací RF o ${diff} % vyšší než ref. játra`;
            }
            return `s akumulací  ${Math.round(pctLiv)}x vyšší než játra`;
        }
    },

    getAutoActivityLevel: function(suvVal, refLiv, refPar, refSle, examId) {
        if (isNaN(suvVal) || suvVal < 0) return 0;
        const exam = examId.toLowerCase();
        if (exam.includes('psma')) {
            if (isNaN(refLiv) || refLiv <= 0) return 0;
            const par = (!isNaN(refPar) && refPar > 0) ? refPar : refLiv * 3;
            if (suvVal <= refLiv * 0.1) return 1;
            if (suvVal < refLiv * 0.3) return 2;
            if (suvVal <= refLiv) return 3;
            if (suvVal < par) return 4;
            return 5;
        }
        if (exam.includes('dotatoc')) {
            if (isNaN(refLiv) || refLiv <= 0) return 0;
            const sle = (!isNaN(refSle) && refSle > 0) ? refSle : refLiv * 5;
            if (suvVal <= refLiv * 0.1) return 1;
            if (suvVal < refLiv * 0.9) return 2;
            if (suvVal <= refLiv * 1.1) return 3;
            if (suvVal < sle) return 4;
            return 5;
        }
        if (exam.includes('dopa')) {
            return 0;
        }
        if (isNaN(refLiv) || refLiv <= 0) return 0;
        const r = suvVal / refLiv;
        if (r < 0.2) return 1; 
        if (r < 0.8) return 2; 
        if (r <= 1.2) return 3; 
        if (r <= 1.5) return 4; 
        return 5; 
    },

    updateActivityForField: function(fieldId, newValue) {
        if (fieldId === 'suv_jater_minule' || fieldId.endsWith('_suv_old')) return;

        const refFields = ['suv_jater', ...Object.values(RADIOFARM_CONFIG).flatMap(cfg => Object.keys(cfg.defaults))];

        if (refFields.includes(fieldId)) {
            for (const key in Store.fields) {
                if (key.endsWith('_suv') && !key.endsWith('_suv_old') && !refFields.includes(key)) {
                    this.updateSingleActivity(key, Store.fields[key]);
                }
            }
        } else if (fieldId.endsWith('_suv')) {
            this.updateSingleActivity(fieldId, newValue);
        }
    },

    updateSingleActivity: function(suvFieldId, suvValue) {
        const actFieldId = suvFieldId.replace('_suv', '_act');
        if (!ButtonConfigs[actFieldId]) return;
        const suvVal = parseFloat(String(suvValue || '').replace(',', '.'));
        const refLiv = parseFloat((Store.fields['suv_jater'] || '3.0').replace(',', '.'));
        const refPar = parseFloat((Store.fields['suv_parotid'] || '20.0').replace(',', '.'));
        const refSle = parseFloat((Store.fields['suv_sleziny'] || '15.0').replace(',', '.'));
        const examId = Store.activeTab || '';
        const newActIndex = this.getAutoActivityLevel(suvVal, refLiv, refPar, refSle, examId);
        if (Store.buttonStates[actFieldId] !== newActIndex) {
           Store.buttonStates = { ...Store.buttonStates, [actFieldId]: newActIndex };
        }
    },

    getPctChange: function(curr, min) {
        if (!min || min <= 0) return null;
        return ((curr - min) / min) * 100;
    },

    getNormalizedSuv: function(suv, refLiv) {
        return (refLiv && refLiv > 0) ? (suv / refLiv) : suv;
    },

    getSuvDynamicsWord: function(currSuv, minSuv, cLiv, mLiv) {
        const cSuv = parseFloat(String(currSuv).replace(',', '.'));
        const mSuv = parseFloat(String(minSuv).replace(',', '.'));
        if (isNaN(cSuv) || isNaN(mSuv) || mSuv <= 0) return "nelze srovnat";
        
        const pct = this.getPctChange(this.getNormalizedSuv(cSuv, cLiv), this.getNormalizedSuv(mSuv, mLiv));
        if (pct === null) return "obdobná";
        
        const absPct = Math.abs(pct);
        if (absPct < 20) return "obdobná";
        
        const mod = absPct < 50 ? "mírný " : (absPct < 75 ? "" : "výrazný ");
        return pct > 0 ? `${mod}vzestup`.trim() : `${mod}pokles`.trim();
    },

    calculateDynamics: function(currSize, minSize, currSuv, minSuv, cLiv, mLiv, isRecistActive) {
        let sState = null, aState = null;
        let isNew = false;
        
        if (currSize && minSize) {
            const getMax = (s) => { const n = String(s).match(/\d+(\.\d+)?/g); return n ? Math.max(...n.map(Number)) : null; };
            const cVal = getMax(currSize), mVal = getMax(minSize);
            if (cVal !== null && mVal !== null) {
                if (mVal === 0 && cVal > 0) {
                    isNew = true;
                } else if (mVal > 0) {
                    const pct = this.getPctChange(cVal, mVal), absPct = Math.abs(pct);
                    sState = { trend: 0, mod: "", pctStr: "" };
                    if (absPct > 10) {
                        sState.trend = pct > 0 ? 1 : -1;
                        sState.mod = absPct < 20 ? "mírné" : absPct <= 50 ? "" : "výrazné";
                        if (absPct >= 20 && isRecistActive) sState.pctStr = ` (${pct > 0 ? '+' : '-'}${Math.round(pct / 10) * 10}%)`;
                    }
                }
            }
        }
        
        if (isNew) return "nově";

        if (currSuv && minSuv) {
            const cSuv = parseFloat(String(currSuv).replace(',', '.')), mSuv = parseFloat(String(minSuv).replace(',', '.'));
            if (!isNaN(cSuv) && !isNaN(mSuv) && mSuv > 0) {
                const pct = this.getPctChange(this.getNormalizedSuv(cSuv, cLiv), this.getNormalizedSuv(mSuv, mLiv));
                if (pct !== null) {
                    const absPct = Math.abs(pct);
                    aState = { trend: 0, mod: "" };
                    if (absPct >= 20) { 
                        aState.trend = pct > 0 ? 1 : -1; 
                        aState.mod = absPct < 50 ? "mírné" : absPct < 75 ? "zřetelné" : "výrazné"; 
                    }
                }
            }
        }

        const format = (st, isSize) => {
            if (st.trend === 0) return isSize ? "rozměrově stacionární" : "akumulačně přibližně stacionární";
            return `${st.mod ? 'v(e) ' + st.mod : 'v'} ${isSize ? 'rozměrové' + st.pctStr : 'akumulační'} ${st.trend === 1 ? 'progresi' : 'regresi'}`.replace('v(e) v', 've v').replace('v(e)', 'v');
        };
        
        if (sState && aState) {
            if (sState.trend === 0 && aState.trend === 0) return "rozměrově i akumulačně přibližně stacionární";
            if (sState.trend === aState.trend && sState.trend !== 0) {
                const tW = sState.trend === 1 ? 'progresi' : 'regresi';
                return sState.mod === aState.mod 
                    ? `${sState.mod ? 'v(e) '+sState.mod : 'v'} rozměrové${sState.pctStr} i akumulační ${tW}`.replace('v(e) v', 've v').replace('v(e)', 'v') 
                    : `${sState.mod ? 'v(e) '+sState.mod : 'v'} rozměrové${sState.pctStr} a ${aState.mod} akumulační ${tW}`.replace('v(e) v', 've v').replace('v(e)', 'v');
            }
            return `${format(sState, true)} a ${format(aState, false)}`;
        }
        return sState ? format(sState, true) : aState ? format(aState, false) : "";
    }
};

/* ═══════════════════════════════════════════════
   BUTTON FACTORY
═══════════════════════════════════════════════ */
function getButtonBase(regionId, itemConfig, longestOverride) {
    const baseCfg = (REGIONS[regionId].buttons || {})[itemConfig.btn] || {};
    const type   = itemConfig.type || baseCfg.type || 'standard';
    const states = itemConfig.states || baseCfg.states;
    const text   = itemConfig.text || baseCfg.text;
    const custom = Boolean(itemConfig.custom !== undefined ? itemConfig.custom : baseCfg.custom);
    
    const localId = itemConfig.id || itemConfig.btn;
    const examId = Store.activeTab || 'default';
    const globalId = `${examId}_${regionId}_${localId}`;
    ButtonConfigs[globalId] = { type, states, text, custom };
    
    let longestStr = typeof longestOverride === 'string' ? longestOverride : '';
    const longest = longestStr || (states ? states.map(s => s.replace(/\s*\[field:[^\]]+\]/, '')).reduce((a, b) => a.length > b.length ? a : b, '') : (text || ''));
    
    return { type, states, text, custom, globalId, longest };
}

function createButtonElement(config, isActive, btnLabel, action) {
    return el('button', {
        className: `btn btn-state${isActive ? ' modified' : ''}`,
        'data-action': action,
        'data-id': config.globalId,
        'data-longest': config.longest,
        'aria-pressed': isActive.toString()
    }, [el('span', { textContent: btnLabel })]);
}

function makeBasicButton(config) {
    const rawState = Store.buttonStates[config.globalId] ?? false;
    const showCustomInput = Boolean(config.custom && rawState === 'custom');
    const isActive = Boolean(rawState === true || showCustomInput);
    const btn = createButtonElement(config, isActive, config.text, 'toggle-basic');

    if (showCustomInput) {
        const inp = el('input', {
            className: 'input',
            value: Store.customTexts[config.globalId] || '',
            'data-action': 'update-custom-input',
            'data-id': config.globalId,
            placeholder: 'vlastní'
        });
        return el('div', { className: 'row' }, [btn, inp]);
    }
    return btn;
}

function makeBasicCustomButton(config) {
    const isActive = Boolean(Store.buttonStates[config.globalId]);
    const btn = createButtonElement(config, isActive, config.text, 'toggle-basic-custom');

    if (isActive) {
        const inp = el('input', {
            className: 'input',
            value: Store.customTexts[config.globalId] || '',
            'data-action': 'update-custom-input',
            'data-id': config.globalId,
            placeholder: 'Upřesnit...'
        });
        return el('div', { className: 'row' }, [btn, inp]);
    }
    return btn;
}

function makeStandardButton(config) {
    const idx = Store.buttonStates[config.globalId] || 0;
    const rawStateStr = config.states && config.states[idx] !== undefined ? config.states[idx] : 'N/A';
    const isActive = Boolean(idx > 0);
    
    const fieldMatch = rawStateStr.match(/^(.*?)\s*\[field:([^:]+):([^:\]]+)(?::([^\]]+))?\]$/);
    const isCustomInline = rawStateStr === 'custom';
    
    let btnLabel = rawStateStr;
    let fieldConfig = null;
    let fieldIdSuffix = null;
    let fieldPlaceholder = '';

    if (fieldMatch) {
        btnLabel = fieldMatch[1].trim();
        fieldConfig = fieldMatch[2].trim();
        fieldIdSuffix = fieldMatch[3].trim();
        fieldPlaceholder = fieldMatch[4] ? fieldMatch[4].trim() : '';
    } else if (isCustomInline) {
        btnLabel = '';
    }

    const btn = el('button', {
        className: `btn btn-state${isActive ? (isCustomInline ? ' is-custom-wrapper modified' : ' modified') : ''}`,
        'data-action': 'cycle-state',
        'data-id': config.globalId,
        'data-longest': config.longest,
        'aria-pressed': isActive.toString()
    });

    if (isCustomInline) {
        const inp = el('input', {
            className: 'input-btn-inner',
            value: Store.customTexts[config.globalId] || '',
            'data-action': 'update-custom-input',
            'data-id': config.globalId,
            placeholder: 'vlastní'
        });
        btn.appendChild(inp);
    } else {
        btn.appendChild(el('span', { textContent: btnLabel }));
    }

    if (fieldConfig && fieldIdSuffix) {
        const fieldGlobalId = `${config.globalId}_${fieldIdSuffix}`;
        const inp = el('input', {
            className: `input ${fieldConfig}`,
            'data-action': 'update-field',
            'data-id': fieldGlobalId,
            placeholder: fieldPlaceholder
        });
        inp.value = Store.fields[fieldGlobalId] || '';
        if (fieldConfig === 'field_size' && Store.fields[`${fieldGlobalId}_dims`]) {
            inp.dataset.dims = Store.fields[`${fieldGlobalId}_dims`];
        }
        return el('div', { className: 'row' }, [btn, inp]);
    }

    return btn;
}

function makeButton(regionId, itemConfig, longestOverride = null) {
    const config = getButtonBase(regionId, itemConfig, longestOverride);
    if (config.type === 'basic_custom') return makeBasicCustomButton(config);
    if (config.type === 'basic') return makeBasicButton(config);
    return makeStandardButton(config);
}

/* ═══════════════════════════════════════════════
   TABLE FACTORIES
═══════════════════════════════════════════════ */
function _tableLongest(rows, regionId) {
    const texts = [];
    for (const row of rows) {
        for (const cell of (Array.isArray(row) ? row : [row])) {
            for (const item of (Array.isArray(cell) ? cell : [cell])) {
                if (item?.btn) {
                    const cfg = (REGIONS[regionId].buttons || {})[item.btn] || {};
                    const type = item.type || cfg.type || 'standard';
                    
                    if (type.startsWith('basic')) {
                        texts.push(item.text || cfg.text || '');
                    } else {
                        const states = item.states || cfg.states || [];
                        texts.push(...states.map(s => s.replace(/\s*\[field:[^\]]+\]/, '')));
                    }
                }
            }
        }
    }
    return texts.reduce((a, b) => (a.length > b.length ? a : b), '');
}

function _renderCell(td, cell, longestObj, regionId) {
    const items = Array.isArray(cell) ? cell : [cell];
    if (items.length > 1) td.appendChild(el('div', { className: 'row' }, items.map(i => _cellItem(i, longestObj, regionId))));
    else                  td.appendChild(_cellItem(items[0], longestObj, regionId));
}

function _cellItem(item, longestObj, regionId) {
    if (typeof item === 'string') {
        const span = document.createElement('span');
        span.textContent = item;
        return span;
    }
    if (item?.btn) return makeButton(regionId, item, longestObj);
    if (item?.field) {
        const examId = Store.activeTab || 'default';
        const cls = { size: 'field_size', suv: 'field_suv', mm: 'field_mm', text: 'field_text' }[item.field] || 'field_mm';
        const fieldGlobalId = `${examId}_${regionId}_${item.id || item.field}`;
        const inp = el('input', { 
            className: `input ${cls}`, 
            placeholder: item.placeholder || '',
            'data-action': 'update-field',
            'data-id': fieldGlobalId
        });
        inp.value = Store.fields[fieldGlobalId] || '';
        
        if (item.field === 'size' && Store.fields[`${fieldGlobalId}_dims`]) {
            inp.dataset.dims = Store.fields[`${fieldGlobalId}_dims`];
        }

        if (item.step) inp.dataset.step = item.step;
        return inp;
    }
    return document.createTextNode('');
}

    const table = el('table', { id: id, className: 'tbl tbl-center' });
    const thMid = el('th', { textContent: '' });
    thMid.style.minWidth = '30px';
    const thead = el('thead', {}, [el('tr', {}, [
        el('th', { textContent: 'R' }), 
        thMid, 
        el('th', { textContent: 'L' })
    ])]);
    const tbody = el('tbody');
    for (const [r, c, l] of rows) {
        const tr = el('tr');
        for (const cell of [r, c, l]) {
            const td = el('td');
            _renderCell(td, cell, longest, regionId);
            tr.appendChild(td);
        }
        tbody.appendChild(tr);
    }
    table.appendChild(thead);
    table.appendChild(tbody);
    return table;
}

}

function Table2colNormal(id, rows, regionId) {

    for (const [a, b] of rows) {

function Table1rowAlternate(id, cells, regionId) {

    const table = el('table', { id: id, className: 'tbl' });
    const tbody = el('tbody');
    const tr = el('tr');
    for (const cell of cells) {
        const td = el('td');

        tr.appendChild(td);
    }
