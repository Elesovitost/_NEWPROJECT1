function createNewInstance(baseTableId) {
    const instId = Date.now().toString();
    const currentInstances = Store.instances || {};
    const tableInstances = currentInstances[baseTableId] || [];
    Store.instances = { ...currentInstances, [baseTableId]: [...tableInstances, instId] };
    
    const isLN = baseTableId.includes('lymphnode');
    const isHemo = baseTableId.includes('hemo');
    const regionId = baseTableId.split('_')[0];
    
    let pfx = 'l';
    if (isHemo) {
        pfx = 'bh';
    } else {
        const prefixMap = { brain: 'bl', thorax: isLN ? 'tln' : 'tl', abdomen: isLN ? 'aln' : 'al', neck: isLN ? 'ln' : 'l', skeleton: 'l', prostate: isLN ? 'prln' : 'pl' };
        pfx = prefixMap[regionId] || (isLN ? 'ln' : 'l');
    }
    
    const p = `${pfx}_${instId}`;
    const defaultLesState = (regionId === 'skeleton' && !isLN) ? 1 : true;
    
    let kindSuffix = isLN ? 'uzl' : 'les';
    if (isHemo) kindSuffix = 'lez';
    
    Store.buttonStates = { 
        ...Store.buttonStates, 
        [`${Store.activeTab}_${regionId}_${p}_c_soli`]: true, 
        [`${Store.activeTab}_${regionId}_${p}_k_${kindSuffix}`]: defaultLesState 
    };
    
    return `${baseTableId}__${instId}`;
}

const ClipboardService = {
    formatReport: function(includeIndicationLabel = false) {
        const container = document.getElementById('report-container');
        if (!container) return "";
        let lines = [];
        const indication = (Store.indication || "").trim();

        if (indication && includeIndicationLabel) { 
            lines.push(`Indikace: ${indication}`); 
            lines.push(""); 
        }

        if (Store.pastDate) {
            const [y, m, d] = Store.pastDate.split('-');
            lines.push(`Srovnáno s vyšetřením z ${d}.${m}.${y}:`);
        }

        let currentLine = "";
        let currentLayout = "inline";
        const hasMultipleHeadings = Array.from(container.children).filter(el => el.classList.contains('report-heading')).length > 1;

        Array.from(container.children).forEach(el => {
            const text = el.textContent.trim();
            if (el.classList.contains('report-exam-heading')) {
                if (currentLine) {
                    lines.push(currentLine.trim());
                    currentLine = "";
                }
                if (lines.length > 0 && lines[lines.length - 1] !== "") {
                    lines.push("");
                }
            } else if (el.classList.contains('report-heading')) {
                if (currentLine) lines.push(currentLine.trim());
                const regionId = el.dataset.region;
                currentLayout = (regionId && REGIONS[regionId] && REGIONS[regionId].reportLayout) ? REGIONS[regionId].reportLayout : 'inline';
                if (hasMultipleHeadings) {
                    currentLine = text.toUpperCase().replace(/:$/, '') + ":";
                } else {
                    currentLine = "";
                }
            } else if (el.classList.contains('report-frame') || el.classList.contains('report-frame-hidden')) {
                const cleanText = text.replace(/^- /, '');
                if (currentLayout === 'block' || text.startsWith('Neložisková')) {
                    if (currentLine) { lines.push(currentLine.trim()); currentLine = ""; }
                    lines.push(cleanText);
                } else {
                    currentLine = currentLine === "" ? cleanText : currentLine + " " + cleanText;
                }
            }
        });
        if (currentLine) lines.push(currentLine.trim());
        return lines.join('\n').replace(/  +/g, ' ').trim();
    },

    formatConclusion: function(includeIncidentalLabel = true) {
        const container = document.getElementById('conclusion-container');
        if (!container) return "";
        let mainParts = [], incidentalParts = [], state = "none";

        if (Store.pastDate) {
            const [y, m, d] = Store.pastDate.split('-');
            mainParts.push(`Oproti vyšetření z ${d}.${m}.${y}:`);
        }

        Array.from(container.children).forEach(el => {
            const txt = el.textContent.trim();
            if (txt === "Závěr:") { state = "main"; return; }
            if (txt === "Vedlejší nálezy:") { state = "incidental"; return; }
            if (state === "main" && el.classList.contains('report-frame')) mainParts.push(txt);
            if (state === "incidental" && el.classList.contains('report-frame')) incidentalParts.push(txt);
        });

        let out = mainParts.join('\n');
        if (incidentalParts.length > 0) out += "\n\n" + (includeIncidentalLabel ? "Vedlejší nálezy: " : "") + incidentalParts.join(' ');
        return out.trim();
    },

    copyToClipboard: function(text, targetEl, originalText) {
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            if (targetEl) {
                targetEl.textContent = 'Zkopírováno!';
                targetEl.style.color = '#58a6ff';
                setTimeout(() => { targetEl.textContent = originalText; targetEl.style.color = ''; }, 1200);
            }
        }).catch(err => console.error('Nelze kopírovat:', err));
    }
};

const ActionHandlers = {
    'toggle-settings': () => {
        const modal = document.getElementById('settings-modal');
        if (modal) modal.style.display = modal.style.display === 'none' ? 'block' : 'none';
    },
    'copy-text': (target) => {
        const isReport = target.dataset.target === 'report-container';
        const textToCopy = isReport ? ClipboardService.formatReport() : ClipboardService.formatConclusion();
        
        if (APP_SETTINGS.previewReport) {
            UI.openPreview(textToCopy, target, false);
        } else {
            ClipboardService.copyToClipboard(textToCopy, target, target.textContent);
        }
    },
    'copy-all': () => {
        let title = "";
        if (Store.exams.size >= 2) {
            const titles = Array.from(Store.exams).map(id => {
                const exam = getExamById(id);
                if (id === 'mr_kolene') {
                    const side = Store.fields['knee_side'];
                    return side === 'R' ? "MR pravého kolene" : (side === 'L' ? "MR levého kolene" : exam.title);
                }
                if (id === 'mr_ramene') {
                    const side = Store.fields['shoulder_side'];
                    return side === 'R' ? "MR pravého ramene" : (side === 'L' ? "MR levého ramene" : exam.title);
                }
                return exam ? exam.title : "";
            }).filter(Boolean);
            title = titles.join(', ');
        } else {
            const activeExam = getExamById(Store.activeTab);
            title = activeExam ? activeExam.title : "Lékařský nález";
            if (Store.activeTab === 'mr_kolene') {
                const side = Store.fields['knee_side'];
                title = side === 'R' ? "MR pravého kolene" : (side === 'L' ? "MR levého kolene" : title);
            } else if (Store.activeTab === 'mr_ramene') {
                const side = Store.fields['shoulder_side'];
                title = side === 'R' ? "MR pravého ramene" : (side === 'L' ? "MR levého ramene" : title);
            }
        }
        
        const report = ClipboardService.formatReport(true);
        const conclusion = ClipboardService.formatConclusion(true);
        const incidentalMatch = conclusion.match(/\n\nVedlejší nálezy: (.*)/s);
        const mainConc = conclusion.replace(/\n\nVedlejší nálezy: .*/s, '');
        const incidental = incidentalMatch ? incidentalMatch[0].trim() : '';

        const combined = `${title}\n\n${report}\n\nZávěr:\n${mainConc}${incidental ? '\n\n' + incidental : ''}`.trim().replace(/\n{3,}/g, '\n\n');
        
        if (APP_SETTINGS.previewReport) {
            UI.openPreview(combined, null, true);
        } else {
            navigator.clipboard.writeText(combined).then(() => {
                const h2s = document.querySelectorAll('h2[data-action="copy-text"]');
                const originals = Array.from(h2s).map(h2 => h2.textContent);
                h2s.forEach(h2 => { h2.textContent = 'Zkopírováno!'; h2.style.color = '#58a6ff'; });
                setTimeout(() => { h2s.forEach((h2, i) => { h2.textContent = originals[i]; h2.style.color = ''; }); }, 1200);
            }).catch(err => console.error('Nelze kopírovat:', err));
        }
    },
    'preview-close': () => {
        document.getElementById('preview-modal').style.display = 'none';
        document.getElementById('preview-backdrop').style.display = 'none';
    },
    'preview-copy': () => {
        const text = document.getElementById('preview-textarea').value;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('button[data-action="preview-copy"]');
            const orig = btn.textContent;
            btn.textContent = 'Zkopírováno!';
            btn.style.background = 'var(--accent-hi)';
            btn.style.color = '#000';
            
            if (Store.previewIsAll) {
                const h2s = document.querySelectorAll('h2[data-action="copy-text"]');
                const originals = Array.from(h2s).map(h2 => h2.textContent);
                h2s.forEach(h2 => { h2.textContent = 'Zkopírováno!'; h2.style.color = '#58a6ff'; });
                setTimeout(() => { h2s.forEach((h2, i) => { h2.textContent = originals[i]; h2.style.color = ''; }); }, 1200);
            } else if (Store.previewTarget) {
                 Store.previewTarget.textContent = 'Zkopírováno!';
                 Store.previewTarget.style.color = '#58a6ff';
                 setTimeout(() => { Store.previewTarget.textContent = Store.previewTargetOrigText; Store.previewTarget.style.color = ''; }, 1200);
            }

            setTimeout(() => { 
                btn.textContent = orig; 
                btn.style.background = '';
                btn.style.color = '';
                ActionHandlers['preview-close'](); 
            }, 800);
        }).catch(err => console.error('Nelze kopírovat:', err));
    },
    'open-region': (target, dataset) => {
        if (dataset.exam) Store.activeTab = dataset.exam;
        Store.activeTable = `region:${dataset.region}`;
    },
    'open-table': (target, dataset) => {
        if (dataset.exam) Store.activeTab = dataset.exam;
        
        if (dataset.table && dataset.table.includes('__')) {
            Store.activeTable = dataset.table;
        } else if (dataset.table && (dataset.table.includes('lesion') || dataset.table.includes('lymphnode') || dataset.table.includes('hemo'))) {
            Store.activeTable = createNewInstance(dataset.table);
        } else {
            Store.activeTable = dataset.table;
        }
    },
    'remove-instance': (target, dataset) => {
        const [baseTableId, instId] = dataset.id.split('__');
        if (Store.instances && Store.instances[baseTableId]) {
            const newInstances = { ...Store.instances, [baseTableId]: Store.instances[baseTableId].filter(i => i !== instId) };
            const filterObj = (obj) => Object.fromEntries(Object.entries(obj).filter(([k]) => !k.includes(`_${instId}`)));
            
            Store.instances = newInstances;
            Store.buttonStates = filterObj(Store.buttonStates);
            Store.customTexts = filterObj(Store.customTexts);
            Store.fields = filterObj(Store.fields);
            
            Store.activeTable = null;
            UI.renderReport();
        }
    },
    'cycle-knee-side': () => {
        Store.fields = { ...Store.fields, 'knee_side': Store.fields['knee_side'] === 'R' ? 'L' : 'R' };
        UI.renderDetails(); 
    },
    'cycle-shoulder-side': () => {
        Store.fields = { ...Store.fields, 'shoulder_side': Store.fields['shoulder_side'] === 'R' ? 'L' : 'R' };
        UI.renderDetails(); 
    },
    'toggle-exam': (target, dataset) => {
        const next = new Set(Store.exams);
        if (next.has(dataset.payload)) {
            next.delete(dataset.payload);
            if (Store.activeTab === dataset.payload) Store.activeTab = next.size > 0 ? Array.from(next).pop() : null;
        } else {
            next.add(dataset.payload);
            Store.activeTab = dataset.payload;
        }
        Store.exams = next;
        Store.activeTable = null; 
    },
    'select-tab': (target, dataset) => {
        Store.activeTab = dataset.payload;
        Store.activeTable = null;
    },
    'remove-exam': (target, dataset) => {
        const examId = dataset.payload;
        const next = new Set(Store.exams);
        next.delete(examId);
        
        if (Store.activeTab === examId) {
            Store.activeTab = next.size > 0 ? Array.from(next).pop() : null;
        }
        
        Store.indication = '';
        Store.pastDate = '';
        const dateInput = document.querySelector('input[data-action="update-date"]');
        if (dateInput) {
            dateInput.value = '';
        }
        
        Store.exams = next;
        Store.activeTable = null;
        
        const filterExamData = (obj) => Object.fromEntries(Object.entries(obj).filter(([k]) => !k.startsWith(`${examId}_`)));
        
        Store.buttonStates = filterExamData(Store.buttonStates);
        Store.customTexts = filterExamData(Store.customTexts);
        Store.fields = filterExamData(Store.fields);
        Store.expandedNotes = filterExamData(Store.expandedNotes);
        
        if (next.size === 0) {
            Store.instances = {};
        } else {
            const newInstances = {};
            const hasData = (instId) => {
                const check = (obj) => Object.keys(obj).some(k => k.includes(instId));
                return check(Store.buttonStates) || check(Store.customTexts) || check(Store.fields);
            };
            for (const [tableId, insts] of Object.entries(Store.instances || {})) {
                const validInsts = insts.filter(instId => hasData(instId));
                if (validInsts.length > 0) {
                    newInstances[tableId] = validInsts;
                }
            }
            Store.instances = newInstances;
        }
        
        UI.renderReport(); 
    },

    'toggle-recist': (target) => {
        target.classList.toggle('selected');
        Store.recist = target.classList.contains('selected');
        UI.renderReport();
    },
    'cycle-state': (target, dataset) => cycleState(dataset.id, 1),
    'toggle-basic': (target, dataset) => toggleBasic(dataset.id, null),
    'toggle-basic-custom': (target, dataset) => toggleBasicCustom(dataset.id, true),
    'expand-notes': (target, dataset) => { Store.expandedNotes = { ...Store.expandedNotes, [dataset.payload]: true }; }
};

document.addEventListener('click', e => {
    const modal = document.getElementById('settings-modal');
    const isSettingsBtn = e.target.closest('[data-action="toggle-settings"]');
    if (modal && modal.style.display === 'block' && !modal.contains(e.target) && !isSettingsBtn) {
        modal.style.display = 'none';
    }

    const target = e.target.closest('[data-action]');
    if (target) {
        const handler = ActionHandlers[target.dataset.action];
        if (handler) {
            handler(target, target.dataset);
            return;
        }
    }

    if (!Store.activeTable) {
        const organEl = e.target.closest('svg [id]');
        if (organEl && organEl.id && ORGAN_MAP[organEl.id]) {
            const organDef = ORGAN_MAP[organEl.id];
            let baseTableId = organDef.table;
            
            if (organDef.resolveTable) {
                const activeExam = getExamById(Store.activeTab);
                const activeRegions = activeExam ? activeExam.regs : [];
                baseTableId = organDef.resolveTable(activeRegions);
            }
            
            if (baseTableId) {
                if (baseTableId.includes('lesion') || baseTableId.includes('lymphnode') || baseTableId.includes('hemo')) {
                    Store.activeTable = createNewInstance(baseTableId);
                } else {
                    Store.activeTable = baseTableId;
                }
            }
            return;
        }
    }

    if (Store.activeTable) {
        const isInsideOverlay = e.target.closest('#table-overlay-container');
        const isInsideViewer = e.target.closest('#standalone-slice-viewer');
        const isInputOrInteractive = e.target.closest('.input, select, textarea');
        if (!isInsideOverlay && !isInsideViewer && !isInputOrInteractive) {
            Store.activeTable = null;
        }
    }
});

document.addEventListener('mousemove', e => {
    if (isDraggingSlice) {
        const delta = e.clientY - dragSliceLastY;
        if (Math.abs(delta) > 5) {
            const cfg = SLICE_VIEWERS[Store.activeViewerKey];
            const maxSlices = cfg ? cfg.max : 1;
            let idx = Store.activeSlice + (delta > 0 ? 1 : -1);
            Store.activeSlice = Math.max(1, Math.min(maxSlices, idx));
            dragSliceLastY = e.clientY;
        }
        return;
    }

    const tooltip = document.getElementById('organ-tooltip');
    if (!tooltip) return;

    // Vynutit skrytí tooltipu, pokud je otevřena tabulka (SVG ztmavlo)
    if (Store.activeTable) {
        tooltip.style.display = 'none';
        return;
    }

    const organEl = e.target.closest('svg [id]');
    if (organEl && organEl.id && ORGAN_MAP[organEl.id]) {
        tooltip.textContent = ORGAN_MAP[organEl.id].name;
        tooltip.style.display = 'block';
        tooltip.style.left = `${e.clientX + 15}px`;
        tooltip.style.top = `${e.clientY + 15}px`;
        
        if (organEl.classList.contains('organ-dimmed')) {
            tooltip.classList.add('tooltip-dimmed');
        } else {
            tooltip.classList.remove('tooltip-dimmed');
        }
    } else {
        tooltip.style.display = 'none';
    }
});

document.addEventListener('contextmenu', e => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    e.preventDefault();
    const { action, id } = btn.dataset;
    if (action === 'cycle-state')         cycleState(id, -1);
    if (action === 'toggle-basic')        toggleBasic(id, false);
    if (action === 'toggle-basic-custom') toggleBasicCustom(id, false);
});

document.addEventListener('wheel', e => {
    const t = e.target;

    if (t.id === 'slice-image') {
        e.preventDefault();
        const cfg = SLICE_VIEWERS[Store.activeViewerKey];
        const maxSlices = cfg ? cfg.max : 1;
        let idx = Store.activeSlice + (e.deltaY > 0 ? 1 : -1);
        Store.activeSlice = Math.max(1, Math.min(maxSlices, idx));
        return;
    }

    if (t.classList.contains('input') && t.dataset.action === 'update-field') {
        e.preventDefault();
        const id = t.dataset.id;
        
        if (t.classList.contains('field_size')) {
            let dims = t.dataset.dims ? JSON.parse(t.dataset.dims) : [null];
            let aI = dims.length - 1;
            let v  = dims[aI];
            
            if (v === null || isNaN(v)) {
                if (e.deltaY > 0) return;
                v = 0;
            } else if (e.deltaY < 0) {
                v = Math.min(999, v + 1);
            } else {
                v -= 1;
                if (v < 0) {
                    if (aI > 0) { dims.pop(); v = dims[aI - 1]; }
                    else v = null;
                }
            }
            dims[dims.length - 1] = v;
            
            const strVal = (!dims.length || dims[0] === null) ? '' : dims.map(x => x ?? '').join('x');
            t.dataset.dims = JSON.stringify(dims);
            Store.fields = { ...Store.fields, [id]: strVal, [`${id}_dims`]: t.dataset.dims };
            t.value = strVal;
            return;
        }

        if (t.classList.contains('field_suv')) {
            let textVal = t.value.replace(',', '.');
            let v = textVal === '' ? null : parseFloat(textVal);
            
            if (v === null || isNaN(v)) {
                if (e.deltaY > 0) return;
                v = 0.0;
            } else if (e.deltaY < 0) {
                v = Math.min(50.0, parseFloat((v + 0.1).toFixed(1)));
            } else {
                v = parseFloat((v - 0.1).toFixed(1));
                if (v < 0) v = null;
            }
            
            const strVal = v === null ? '' : v.toFixed(1);
            Store.fields = { ...Store.fields, [id]: strVal };
            t.value = strVal;
            
            MetricsEngine.updateActivityForField(id, strVal);
            return;
        }

        if (t.classList.contains('field_mm')) {
            const step = parseInt(t.dataset.step) || 1;
            let v = parseInt(t.value, 10);
            
            if (isNaN(v)) {
                if (e.deltaY > 0) return;
                v = 0;
            } else {
                v = e.deltaY < 0 ? v + step : v - step;
            }
            
            const strVal = v < 0 ? '' : v.toString();
            Store.fields = { ...Store.fields, [id]: strVal };
            t.value = strVal;
            return;
        }
    }

    const btn = t.closest('.btn');
    if (!btn) return;
    e.preventDefault();
    const dir = e.deltaY < 0 ? 1 : -1;
    const { action, id } = btn.dataset;
    
    if (action === 'cycle-state')         cycleState(id, dir);
    if (action === 'toggle-basic')        toggleBasic(id, dir > 0);
    if (action === 'toggle-basic-custom') toggleBasicCustom(id, dir > 0);

}, { passive: false });

document.addEventListener('input', e => {
    const actionTarget = e.target.closest('[data-action]');
    if (actionTarget && actionTarget.dataset.action === 'update-setting') {
        APP_SETTINGS[actionTarget.dataset.setting] = e.target.checked;
        saveSettings();
        return;
    }

    if (e.target.dataset.action === 'update-field') {
        e.target.dataset.edited = 'true';
        const id = e.target.dataset.id;
        let val = e.target.value;
        const sStart = e.target.selectionStart;
        const sEnd = e.target.selectionEnd;

        if (e.target.classList.contains('field_suv')) val = val.replace(',', '.');
        
        Store.fields = { ...Store.fields, [id]: val };
        
        if (e.target.classList.contains('field_size')) {
            const dims = e.target.value.split('x').map(d => { const n = parseInt(d); return isNaN(n) ? null : n; });
            Store.fields[`${id}_dims`] = JSON.stringify(dims);
            e.target.dataset.dims = JSON.stringify(dims);
        }
        
        MetricsEngine.updateActivityForField(id, val);

        setTimeout(() => {
            const restoredInput = document.querySelector(`input[data-id="${id}"]`);
            if (restoredInput) {
                restoredInput.focus();
                restoredInput.setSelectionRange(sStart, sEnd);
            }
        }, 0);

        return;
    }

    const target = e.target.closest('[data-action]');
    if (!target) return;
    const { action, id } = target.dataset;
    if (action === 'update-indication')   Store.indication  = e.target.value;
    if (action === 'update-date')         Store.pastDate    = e.target.value;
    if (action === 'update-custom-input') Store.customTexts = { ...Store.customTexts, [id]: e.target.value };
});

document.addEventListener('mouseover', e => {
    if (e.target.closest && e.target.closest('[data-action="copy-all"]')) {
        document.querySelectorAll('h2[data-action="copy-text"]').forEach(el => el.classList.add('highlight-force'));
    }

    if (!APP_SETTINGS.showTooltips) return;

    const btn = e.target.closest('.btn');
    if (btn && btn.dataset.id) {
        let imgUrl = null;
        for (const key in window.HOVER_IMAGES) {
            if (btn.dataset.id.endsWith(`_${key}`) || btn.dataset.id === key) {
                imgUrl = window.HOVER_IMAGES[key];
                break;
            }
        }

        if (imgUrl) {
            const tooltip = document.getElementById('image-tooltip');
            const img = document.getElementById('image-tooltip-img');
            if (tooltip && img) {
                img.src = imgUrl;
                tooltip.style.display = 'block';
                
                const rect = btn.getBoundingClientRect();
                let leftPos = rect.right + 10;
                let topPos = rect.top;
                
                if (leftPos + 500 > window.innerWidth) leftPos = rect.left - 510;
                if (topPos + 500 > window.innerHeight) topPos = window.innerHeight - 510;
                
                tooltip.style.left = `${leftPos}px`;
                tooltip.style.top = `${topPos}px`;
            }
        }
    }
});

document.addEventListener('mouseout', e => {
    if (e.target.closest && e.target.closest('[data-action="copy-all"]')) {
        document.querySelectorAll('h2[data-action="copy-text"]').forEach(el => el.classList.remove('highlight-force'));
    }

    const btn = e.target.closest('.btn');
    if (btn && btn.dataset.id) {
        const tooltip = document.getElementById('image-tooltip');
        if (tooltip) tooltip.style.display = 'none';
    }
});

document.addEventListener('mouseup', () => {
    isDraggingSlice = false;
});

document.addEventListener('mousedown', e => {
    if (e.target.id === 'slice-image') {
        e.preventDefault();
        isDraggingSlice = true;
        dragSliceLastY = e.clientY;
        return;
    }

    if (!e.target.classList.contains('field_size')) return;
    let dims = e.target.dataset.dims ? JSON.parse(e.target.dataset.dims) : [null];
    if (dims.length > 0 && dims.length < 3 && dims[dims.length - 1] !== null) {
        dims.push(null);
        e.target.dataset.dims = JSON.stringify(dims);
        const strVal = dims.map(x => x ?? '').join('x');
        Store.fields = { ...Store.fields, [e.target.dataset.id]: strVal, [`${e.target.dataset.id}_dims`]: e.target.dataset.dims };
        e.target.value = strVal;
    }
});

document.addEventListener('DOMContentLoaded', () => {
    const grammarMergingCheckbox = document.getElementById('setting-grammar-merging');
    if (grammarMergingCheckbox) grammarMergingCheckbox.checked = APP_SETTINGS.grammarMerging;

    const suvWordCheckbox = document.getElementById('setting-suv-word');
    if (suvWordCheckbox) suvWordCheckbox.checked = APP_SETTINGS.suvWord;
    
    const hidePredefinedCheckbox = document.getElementById('setting-hide-predefined');
    if (hidePredefinedCheckbox) hidePredefinedCheckbox.checked = APP_SETTINGS.hidePredefined;

    const previewCheckbox = document.getElementById('setting-preview');
    if (previewCheckbox) previewCheckbox.checked = APP_SETTINGS.previewReport;
    
    const tooltipsCheckbox = document.getElementById('setting-show-tooltips');
    if (tooltipsCheckbox) tooltipsCheckbox.checked = APP_SETTINGS.showTooltips;
    
    document.body.classList.toggle('hide-predefined', APP_SETTINGS.hidePredefined);
    
    UI.render('exams');
});
</script>
</body>
</html>
