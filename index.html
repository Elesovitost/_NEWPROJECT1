<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Medical Workstation - Declarative</title>
<style>
        :root { --bg: #050505; --panel: #121418; --border: #2a313a; --text: #e6edf3; --dim: #7d8590; --accent: #005a9e; --accent-hi: #58a6ff; --btn-bg: rgba(255,255,255,0.03); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: grid; grid-template-columns: 1fr clamp(250px,20vw,350px) clamp(250px,20vw,350px); grid-template-rows: max-content 1fr; height: 100vh; padding: 5px; gap: 5px; overflow: hidden; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 12px; display: flex; flex-direction: column; position: relative; min-height: 0; }
        .panel.combined-highlight { border-color: var(--accent-hi); box-shadow: 0 0 12px var(--accent-hi); z-index: 10; }
        #header-panel { grid-column: 1 / -1; gap: 12px; z-index: 100; overflow: visible; }
        #details-panel { --details-bg: none; background-image: var(--details-bg); background-repeat: no-repeat; background-position: center; background-size: contain; overflow: auto; }
        #details-panel[data-bg="wb"] { --details-bg: url('Organs_schematic_WB.svg'); }
        #details-panel[data-bg="neck"] { --details-bg: url('Organs_schematic_WB.svg'); }
        #details-panel[data-bg="none"] { --details-bg: none; }
        h2 { font-size: 0.75rem; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; text-align: center; padding-bottom: 8px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
        /* [COPY ALL STYLES] */
        h2[data-action="copy-text"] { cursor: pointer; transition: color 0.2s, text-shadow 0.2s; }
        h2[data-action="copy-text"]:hover, h2.highlight-force { color: #fff; text-shadow: 0 0 5px var(--accent-hi); }
        .copy-all-zone { position: absolute; top: 0; right: -30px; width: 60px; height: 40px; cursor: pointer; z-index: 200; background: transparent; }
        .copy-all-zone:hover::after { content: '⧉'; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-size: 16px; color: var(--accent-hi); pointer-events: none; }
        .region-header { font-size: 13px; color: var(--accent-hi); border-bottom: 1px solid var(--border); padding-bottom: 4px; margin: 15px 0 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        .region-header:first-child { margin-top: 0; }
        .label { color: var(--dim); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .row { display: flex; align-items: center; gap: 8px; }
        .sep { border-left: 1px solid var(--border); padding-left: 15px; margin-left: 5px; }
        .push { margin-left: auto; }
        .content-area { overflow: auto; flex: 1; scrollbar-width: thin; scrollbar-color: var(--accent-hi) transparent; }
        .content-area::-webkit-scrollbar { width: 8px; height: 8px; }
        .content-area::-webkit-scrollbar-track:horizontal { background: linear-gradient(to bottom, transparent 45%, rgba(255,255,255,0.1) 45%, rgba(255,255,255,0.1) 55%, transparent 55%); }
        .content-area::-webkit-scrollbar-track:vertical { background: linear-gradient(to right, transparent 45%, rgba(255,255,255,0.1) 45%, rgba(255,255,255,0.1) 55%, transparent 55%); }
        .content-area::-webkit-scrollbar-thumb { background: var(--accent-hi); border-radius: 10px; }
        .content-area::-webkit-scrollbar-corner { background: transparent; }
        .input { background: rgba(255,255,255,0.02); border: 1px solid var(--border); color: #fff; padding: 3px; font-size: 11px; border-radius: 2px; outline: none; transition: border-color 0.2s; }
        .input:focus { border-color: var(--accent-hi); }
        .input-wide { width: 300px; }
        .input-date { width: 150px; color-scheme: dark; }
        .btn { background: var(--btn-bg); border: 1px solid var(--border); color: #c9d1d9; padding: 2px 2px; font-size: 11px; font-weight: 400; border-radius: 3px; cursor: pointer; min-width: 170px; display: inline-flex; justify-content: center; align-items: center; text-align: center; user-select: none; outline: none !important; -webkit-tap-highlight-color: transparent; }
        .btn:hover { border-color: var(--dim); color: #fff; }
        .btn.selected { background: var(--accent); border-color: var(--accent-hi); color: #fff; font-weight: 700; }
        .btn.modified { background: rgba(88,166,255,0.15); border-color: var(--accent-hi); color: #fff; font-weight: 700; }
        .btn-state { display: inline-grid; place-items: center; min-width: 0; position: relative; }
        .btn-state::after { content: attr(data-longest); visibility: hidden; grid-area: 1 / 1; pointer-events: none; white-space: nowrap; font-weight: 700; }
        .btn-state span { grid-area: 1 / 1; white-space: nowrap; }
        button[data-id*="spacer"] { visibility: hidden; }
        .dropdown { position: relative; display: inline-flex; }
        .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 2px; gap: 2px; flex-direction: column; box-shadow: 0 8px 16px rgba(0,0,0,.5); min-width: 100%; width: max-content; z-index: 1000; }
        .dropdown:hover .dropdown-menu { display: flex; }
        .dropdown-menu .btn { text-align: left; justify-content: flex-start; border: none; width: 100%; min-width: unset; }
        #exams-container .btn { text-align: left; justify-content: flex-start; }
        .report-content { display: flex; flex-direction: column; gap: 3px; padding-bottom: 8px; }
        .report-heading { font-weight: 700; color: var(--accent-hi); font-size: 10px; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .report-heading[data-action="open-region"] { cursor: pointer; transition: all 0.2s; }
        .report-heading[data-action="open-region"]:hover { color: #fff; text-shadow: 0 0 4px var(--accent-hi); }
        .report-frame { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-family: Consolas, monospace; font-size: 12px; color: #d1d5db; line-height: 1.3; white-space: pre-wrap; transition: border-color 0.2s, background 0.2s; }
        .report-frame[data-action="open-table"] { cursor: pointer; }
        .report-frame[data-action="open-table"]:hover { border-color: var(--accent-hi); background: rgba(88,166,255,0.05); }
        .report-frame-hidden { position: absolute; clip: rect(0 0 0 0); width: 1px; height: 1px; margin: -1px; overflow: hidden; border: 0; padding: 0; }
        .text-dim { color: var(--dim) !important; font-style: italic; }
        body:not(.has-past-date) .req-past, body:not(.has-past-date) .tbl > tbody > tr:has([data-id*="_old"]), body:not(.has-past-date) .row:has(> [data-id*="_minule"]) { display: none !important; }
        body.hide-predefined .report-frame.text-dim { display: none !important; }
        .field_suv { width: 55px !important; flex: none !important; cursor: ns-resize; }
        .field_size { width: 70px !important; flex: none !important; cursor: ns-resize; }
        .field_mm { width: 35px !important; flex: none !important; cursor: ns-resize; }
        .field_text { width: 100% !important; min-width: 150px; flex: 1 1 auto; cursor: text; }
        .tbl { border-collapse: collapse; font-size: 11px; margin-bottom: 6px; width: fit-content; }
        .tbl td, .tbl th { width: 1px; white-space: nowrap; padding: 1px 3px; border: none; }
        .tbl th { color: var(--dim); font-weight: 700; font-size: 10px; text-align: center; letter-spacing: 1px; }
        .tbl td { text-align: left; color: var(--dim); }
        .tbl.tbl-center td { text-align: center; }
        .tbl.tbl-center td .row { justify-content: center; }
        .tbl td.cell-label { text-align: left; color: var(--dim); padding-right: 6px; }
        .tbl td .row { justify-content: center; flex-wrap: nowrap; }
        .tbl .btn { min-width: 25px; color: var(--dim); flex-shrink: 0; }
        .tbl .btn:hover, .tbl .btn.selected, .tbl .btn.modified { color: #fff; }
        .tbl-main { border-collapse: collapse; width: fit-content; margin-bottom: 10px; border: none; }
        .tbl-main > tbody > tr > td { padding: 4px 8px; }
        .tbl-main-head { padding: 3px 0 3px 0; font-weight: 700; font-size: 11px; color: var(--accent-hi); text-transform: uppercase; letter-spacing: 1px; border: none; border-bottom: 1px solid var(--border) !important; text-align: center; }
        .tbl-main-container { display: flex; flex-direction: column; gap: 2px; width: 100%; align-items: center; }
        .tbl-lesion { border-collapse: collapse; width: fit-content; margin-bottom: 10px; border: none; }
        .tbl-lesion > tbody > tr > td { padding: 4px 8px; }
        .tbl-lesion-head { padding: 3px 0 3px 0; font-weight: 700; font-size: 11px; color: var(--accent-hi); text-transform: uppercase; letter-spacing: 1px; border: none; border-bottom: 1px solid var(--border) !important; }
        .tbl-lesion-container { display: flex; flex-direction: column; gap: 2px; width: 100%; align-items: center; }
        .tbl.tbl-full { width: 100%; }
        .tbl.tbl-full .tbl-full-cell { width: 100%; }
        .tbl.tbl-full .tbl-full-cell .input { width: 100%; }
        .tbl.tbl-full .tbl-full-cell .row { width: 100%; display: flex; }
        .tbl.tbl-full .tbl-full-cell .row .input { flex: 1; width: auto; }
        .table-wrapper { display: flex; flex-direction: column; width: fit-content; }
        .sub-table-title { font-size: 10px; font-weight: bold; color: #526778; padding: 4px 0 2px 0; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; width: 100%; text-align: center; }
        .organ-wrapper { position: relative; width: 100%; height: 100%; display: flex; align-items: flex-start; }
        .organ-svg { width: 90%; opacity: 0.7; transform: translateY(40px); transition: opacity 0.3s; display: block; stroke: #000000; stroke-width: 1.0px; stroke-linejoin: round;}
        .organ-svg svg { width: 100%; height: auto; display: block; max-height: 70vh; }
        .organ-svg svg image { pointer-events: none; }
        .organ-svg.multi-svg { display: flex; flex-direction: row; justify-content: center; gap: 0px; align-items: flex-start; }
        .organ-svg.svg-mirrored { transform: scaleX(-1) translateY(40px); }
        .btn-side-toggle { margin: 0 4px; padding: 0 4px; min-width: auto; height: 18px; font-weight: bold; }
        .organ-svg.multi-svg svg { width: auto; height: auto; display: block; max-height: 50vh; flex-shrink: 1; }
        .organ-svg svg [id] { cursor: pointer; transition: all 0.2s ease; outline: none; }
        .organ-svg svg [id]:hover { opacity: 1.0; filter: drop-shadow(0 0 4px var(--accent-hi)); }
        .organ-svg svg [id].organ-dimmed { opacity: 1.0; filter: brightness(0.3) grayscale(0.2); }
        .organ-svg svg [id].organ-dimmed:hover { filter: brightness(0.65) grayscale(0.2) drop-shadow(0 0 4px var(--dim)); }
        .organ-svg.dimmed { opacity: 0.1; pointer-events: none; }
        .inactive-organ { opacity: 0.05 !important; pointer-events: none !important; }
        #organ-tooltip { position: fixed; background: var(--panel); border: 1px solid var(--border); color: var(--accent-hi); padding: 4px 8px; border-radius: 4px; font-size: 11px; pointer-events: none; z-index: 1000; display: none; white-space: nowrap; font-weight: 700; text-transform: uppercase; transition: color 0.2s, border-color 0.2s; }
        #organ-tooltip.tooltip-dimmed { color: var(--dim); border-color: var(--dim); }
        #table-overlay-container { position: absolute; top: 10px; left: 10px; z-index: 100; background: var(--bg); padding: 15px; border-radius: 6px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.8); display: none; max-height: 80vh; max-width: 85vw; overflow: auto; width: max-content; scrollbar-width: thin; scrollbar-color: var(--accent-hi) transparent; }
        #table-overlay-container::-webkit-scrollbar { width: 8px; height: 8px; }
        #table-overlay-container::-webkit-scrollbar-track:horizontal { background: linear-gradient(to bottom, transparent 45%, rgba(255,255,255,0.1) 45%, rgba(255,255,255,0.1) 55%, transparent 55%); }
        #table-overlay-container::-webkit-scrollbar-track:vertical { background: linear-gradient(to right, transparent 45%, rgba(255,255,255,0.1) 45%, rgba(255,255,255,0.1) 55%, transparent 55%); }
        #table-overlay-container::-webkit-scrollbar-thumb { background: var(--accent-hi); border-radius: 10px; }
        #table-overlay-container::-webkit-scrollbar-corner { background: transparent; }
        #table-overlay-container.active { display: flex; flex-flow: column wrap; align-content: flex-start; align-items: flex-start; gap: 15px; }
        #table-overlay-container > * { margin-bottom: 0 !important; break-inside: avoid; }
        .input-btn-inner { position: absolute; inset: 0; width: 100%; height: 100%; background: transparent; border: none; color: inherit; font: inherit; outline: none; text-align: center; z-index: 2; padding: 0; margin: 0; border-radius: 3px; }
        .input-btn-inner::placeholder { color: rgba(255,255,255,0.4); font-weight: normal; }
        .is-custom-wrapper { padding: 3px 6px; position: relative; }
        .is-custom-wrapper.modified { background: rgba(88,166,255,0.25); border-color: var(--accent-hi); color: #fff; font-weight: 700; box-shadow: inset 0 0 0 1px var(--accent-hi); }
        .exam-tabs { display: flex; gap: 8px; padding-bottom: 8px; overflow-x: auto; flex-shrink: 0; min-height: 28px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
        .exam-tab { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.03); color: var(--dim); border: 1px solid var(--border); padding: 3px 4px 3px 4px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; white-space: nowrap; transition: all 0.2s; user-select: none; }
        .exam-tab:hover { border-color: var(--dim); color: #fff; }
        .exam-tab.active { background: rgba(184, 134, 11, 0.15); color: #d4af37; border-color: #b8860b; }
        .exam-tab-close { background: rgba(255,255,255,0.05); color: var(--dim); border-radius: 3px; padding: 2px 6px; font-size: 14px; line-height: 1; transition: all 0.2s; }
        .exam-tab-close:hover { background: rgba(255, 50, 50, 0.3); color: #fff; }
        .report-exam-heading { color: #d4af37; font-weight: 700; font-size: 11px; margin-top: 6px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; padding-bottom: 1px; border-bottom: 1px solid rgba(184, 134, 11, 0.3); }
        .switch { position: relative; display: inline-block; width: 30px; height: 16px; margin-left: auto; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .2s; border-radius: 16px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: var(--dim); transition: .2s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(14px); background-color: #fff; }
        .slice-viewer { position: absolute; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; gap: 8px; user-select: none; z-index: 101; }
        .slice-viewer img { height: auto; object-fit: contain; border-radius: 4px; cursor: ns-resize; border: 1px solid var(--border); }
        .slice-hint { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
        /* --- DYNAMICKÉ SKRÝVÁNÍ POLÍ PODLE TYPU VYŠETŘENÍ (PET, CT, MR) --- */
        body.is-non-pet .tbl td:has(>[data-id*="_suv"]), body.is-non-pet .tbl td:has(+ td >[data-id*="_suv"]), body.is-non-pet .tbl td:has(>[data-id*="_act"]), body.is-non-pet .tbl td:has(+ td >[data-id*="_act"]), body.is-non-pet .tbl>tbody>tr:has([data-id*="_akt"]), body.is-non-pet .tbl>tbody>tr:has([data-id*="_neakt"]), body.is-non-pet .tbl>tbody>tr:has([data-id*="_fok"]), body.is-non-pet .tbl>tbody>tr:has([data-id*="_poly"]) { display: none !important; }
        .report-frame.no-prefix::before { content: ""; }
        body .tbl > tbody > tr:has([data-id$="_br_gli"]:not(.modified)) [data-id$="_br_gli_loc"] { visibility: hidden !important; } 
        body.hide-ct .tbl > tbody > tr:has([data-id*="_ct_"]) { display: none !important; }
        body.hide-mr .tbl > tbody > tr:has([data-id*="_mr_"]) { display: none !important; }
        .expand-notes-btn { text-align: center; cursor: pointer; color: var(--dim); padding: 4px; font-weight: bold; font-size: 16px; transition: color 0.2s; letter-spacing: 2px; }
        .expand-notes-btn:hover { color: #fff; }
    </style>
</head>
<body>

<header class="panel" id="header-panel">
    <div class="row">
        <span class="label">Vyšetření:</span>
        <div id="exams-container" class="row"></div>
        <div class="row push">
            <span class="label">Minulé:</span>
            <input type="date" class="input input-date" data-action="update-date">
            <button class="btn" data-action="toggle-settings" style="min-width: unset; padding: 2px 6px; font-size: 14px; line-height: 1;" title="Nastavení">⚙</button>
        </div>
    </div>
    <div class="row" style="margin-top: 4px;" id="suv-references-row">
        <div class="row ref-group" data-ref="jatra">
            <span class="label">SUVMAX JATER:</span>
            <input class="input field_suv" data-action="update-field" data-id="suv_jater" value="3.0">
        </div>
        <div class="row ref-group sep" data-ref="jatra_minule">
            <span class="label">MINULE:</span>
            <input class="input field_suv" data-action="update-field" data-id="suv_jater_minule" value="3.0">
        </div>
        <div class="row ref-group sep" data-ref="parotidy" style="display: none;">
            <span class="label">PAROTIDY:</span>
            <input class="input field_suv" data-action="update-field" data-id="suv_parotid" value="20.0">
        </div>
        <div class="row ref-group sep" data-ref="slezina" style="display: none;">
            <span class="label">SLEZINA:</span>
            <input class="input field_suv" data-action="update-field" data-id="suv_sleziny" value="15.0">
        </div>
        <div class="row ref-group sep" data-ref="striatum" style="display: none;">
            <span class="label">STRIATUM:</span>
            <input class="input field_suv" data-action="update-field" data-id="suv_striata" value="2.0">
        </div>
        <div class="row sep push">
            <button class="btn" data-action="toggle-recist" style="min-width: 100px;">RECIST</button>
        </div>
    </div>
    <!-- Settings Modal -->
    <div id="settings-modal" class="panel" style="display: none; position: absolute; top: 38px; right: 5px; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.8); width: 250px; border: 1px solid var(--accent-hi);">
        <h2 style="margin-bottom: 8px;">Nastavení</h2>
        <div class="row" style="margin-bottom: 8px;">
            <span class="label">Slovně místo SUVmax:</span>
            <label class="switch">
                <input type="checkbox" id="setting-suv-word" data-action="update-setting" data-setting="suvWord">
                <span class="slider"></span>
            </label>
        </div>
        <div class="row" style="margin-bottom: 8px;">
            <span class="label" title="Skryje normální nálezy. Při kopírování se ale zkopírují.">Skrýt negativní texty:</span>
            <label class="switch">
                <input type="checkbox" id="setting-hide-predefined" data-action="update-setting" data-setting="hidePredefined">
                <span class="slider"></span>
            </label>
        </div>
        <div class="row">
            <span class="label" title="Před zkopírováním otevře okno pro úpravu textu.">Náhled zprávy:</span>
            <label class="switch">
                <input type="checkbox" id="setting-preview" data-action="update-setting" data-setting="previewReport">
                <span class="slider"></span>
            </label>
        </div>
    </div>
</header>

<main class="panel" id="details-panel">
    <div class="exam-tabs" id="exam-tabs-container"></div>
    <div class="content-area" id="details-content"></div>
</main>

<aside class="panel" id="panel-report">
    <div class="copy-all-zone" data-action="copy-all" title="Kopírovat Report i Conclusion"></div>
    <h2 data-action="copy-text" data-target="report-container" title="Kliknutím zkopíruješ report">Report</h2>
    <div class="content-area" id="report-container"></div>
</aside>

<aside class="panel" id="panel-conclusion">
    <h2 data-action="copy-text" data-target="conclusion-container" title="Kliknutím zkopíruješ závěr">Conclusion</h2>
    <div class="content-area" id="conclusion-container"></div>
</aside>

<div id="preview-backdrop" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1999;" data-action="preview-close"></div>
<div id="preview-modal" class="panel" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 85vw; max-width: 1000px; height: 85vh; box-shadow: 0 0 40px rgba(0,0,0,1); border: 1px solid var(--accent-hi);">
    <div class="row" style="border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px;">
        <h2 style="margin: 0; border: none; padding: 0; color: #fff;">Náhled zprávy před zkopírováním</h2>
        <div class="push row">
            <button class="btn selected" data-action="preview-copy" style="font-weight: bold; min-width: 150px; padding: 6px;">Zkopírovat do schránky</button>
            <button class="btn" data-action="preview-close" style="padding: 6px;">Zavřít</button>
        </div>
    </div>
    <textarea id="preview-textarea" style="width: 100%; flex: 1; background: #000; color: #d1d5db; border: 1px solid var(--border); border-radius: 4px; padding: 15px; font-family: Consolas, monospace; font-size: 14px; line-height: 1.5; resize: none; outline: none; box-sizing: border-box; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);"></textarea>
</div>

<script src="Region_neck.js"></script>
<script src="Region_thorax.js"></script>
<script src="Region_abdomen.js"></script>
<script src="Region_skeleton.js"></script>
<script src="Region_knee.js"></script>

<script>

/* ═══════════════════════════════════════════════
   STORE & GLOBALS
═══════════════════════════════════════════════ */
const savedConfig = JSON.parse(localStorage.getItem('medAppConfig') || '{}');
const APP_SETTINGS = { 
    grammarMerging: true,
    suvWord: savedConfig.suvWord || false,
    hidePredefined: savedConfig.hidePredefined || false,
    previewReport: savedConfig.previewReport || false
};

function saveSettings() {
    localStorage.setItem('medAppConfig', JSON.stringify({ 
        suvWord: APP_SETTINGS.suvWord, 
        hidePredefined: APP_SETTINGS.hidePredefined,
        previewReport: APP_SETTINGS.previewReport
    }));

function formatCzechList(arr) {
    if (!arr || !arr.length) return '';

    if (!APP_SETTINGS.grammarMerging) {
        return arr.join(', ');
    }

    const groups = new Map();
    const validSuffixes = ['vpravo', 'vlevo', 'bilat.', 'l.dx.', 'l.sin.'];

    arr.forEach(item => {
        const parts = item.trim().split(' ');
        if (parts.length > 1) {
            const lastWord = parts[parts.length - 1].toLowerCase();
            if (validSuffixes.includes(lastWord)) {
                const suffix = parts.pop();
                const prefix = parts.join(' ');
                if (!groups.has(suffix)) groups.set(suffix, new Set());
                groups.get(suffix).add(prefix);
            } else {
                if (!groups.has('')) groups.set('', new Set());
                groups.get('').add(item.trim());
            }
        } else {
            if (!groups.has('')) groups.set('', new Set());
            groups.get('').add(item.trim());
        }
    });

    if (groups.has('vpravo') && groups.has('vlevo')) {
        const arrR = Array.from(groups.get('vpravo')).sort();
        const arrL = Array.from(groups.get('vlevo')).sort();
        const isIdentical = arrR.length === arrL.length && arrR.every((val, i) => val === arrL[i]);
        if (isIdentical) {
            if (!groups.has('bilat.')) groups.set('bilat.', new Set());
            arrR.forEach(val => groups.get('bilat.').add(val));
            groups.delete('vpravo');
            groups.delete('vlevo');
        }
    }

    function joinWithAnd(list) {
        if (list.length === 0) return '';
        if (list.length === 1) return list[0];
        if (list.length === 2) return list.join(' a ');
        return list.slice(0, -1).join(', ') + ' a ' + list[list.length - 1];
    }

    function optimizeTerms(list) {
        if (list.length < 2) return list;
        const result = [];
        let i = 0;

        while (i < list.length) {
            let j = i + 1;
            let bestGroup = [list[i]];

            while (j < list.length) {
                const currentGroup = [...bestGroup, list[j]];
                const wordGroups = currentGroup.map(s => s.split(' '));
                
                let prefixIdx = 0;
                while (true) {
                    const word = wordGroups[0][prefixIdx];
                    if (!word || !wordGroups.every(g => g[prefixIdx] === word)) break;
                    prefixIdx++;
                }
                
                let tailIdx = 0;
                while (true) {
                    const word = wordGroups[0][wordGroups[0].length - 1 - tailIdx];
                    if (!word || !wordGroups.every(g => g[g.length - 1 - tailIdx] === word)) break;
                    if (prefixIdx + tailIdx >= Math.min(...wordGroups.map(g => g.length)) - 1) break;
                    tailIdx++;
                }

                if (prefixIdx > 0 || tailIdx > 0) {
                    bestGroup = currentGroup;
                    j++;
                } else {
                    break;
                }
            }

            if (bestGroup.length > 1) {
                const wordGroups = bestGroup.map(s => s.split(' '));
                let pIdx = 0;
                while (pIdx < Math.min(...wordGroups.map(g => g.length)) && wordGroups.every(g => g[pIdx] === wordGroups[0][pIdx])) pIdx++;
                
                let tIdx = 0;
                while (tIdx < Math.min(...wordGroups.map(g => g.length)) - pIdx && wordGroups.every(g => g[g.length - 1 - tIdx] === wordGroups[0][wordGroups[0].length - 1 - tIdx])) tIdx++;

                const prefix = wordGroups[0].slice(0, pIdx).join(' ');
                const tail = wordGroups[0].slice(wordGroups[0].length - tIdx).join(' ');
                const middles = wordGroups.map(g => g.slice(pIdx, g.length - tIdx).join(' '));

                let combined = "";
                if (prefix) combined += prefix + " ";
                combined += joinWithAnd(middles);
                if (tail) combined += " " + tail;
                
                result.push(combined.trim().replace(/\s+/g, ' '));
                i = j;
            } else {
                result.push(list[i]);
                i++;
            }
        }
        return result;
    }

    const finalPhrases = [];
    groups.forEach((prefixesSet, suffixStr) => {
        let prefixes = Array.from(prefixesSet);
        prefixes = optimizeTerms(prefixes);
        
        if (suffixStr === '') {
            finalPhrases.push(...prefixes);
        } else {
            let joinedPrefixes = joinWithAnd(prefixes);
            finalPhrases.push(`${joinedPrefixes} ${suffixStr}`);
        }
    });

    return joinWithAnd(finalPhrases);
}

// Global registry of all button configurations extracted during render
const ButtonConfigs = {};

const Store = new Proxy(
    { 
        exams: new Set(JSON.parse(localStorage.getItem('medApp_lastExams') || '[]')), 
        activeTab: localStorage.getItem('medApp_lastTab') || null,
        indication: '', 
        pastDate: '', 
        buttonStates: {}, 
        customTexts: {}, 
        fields: { suv_jater: '3.0', suv_jater_minule: '3.0' }, 
        activeTable: null,
        activeSlice: 1,
        activeViewerKey: null,
        recist: false,
        instances: {},
        expandedNotes: {}
    },
    {
        set(target, prop, value) {
            if (target[prop] === value) return true;
            target[prop] = value;

            if (prop === 'exams') {
                localStorage.setItem('medApp_lastExams', JSON.stringify(Array.from(value)));
                UI.render('exams');
            } else if (prop === 'activeTab') {
                localStorage.setItem('medApp_lastTab', value || '');
                UI.renderDetails();
            } else if (prop === 'pastDate') {
                UI.updatePastDateVisibility(value);
                UI.renderReport();
            } else if (prop === 'customTexts' || prop === 'fields') {
                UI.renderReport();
            } else if (prop === 'activeTable') {
                if (value === null) {
                    const newExpanded = { ...target.expandedNotes };
                    let changed = false;
                    Object.keys(newExpanded).forEach(tableKey => {
                        const parts = tableKey.split('_');
                        const regionId = parts[parts.length - 3]; 
                        const hasContent = Object.keys(target.fields).some(fKey => fKey.includes(`_${regionId}_`) && target.fields[fKey] !== '');
                        if (!hasContent) {
                            delete newExpanded[tableKey];
                            changed = true;
                        }
                    });
                    if (changed) target.expandedNotes = newExpanded;
                }
                UI.renderActiveTable();
                UI.renderReport();
            } else if (prop === 'activeSlice' || prop === 'activeViewerKey') {
                UI.updateSliceViewer(target.activeViewerKey, target.activeSlice);
            } else {
                UI.render(prop);
            }
            return true;
        }
    }
);

function getExamById(id) {
    for (const cat of Object.values(EXAMS)) {
        const found = cat.find(e => e.id === id);
        if (found) return found;
    }
    return null;
}

        }

        let isZeroOldSize = false;

    },

    parseLesionEtiology: (ctx, etioPfx) => {
        let etioMap = [
            { id: `${etioPfx}_b`, base: 'benigní' },
            { id: `${etioPfx}_m`, base: 'maligní' },
            { id: `${etioPfx}_t`, base: 'tumor' },
            { id: `${etioPfx}_meta`, base: 'meta' },
            { id: `${etioPfx}_inf`, base: 'zánět' }
        ];

        let certainties = { '!': [], '+': [], '?': [] };
        let hasQ = ctx.isActive(`${etioPfx}_q`);

        etioMap.forEach(e => {
            if (ctx.isActive(e.id)) {
                let val = ctx.text(e.id);
                if (val.endsWith('!')) certainties['!'].push(e.base);
                else if (val.endsWith('+')) certainties['+'].push(e.base);
                else if (val.endsWith('?')) certainties['?'].push(e.base);
            }
        });

        if (ctx.isActive(`${etioPfx}_cust_etio`)) {
            let val = ctx.text(`${etioPfx}_cust_etio`).trim();
            if (val && val !== 'vlastní') {
                let level = '+'; 
                let base = val;
                if (val.endsWith('!')) { level = '!'; base = val.slice(0, -1).trim(); }
                else if (val.endsWith('+')) { level = '+'; base = val.slice(0, -1).trim(); }
                else if (val.endsWith('?')) { level = '?'; base = val.slice(0, -1).trim(); }
                certainties[level].push(base);
            }
        }

        let etioStr = "";
        if (hasQ) {
            etioStr = "etiologii nyní nelze spolehlivě určit";
        } else {
            let highestLevel = null;
            if (certainties['!'].length > 0) highestLevel = '!';
            else if (certainties['+'].length > 0) highestLevel = '+';
            else if (certainties['?'].length > 0) highestLevel = '?';

            if (highestLevel) {
                let highestItems = certainties[highestLevel];
                let highestStr = "";
                
                if (highestItems.length > 1) {
                    highestStr = "v dif.dg. " + highestItems.join(', ');
                } else {
                    let item = highestItems[0];
                    if (highestLevel === '!') {
                        if (item === 'benigní') highestStr = 'benigního charakteru';
                        else if (item === 'maligní') highestStr = 'maligního charakteru';
                        else if (item === 'tumor') highestStr = 'charakteru tumoru';
                        else if (item === 'meta') highestStr = 'charakteru metastázy';
                        else if (item === 'zánět') highestStr = 'zánětlivé etiologie';
                        else highestStr = 'v.s. ' + (GRAMMAR_DICT.etiologie2pad?.[item.toLowerCase()] || item);
                    } else if (highestLevel === '+') {
                        highestStr = 'v.s. ' + item;
                    } else if (highestLevel === '?') {
                        highestStr = 'susp. ' + item;
                    }
                }

                let otherItems = [];
                if (highestLevel === '!') {
                    otherItems = [...certainties['+'], ...certainties['?']];
                } else if (highestLevel === '+') {
                    otherItems = [...certainties['?']];
                }

                if (otherItems.length > 0) {
                    etioStr = highestStr + ", v dif.dg. " + otherItems.join(', ');
                } else {
                    etioStr = highestStr;
                }
            }
        }
        return etioStr;
    },

    parseDetails: (ctx, examId, regionId, pfx, metPfx, etioPfx, isLN) => {
        const capitalize = (s) => s && s[0].toUpperCase() + s.slice(1);
        
        const pocetIds = [`${pfx}_c_soli`, `${pfx}_c_dve`, `${pfx}_c_vice`, `${pfx}_c_mnoho`];
        let pocetRawId = pocetIds.find(id => ctx.isActive(id));
        let pocetText = pocetRawId ? ButtonConfigs[`${examId}_${regionId}_${pocetRawId}`].text : 'solitární';

        const druhIds = isLN ? [`${pfx}_k_uzl`, `${pfx}_k_pak`, `${pfx}_k_cust`] : [`${pfx}_k_les`, `${pfx}_k_cys`, `${pfx}_k_exp`, `${pfx}_k_inf`, `${pfx}_k_def`, `${pfx}_k_kol`, `${pfx}_k_cust`];
        let druhRawId = druhIds.find(id => ctx.isActive(id));
        let defaultDruh = isLN ? 'uzlina' : 'ložisko';
        let druhRaw = defaultDruh;
        if (druhRawId === `${pfx}_k_cust`) {
            druhRaw = Store.customTexts[`${examId}_${regionId}_${pfx}_k_cust`] || defaultDruh;
        } else if (druhRawId) {
            const btnCfg = ButtonConfigs[`${examId}_${regionId}_${druhRawId}`];
            if (btnCfg.type === 'standard') {
                const stateVal = ctx.text(druhRawId);
                const stateMap = { 'sklerotické': 'sklerotické ložisko', 'lytické': 'lytické ložisko', 'smíšené': 'smíšené ložisko', 'dřeňové': 'ložisko kostní dřeně', 'cystické': 'cystické ložisko' };
                druhRaw = stateMap[stateVal] || stateVal;
            } else {
                druhRaw = btnCfg.text === 'cysta' ? 'cystické ložisko' : btnCfg.text;
            }
        }

        let druhObj = GRAMMAR_DICT.druh[druhRaw] || { rod: isLN ? 'f' : 'n', plural: druhRaw };
        let isPlural = pocetText !== 'solitární';
        let pocetSlovo = GRAMMAR_DICT.pocet[pocetText]?.[druhObj.rod] || pocetText;
        let druhSlovo = isPlural ? druhObj.plural : druhRaw;
        
        let baseText = pocetText === 'solitární' ? capitalize(druhSlovo) : capitalize(`${pocetSlovo} ${druhSlovo}`.trim());

        let vzhledy = [];
        
        // --- MR ---
        let mrT1 = ctx.text(`${pfx}_mr_t1`);
        if (mrT1 && mrT1 !== 'T1') vzhledy.push(mrT1 + 'signální');
        
        let mrT2 = ctx.text(`${pfx}_mr_t2`);
        if (mrT2 && mrT2 !== 'T2') vzhledy.push(mrT2 + 'signální');
        
        let mrDwi = ctx.text(`${pfx}_mr_dwi`);
        if (mrDwi === 'DWI -') vzhledy.push('bez restrikce difuze');
        else if (mrDwi === 'DWI +') vzhledy.push('s restrikcí difuze');
        
        let mrSwi = ctx.text(`${pfx}_mr_swi`);
        if (mrSwi === 'SWI -') vzhledy.push('v SWI negativní');
        else if (mrSwi === 'SWI +') vzhledy.push('s výpadky signálu v SWI');

        let mrT1c = ctx.text(`${pfx}_mr_t1c`);
        if (mrT1c === 'bez sycení') vzhledy.push('bez sycení po k.l.');
        else if (mrT1c === 'sycení') vzhledy.push('se sycením po k.l.');
        else if (mrT1c === 'izovaskulární') vzhledy.push('izovaskulární');
        else if (mrT1c === 'progresivní') vzhledy.push('s progresivním sycením');
        else if (mrT1c === 'wash-out') vzhledy.push('s wash-out fenoménem');

        if (isLN && ctx.isActive(`${pfx}_mr_ece`)) vzhledy.push('s extrakapsulárním šířením (ECE)');

        // --- CT ---
        if (ctx.isActive(`${pfx}_ct_bez`)) {
            vzhledy.push('bez CT korelátu');
        } else {
            let ctNat = ctx.text(`${pfx}_ct_nat`);
            if (ctNat && ctNat !== 'nativ') vzhledy.push(ctNat.replace('nativ ', 'nativně ') + 'denzní');

            let ctSyc = ctx.text(`${pfx}_ct_syc`);
            if (ctSyc === 'bez sycení') vzhledy.push('bez sycení');
            else if (ctSyc === 'sycení') vzhledy.push('se sycením');
            else if (ctSyc === 'izovaskulární') vzhledy.push('izovaskulární');
            else if (ctSyc === 'progresivní') vzhledy.push('s progresivním sycením');
            else if (ctSyc === 'wash-out') vzhledy.push('s wash-out fenoménem');

            let ctNek = ctx.text(`${pfx}_ct_nek`);
            if (ctNek === 'centrální') vzhledy.push('s centrální nekrózou');

            let ctKal = ctx.text(`${pfx}_ct_kal`);
            if (ctKal === 'centrální') vzhledy.push('s centrální kalcifikací');
            else if (ctKal === 'periferní') vzhledy.push('s periferními kalcifikacemi');
            else if (ctKal === 'nepravid.') vzhledy.push('s nepravidelnými kalcifikacemi');
        }

        let vzhledText = vzhledy.length > 0 ? ` (${vzhledy.join(', ')})` : '';

        let rowNej = document.getElementById(`${pfx}_r7`);
        if (rowNej) {
            const wrapperTr = rowNej.closest('tr');
            if (wrapperTr) wrapperTr.style.display = (pocetText === 'solitární') ? 'none' : '';
        }

        let metrikyStr = isLN ? LESIONS_DEFINITION.parseLymphNodeMetrics(ctx, metPfx, pocetText, ctx.field(`${pfx}_nej_text`)) : LESIONS_DEFINITION.parseLesionMetrics(ctx, metPfx, pocetText, ctx.field(`${pfx}_nej_text`));
        let doplneni = ctx.isActive(`${pfx}_doplneni`) ? (Store.customTexts[`${examId}_${regionId}_${pfx}_doplneni`] || '') : '';
        let doplneniStr = doplneni ? ` ${doplneni}` : '';
        let etioStr = isLN ? LESIONS_DEFINITION.parseLymphNodeEtiology(ctx, etioPfx) : LESIONS_DEFINITION.parseLesionEtiology(ctx, etioPfx);
        
        const activityTerms = [
            { match: 'fdg', with: 'metabolickou aktivitou', without: 'metabolické aktivity', adj: { 'nízká': 'nízkou', 'intermediární': 'intermediární', 'zvýšená': 'zvýšenou', 'vysoká': 'vysokou' } },
            { match: 'psma', with: 'PSMA expresí', without: 'PSMA exprese', adj: { 'nízká': 'nízkou', 'intermediární': 'intermediární', 'zvýšená': 'zvýšenou', 'vysoká': 'vysokou' } },
            { match: 'dotatoc', with: 'nakupením somatostatinových receptorů', without: 'nakupení somatostatinových receptorů', adj: { 'nízká': 'nízkým', 'intermediární': 'intermediárním', 'zvýšená': 'zvýšeným', 'vysoká': 'vysokým' } },
            { match: 'dopa', with: 'konzumpcí aminokyseliny', without: 'konzumpce aminokyseliny', adj: { 'nízká': 'nízkou', 'intermediární': 'intermediární', 'zvýšená': 'zvýšenou', 'vysoká': 'vysokou' } },
            { match: '', with: 'akumulací RF', without: 'akumulace RF', adj: { 'nízká': 'nízkou', 'intermediární': 'intermediární', 'zvýšená': 'zvýšenou', 'vysoká': 'vysokou' } }
        ];
        const term = activityTerms.find(t => (examId || '').toLowerCase().includes(t.match)) || activityTerms[activityTerms.length - 1];

        let act = ctx.text(`${metPfx}_act`, true);
        let actStr = '';
        if (act && act !== '0' && act !== 'není') {
            let actLevel = term.adj[act] || act;
            actStr = ` s ${actLevel} ${term.with}`;
        } else if (act === 'není') {
            actStr = ` bez ${term.without}`;
        }
        
        let dynStr = ctx.getDynamics(`${metPfx}_size`, `${metPfx}_size_old`, `${metPfx}_suv`, `${metPfx}_suv_old`);
        if (dynStr) dynStr = `, ${dynStr}`;

        let hasAny = !!(pocetRawId || druhRawId || ctx.field(`${metPfx}_size`) || ctx.field(`${metPfx}_suv`) || vzhledy.length > 0 || etioStr !== "");

        return { hasAny, baseText, vzhledText, metrikyStr, doplneniStr, etioStr, actStr, dynStr };
    }
};

            const examId = ctx.examId || 'default';

            const isMR = (examId || '').toLowerCase().includes('mr');
            const cap = (s) => s && s.charAt(0).toUpperCase() + s.slice(1);

            const hemoInsts = Store.instances?.['brain_hemo_main'] || [];
