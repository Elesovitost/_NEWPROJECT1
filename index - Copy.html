/* ═══════════════════════════════════════════════
   CONTEXT HELPER FOR REPORTS
═══════════════════════════════════════════════ */

function createContext(regionId, examId) {
    const isPET = examId.includes('pet');
    const isPetOnly = (id) => !isPET && (id.includes('_suv') || id.includes('_act') || id.includes('_akt') || id.includes('_neakt') || id.includes('_fok') || id.includes('_poly') || id.includes('ji_aktdist') || id.includes('ji_aktdif'));
    return {
        _val(localId) {
            if (isPetOnly(localId)) return 0;
            return Store.buttonStates[`${examId}_${regionId}_${localId}`];
        },
        isActive(localId, statesArray = null) {
            if (isPetOnly(localId)) return false;
            const globalId = `${examId}_${regionId}_${localId}`;
            const val = this._val(localId);
            const cfg = ButtonConfigs[globalId];
            if (!cfg) return false;
            
            if (cfg.type === 'standard') {
                if (statesArray) return statesArray.includes(val || 0);
                return (val || 0) > 0;
            }
            return val === true || val === 'custom';
        },
        text(localId, lowercase = false) {
            if (isPetOnly(localId)) return '';
            const globalId = `${examId}_${regionId}_${localId}`;
            const val = Store.buttonStates[globalId] || 0;
            const cfg = ButtonConfigs[globalId];
            if (!cfg) return '';
            
            let txt = '';
            if (cfg.type === 'standard') {
                const stateNameRaw = cfg.states[val];
                if (stateNameRaw === 'custom') {
                    txt = Store.customTexts[globalId] || '[Nevyplněno]';
                } else {
                    const fieldMatch = stateNameRaw.match(/^(.*?)\s*\[field:([^:]+):([^\]]+)\]$/);
                    if (fieldMatch) {
                        const baseName = fieldMatch[1].trim();
                        const fieldGlobalId = `${globalId}_${fieldMatch[3].trim()}`;
                        const fieldVal = Store.fields[fieldGlobalId] || '[Nevyplněno]';
                        txt = `${baseName} ${fieldVal}`;
                    } else {
                        txt = stateNameRaw;
                    }
                }
            } else if (cfg.type === 'basic') {
                if (val === 'custom') txt = Store.customTexts[globalId] || '[Nevyplněno]';
                else if (val === true) txt = cfg.text;
                else txt = 'Negativní';
            } else if (cfg.type === 'basic_custom') {
                txt = val ? (Store.customTexts[globalId] || '[Nevyplněno]') : 'Negativní';
            }
            
            return lowercase ? txt.toLowerCase() : txt;
        },
        field(fieldId) {
            if (isPetOnly(fieldId)) return '';
            return Store.fields[`${examId}_${regionId}_${fieldId}`] || '';
        },
        getDynamics(sizeId, sizeOldId, suvId, suvOldId) {
            if (!Store.pastDate) return "";

            const currSize = this.field(sizeId);
            const minSize = this.field(sizeOldId);
            const currSuv = this.field(suvId);
            const minSuv = this.field(suvOldId);
            
            const cLiv = parseFloat((Store.fields['suv_jater'] || '3.0').replace(',', '.'));
            const mLiv = parseFloat((Store.fields['suv_jater_minule'] || '3.0').replace(',', '.'));

            return MetricsEngine.calculateDynamics(currSize, minSize, currSuv, minSuv, cLiv, mLiv, Store.recist);
        },
        mapStates(config) {
            const found = [];
            for (const item of config.items) {
                const globalId = `${examId}_${regionId}_${item.id}`;
                const val = Store.buttonStates[globalId] || 0;
                
                if (val > 0 && item[val]) {
                    found.push(item[val]);
                } else if (val === 'custom' || (val > 0 && ButtonConfigs[globalId]?.states[val] === 'custom')) {
                    const customTxt = Store.customTexts[globalId];
                    if (customTxt) found.push(customTxt);
                }
            }
            if (found.length === 0) return '';
            const merged = formatCzechList(found);
            return (config.prefix || '') + merged + (config.suffix || '');
        },
        mapConditions(rules) {
            let result = "";
            for (const rule of rules) {
                const matched = [];
                for (const item of rule.items) {
                    if (this.isActive(item.id, rule.states)) matched.push(item.text);
                }
                if (matched.length > 0) {
                    result += `${rule.prefix || ''}${matched.join(rule.separator || ', ')}${rule.suffix || ''}\n`;
                }
            }
            return result;
        }
    };
}

/* ═══════════════════════════════════════════════
   METRICS HELPER
═══════════════════════════════════════════════ */
const MetricsEngine = {
    getSuvText: function(suvStr) {
        if (!APP_SETTINGS.suvWord) return `se SUVmax = ${suvStr}`;
        const suv = parseFloat(String(suvStr).replace(',', '.'));
        if (isNaN(suv)) return `se SUVmax = ${suvStr}`;
        
        const refLiv = parseFloat((Store.fields['suv_jater'] || '3.0').replace(',', '.'));
        const refPar = parseFloat((Store.fields['suv_parotid'] || '20.0').replace(',', '.'));
        const refSle = parseFloat((Store.fields['suv_sleziny'] || '15.0').replace(',', '.'));
        const exam = (Store.activeTab || '').toLowerCase();
        
        if (exam.includes('psma')) {
            const pctLiv = suv / refLiv;
            if (pctLiv <= 0.1) return "bez patrné akumulace RF";
            if (pctLiv <= 0.3) return "s akumulací RF pod úrovní ref. poolu";
            if (pctLiv <= 1.0) return "s akumulací RF pod úrovní ref. jater";
            if (suv < refPar) return "s akumulací RF nad úrovní ref. jater";
            return "s akumulací RF nad úrovní ref. parotid";
        } else if (exam.includes('dotatoc')) {
            const pctLiv = suv / refLiv;
            if (pctLiv <= 0.1) return "bez patrné akumulace RF";
            if (pctLiv < 0.9) return "s akumulací RF pod úrovní ref. jater";
            if (pctLiv <= 1.1) return "s akumulací RF na úrovni ref. jater";
            if (suv < refSle) return "s akumulací RF nad úrovní ref. jater";
            return "s akumulací RF nad úrovní ref. sleziny";
        } else {
            const pctLiv = suv / refLiv;
            if (pctLiv <= 0.2) return "bez patrné akumulace RF";
            if (pctLiv < 0.8) {
                const diff = Math.round((1 - pctLiv) * 10) * 10;
                return `s akumulací RF o ${diff} % nižší než ref. játra`;
            }
            if (pctLiv <= 1.2) return "s akumulací RF obdobnou jako ref. játra";
            if (pctLiv < 1.9) {
                const diff = Math.round((pctLiv - 1) * 10) * 10;
                return `s akumulací RF o ${diff} % vyšší než ref. játra`;
            }
            return `s akumulací  ${Math.round(pctLiv)}x vyšší než játra`;
        }
    },

    getAutoActivityLevel: function(suvVal, refLiv, refPar, refSle, examId) {
        if (isNaN(suvVal) || suvVal < 0) return 0;
        const exam = examId.toLowerCase();
        if (exam.includes('psma')) {
            if (isNaN(refLiv) || refLiv <= 0) return 0;
            const par = (!isNaN(refPar) && refPar > 0) ? refPar : refLiv * 3;
            if (suvVal <= refLiv * 0.1) return 1;
            if (suvVal < refLiv * 0.3) return 2;
            if (suvVal <= refLiv) return 3;
            if (suvVal < par) return 4;
            return 5;
        }
        if (exam.includes('dotatoc')) {
            if (isNaN(refLiv) || refLiv <= 0) return 0;
            const sle = (!isNaN(refSle) && refSle > 0) ? refSle : refLiv * 5;
            if (suvVal <= refLiv * 0.1) return 1;
            if (suvVal < refLiv * 0.9) return 2;
            if (suvVal <= refLiv * 1.1) return 3;
            if (suvVal < sle) return 4;
            return 5;
        }
        if (exam.includes('dopa')) {
            return 0;
        }
        if (isNaN(refLiv) || refLiv <= 0) return 0;
        const r = suvVal / refLiv;
        if (r < 0.2) return 1; 
        if (r < 0.8) return 2; 
        if (r <= 1.2) return 3; 
        if (r <= 1.5) return 4; 
        return 5; 
    },

    updateActivityForField: function(fieldId, newValue) {
        if (fieldId === 'suv_jater_minule' || fieldId.endsWith('_suv_old')) {
            return; 
        }
        if (fieldId === 'suv_jater' || fieldId === 'suv_parotid' || fieldId === 'suv_sleziny') {
            for (const key in Store.fields) {
                if (key.endsWith('_suv') && !key.endsWith('_suv_old') && !['suv_jater', 'suv_parotid', 'suv_sleziny', 'suv_striata'].includes(key)) {
                   this.updateSingleActivity(key, Store.fields[key]);
                }
            }
        } 
        else if (fieldId.endsWith('_suv')) {
            this.updateSingleActivity(fieldId, newValue);
        }
    },

    updateSingleActivity: function(suvFieldId, suvValue) {
        const actFieldId = suvFieldId.replace('_suv', '_act');
        if (!ButtonConfigs[actFieldId]) return;
        const suvVal = parseFloat(String(suvValue || '').replace(',', '.'));
        const refLiv = parseFloat((Store.fields['suv_jater'] || '3.0').replace(',', '.'));
        const refPar = parseFloat((Store.fields['suv_parotid'] || '20.0').replace(',', '.'));
        const refSle = parseFloat((Store.fields['suv_sleziny'] || '15.0').replace(',', '.'));
        const examId = Store.activeTab || '';
        const newActIndex = this.getAutoActivityLevel(suvVal, refLiv, refPar, refSle, examId);
        if (Store.buttonStates[actFieldId] !== newActIndex) {
           Store.buttonStates = { ...Store.buttonStates, [actFieldId]: newActIndex };
        }
    },

    getPctChange: function(curr, min) {
        if (!min || min <= 0) return null;
        return ((curr - min) / min) * 100;
    },

    getNormalizedSuv: function(suv, refLiv) {
        return (refLiv && refLiv > 0) ? (suv / refLiv) : suv;
    },

    getSuvDynamicsWord: function(currSuv, minSuv, cLiv, mLiv) {
        const cSuv = parseFloat(String(currSuv).replace(',', '.'));
        const mSuv = parseFloat(String(minSuv).replace(',', '.'));
        if (isNaN(cSuv) || isNaN(mSuv) || mSuv <= 0) return "nelze srovnat";
        
        const pct = this.getPctChange(this.getNormalizedSuv(cSuv, cLiv), this.getNormalizedSuv(mSuv, mLiv));
        if (pct === null) return "obdobná";
        
        const absPct = Math.abs(pct);
        if (absPct < 20) return "obdobná";
        
        const mod = absPct < 50 ? "mírný " : (absPct < 75 ? "" : "výrazný ");
        return pct > 0 ? `${mod}vzestup`.trim() : `${mod}pokles`.trim();
    },

    calculateDynamics: function(currSize, minSize, currSuv, minSuv, cLiv, mLiv, isRecistActive) {
        let sState = null, aState = null;
        let isNew = false;
        
        if (currSize && minSize) {
            const getMax = (s) => { const n = String(s).match(/\d+(\.\d+)?/g); return n ? Math.max(...n.map(Number)) : null; };
            const cVal = getMax(currSize), mVal = getMax(minSize);
            if (cVal !== null && mVal !== null) {
                if (mVal === 0 && cVal > 0) {
                    isNew = true;
                } else if (mVal > 0) {
                    const pct = this.getPctChange(cVal, mVal), absPct = Math.abs(pct);
                    sState = { trend: 0, mod: "", pctStr: "" };
                    if (absPct > 10) {
                        sState.trend = pct > 0 ? 1 : -1;
                        sState.mod = absPct < 20 ? "mírné" : absPct <= 50 ? "" : "výrazné";
                        if (absPct >= 20 && isRecistActive) sState.pctStr = ` (${pct > 0 ? '+' : '-'}${Math.round(pct / 10) * 10}%)`;
                    }
                }
            }
        }
        
        if (isNew) return "nově";

        if (currSuv && minSuv) {
            const cSuv = parseFloat(String(currSuv).replace(',', '.')), mSuv = parseFloat(String(minSuv).replace(',', '.'));
            if (!isNaN(cSuv) && !isNaN(mSuv) && mSuv > 0) {
                const pct = this.getPctChange(this.getNormalizedSuv(cSuv, cLiv), this.getNormalizedSuv(mSuv, mLiv));
                if (pct !== null) {
                    const absPct = Math.abs(pct);
                    aState = { trend: 0, mod: "" };
                    if (absPct >= 20) { 
                        aState.trend = pct > 0 ? 1 : -1; 
                        aState.mod = absPct < 50 ? "mírné" : absPct < 75 ? "zřetelné" : "výrazné"; 
                    }
                }
            }
        }

        const format = (st, isSize) => {
            if (st.trend === 0) return isSize ? "rozměrově stacionární" : "akumulačně přibližně stacionární";
            return `${st.mod ? 'v(e) ' + st.mod : 'v'} ${isSize ? 'rozměrové' + st.pctStr : 'akumulační'} ${st.trend === 1 ? 'progresi' : 'regresi'}`.replace('v(e) v', 've v').replace('v(e)', 'v');
        };
        
        if (sState && aState) {
            if (sState.trend === 0 && aState.trend === 0) return "rozměrově i akumulačně přibližně stacionární";
            if (sState.trend === aState.trend && sState.trend !== 0) {
                const tW = sState.trend === 1 ? 'progresi' : 'regresi';
                return sState.mod === aState.mod 
                    ? `${sState.mod ? 'v(e) '+sState.mod : 'v'} rozměrové${sState.pctStr} i akumulační ${tW}`.replace('v(e) v', 've v').replace('v(e)', 'v') 
                    : `${sState.mod ? 'v(e) '+sState.mod : 'v'} rozměrové${sState.pctStr} a ${aState.mod} akumulační ${tW}`.replace('v(e) v', 've v').replace('v(e)', 'v');
            }
            return `${format(sState, true)} a ${format(aState, false)}`;
        }
        return sState ? format(sState, true) : aState ? format(aState, false) : "";
    }
};

/* ═══════════════════════════════════════════════
   BUTTON FACTORY
═══════════════════════════════════════════════ */
function getButtonBase(regionId, itemConfig, longestOverride) {
    const baseCfg = (REGIONS[regionId].buttons || {})[itemConfig.btn] || {};
    const type   = itemConfig.type || baseCfg.type || 'standard';
    const states = itemConfig.states || baseCfg.states;
    const text   = itemConfig.text || baseCfg.text;
    const custom = Boolean(itemConfig.custom !== undefined ? itemConfig.custom : baseCfg.custom);
    
    const localId = itemConfig.id || itemConfig.btn;
    const examId = Store.activeTab || 'default';
    const globalId = `${examId}_${regionId}_${localId}`;
    ButtonConfigs[globalId] = { type, states, text, custom };
    
    let longestStr = typeof longestOverride === 'string' ? longestOverride : '';
    const longest = longestStr || (states ? states.map(s => s.replace(/\s*\[field:[^\]]+\]/, '')).reduce((a, b) => a.length > b.length ? a : b, '') : (text || ''));
    
    return { type, states, text, custom, globalId, longest };
}

function createButtonElement(config, isActive, btnLabel, action) {
    return el('button', {
        className: `btn btn-state${isActive ? ' modified' : ''}`,
        'data-action': action,
        'data-id': config.globalId,
        'data-longest': config.longest,
        'aria-pressed': isActive.toString()
    }, [el('span', { textContent: btnLabel })]);
}

function makeBasicButton(config) {
    const rawState = Store.buttonStates[config.globalId] ?? false;
    const showCustomInput = Boolean(config.custom && rawState === 'custom');
    const isActive = Boolean(rawState === true || showCustomInput);
    const btn = createButtonElement(config, isActive, config.text, 'toggle-basic');

    if (showCustomInput) {
        const inp = el('input', {
            className: 'input',
            value: Store.customTexts[config.globalId] || '',
            'data-action': 'update-custom-input',
            'data-id': config.globalId,
            placeholder: 'vlastní'
        });
        return el('div', { className: 'row' }, [btn, inp]);
    }
    return btn;
}

function makeBasicCustomButton(config) {
    const isActive = Boolean(Store.buttonStates[config.globalId]);
    const btn = createButtonElement(config, isActive, config.text, 'toggle-basic-custom');

    if (isActive) {
        const inp = el('input', {
            className: 'input',
            value: Store.customTexts[config.globalId] || '',
            'data-action': 'update-custom-input',
            'data-id': config.globalId,
            placeholder: 'Upřesnit...'
        });
        return el('div', { className: 'row' }, [btn, inp]);
    }
    return btn;
}

function makeStandardButton(config) {
    const idx = Store.buttonStates[config.globalId] || 0;
    const rawStateStr = config.states && config.states[idx] !== undefined ? config.states[idx] : 'N/A';
    const isActive = Boolean(idx > 0);
    
    const fieldMatch = rawStateStr.match(/^(.*?)\s*\[field:([^:]+):([^\]]+)\]$/);
    const isCustomInline = rawStateStr === 'custom';
    
    let btnLabel = rawStateStr;
    let fieldConfig = null;
    let fieldIdSuffix = null;

    if (fieldMatch) {
        btnLabel = fieldMatch[1].trim();
        fieldConfig = fieldMatch[2].trim();
        fieldIdSuffix = fieldMatch[3].trim();
    } else if (isCustomInline) {
        btnLabel = '';
    }

    const btn = el('button', {
        className: `btn btn-state${isActive ? (isCustomInline ? ' is-custom-wrapper modified' : ' modified') : ''}`,
        'data-action': 'cycle-state',
        'data-id': config.globalId,
        'data-longest': config.longest,
        'aria-pressed': isActive.toString()
    });

    if (isCustomInline) {
        const inp = el('input', {
            className: 'input-btn-inner',
            value: Store.customTexts[config.globalId] || '',
            'data-action': 'update-custom-input',
            'data-id': config.globalId,
            placeholder: 'vlastní'
        });
        btn.appendChild(inp);
    } else {
        btn.appendChild(el('span', { textContent: btnLabel }));
    }

    if (fieldConfig && fieldIdSuffix) {
        const fieldGlobalId = `${config.globalId}_${fieldIdSuffix}`;
        const inp = el('input', {
            className: `input ${fieldConfig}`,
            'data-action': 'update-field',
            'data-id': fieldGlobalId
        });
        inp.value = Store.fields[fieldGlobalId] || '';
        if (fieldConfig === 'field_size' && Store.fields[`${fieldGlobalId}_dims`]) {
            inp.dataset.dims = Store.fields[`${fieldGlobalId}_dims`];
        }
        return el('div', { className: 'row' }, [btn, inp]);
    }

    return btn;
}

function makeButton(regionId, itemConfig, longestOverride = null) {
    const config = getButtonBase(regionId, itemConfig, longestOverride);
    if (config.type === 'basic_custom') return makeBasicCustomButton(config);
    if (config.type === 'basic') return makeBasicButton(config);
    return makeStandardButton(config);
}

/* ═══════════════════════════════════════════════
   TABLE FACTORIES
═══════════════════════════════════════════════ */
function _tableLongest(rows, regionId) {
    const texts = [];
    for (const row of rows) {
        for (const cell of (Array.isArray(row) ? row : [row])) {
            for (const item of (Array.isArray(cell) ? cell : [cell])) {
                if (item?.btn) {
                    const cfg = (REGIONS[regionId].buttons || {})[item.btn] || {};
                    const type = item.type || cfg.type || 'standard';
                    
                    if (type.startsWith('basic')) {
                        texts.push(item.text || cfg.text || '');
                    } else {
                        const states = item.states || cfg.states || [];
                        texts.push(...states.map(s => s.replace(/\s*\[field:[^\]]+\]/, '')));
                    }
                }
            }
        }
    }
    return texts.reduce((a, b) => (a.length > b.length ? a : b), '');
}

function _renderCell(td, cell, longestObj, regionId) {
    const items = Array.isArray(cell) ? cell : [cell];
    if (items.length > 1) td.appendChild(el('div', { className: 'row' }, items.map(i => _cellItem(i, longestObj, regionId))));
    else                  td.appendChild(_cellItem(items[0], longestObj, regionId));
}

function _cellItem(item, longestObj, regionId) {
    if (typeof item === 'string') {
        const span = document.createElement('span');
        span.textContent = item;
        return span;
    }
    if (item?.btn) return makeButton(regionId, item, longestObj);
    if (item?.field) {
        const examId = Store.activeTab || 'default';
        const cls = { size: 'field_size', suv: 'field_suv', mm: 'field_mm', text: 'field_text' }[item.field] || 'field_mm';
        const fieldGlobalId = `${examId}_${regionId}_${item.id || item.field}`;
        const inp = el('input', { 
            className: `input ${cls}`, 
            placeholder: item.placeholder || '',
            'data-action': 'update-field',
            'data-id': fieldGlobalId
        });
        inp.value = Store.fields[fieldGlobalId] || '';
        
        if (item.field === 'size' && Store.fields[`${fieldGlobalId}_dims`]) {
            inp.dataset.dims = Store.fields[`${fieldGlobalId}_dims`];
        }

        if (item.step) inp.dataset.step = item.step;
        return inp;
    }
    return document.createTextNode('');
}

function Table1col(id, cells, regionId) {
    const longest = _tableLongest([cells], regionId);
    const table = el('table', { id: id, className: 'tbl tbl-full' });
    const tbody = el('tbody');
    
    const isAddTable = id.endsWith('_add');
    const examId = Store.activeTab || 'default';
    const tableKey = `${examId}_${id}`;
    
    let hasValue = false;
    if (isAddTable) {
        for (const cell of cells) {
            const items = Array.isArray(cell) ? cell : [cell];
            for (const item of items) {
                if (item && (item.field || item.id)) {
                    const fieldGlobalId = `${examId}_${regionId}_${item.id || item.field}`;
                    const val = Store.fields[fieldGlobalId];
                    if (val && typeof val === 'string' && val.trim() !== '') hasValue = true;
                }
            }
        }
    }
    
    const isExpanded = Store.expandedNotes[tableKey] || hasValue;

    if (isAddTable && !isExpanded) {
        const tr = el('tr');
        const td = el('td', { className: 'tbl-full-cell expand-notes-btn', textContent: '...', 'data-action': 'expand-notes', 'data-payload': tableKey });
        tr.appendChild(td);
        tbody.appendChild(tr);
    } else {
        for (const cell of cells) {
            const tr = el('tr');
            const td = el('td', { className: 'tbl-full-cell' });
            _renderCell(td, cell, longest, regionId);
            tr.appendChild(td);
            tbody.appendChild(tr);
        }
    }
    table.appendChild(tbody);
    return table;
}

/* ═══════════════════════════════════════════════
   UI CONTROLLER
═══════════════════════════════════════════════ */
const UI = {
    updateSvgHighlighting(activeRegions) {
        const svgContainer = document.getElementById('organ-svg-container');
        if (!svgContainer) return;
        
        const allOrgans = svgContainer.querySelectorAll('svg [id]');
        allOrgans.forEach(organ => {
            const organDef = ORGAN_MAP[organ.id];
            if (organDef && organDef.regions) {
                // Dimming logika
                const isMatch = organDef.regions.some(r => activeRegions.includes(r));
                organ.classList.toggle('organ-dimmed', !isMatch);
            } else {
                organ.classList.add('organ-dimmed');
            }
        });
    },

    updateReferencesVisibility() {
        const activeExamId = Store.activeTab || '';
        
        /* --- STATE MANAGEMENT: TŘÍDY PRO ZOBRAZENÍ MODALIT (PET/CT/MR) --- */
        const isPET = activeExamId.includes('pet');
        document.body.classList.toggle('is-non-pet', !isPET);
        document.body.classList.toggle('hide-ct', activeExamId.includes('mr'));
        document.body.classList.toggle('hide-mr', activeExamId.includes('ct'));
        
        const isPSMA = activeExamId.includes('psma');
        const isDOTATOC = activeExamId.includes('dotatoc');
        const isDOPA = activeExamId.includes('dopa');

        const groups = {
            jatra: document.querySelector('.ref-group[data-ref="jatra"]'),
            jatra_minule: document.querySelector('.ref-group[data-ref="jatra_minule"]'),
            parotidy: document.querySelector('.ref-group[data-ref="parotidy"]'),
            slezina: document.querySelector('.ref-group[data-ref="slezina"]'),
            striatum: document.querySelector('.ref-group[data-ref="striatum"]')
        };

        if (!groups.jatra) return;

        Object.values(groups).forEach(el => el && (el.style.display = 'none'));

        if (!isPET) return;

        const setField = (id, defVal) => {
            const inp = document.querySelector(`input[data-id="${id}"]`);
            if (inp && (!inp.dataset.edited || inp.value === '3.0' || inp.value === '7.0' || inp.value === '20.0' || inp.value === '7.0' || inp.value === '2.0')) {
                inp.value = defVal;
                Store.fields[id] = defVal;
            }
        };

        if (isPSMA) {
            groups.jatra.style.display = '';
            groups.jatra_minule.style.display = '';
            groups.parotidy.style.display = '';
            setField('suv_jater', '7.0');
            setField('suv_parotid', '20.0');
        } else if (isDOTATOC) {
            groups.jatra.style.display = '';
            groups.jatra_minule.style.display = '';
            groups.slezina.style.display = '';
            setField('suv_jater', '3.0');
            setField('suv_sleziny', '7.0');
        } else if (isDOPA) {
            groups.striatum.style.display = '';
            setField('suv_striata', '2.0');
        } else {
            groups.jatra.style.display = '';
            groups.jatra_minule.style.display = '';
            setField('suv_jater', '3.0');
        }
    },

    render(prop) {
        if (prop === 'exams') {
            this.renderExams();
            this.renderDetails();
        } else if (prop === 'buttonStates' || prop === 'expandedNotes') {
            const activeExam = getExamById(Store.activeTab);
            const usesSvg = activeExam && (activeExam.id.includes('trup') || activeExam.id.includes('krk'));
            if (usesSvg) {
                this.renderActiveTable();
            } else {
                this.renderDetails();
            }
        }
        this.renderReport();
    },

    renderExams() {
        const container = document.getElementById('exams-container');
        container.replaceChildren();
        for (const [cat, list] of Object.entries(EXAMS)) {
            const active = list.filter(e => Store.exams.has(e.id));
            container.appendChild(el('div', { className: 'dropdown' }, [
                el('button', {
                    className: `btn${active.length ? ' selected' : ''}`,
                    textContent: active.length ? active.map(e => e.title).join(' + ') : cat
                }),
                el('div', { className: 'dropdown-menu' }, list.map(exam =>
                    el('button', {
                        className: `btn${Store.exams.has(exam.id) ? ' selected' : ''}`,
                        textContent: exam.title,
                        'data-action': 'toggle-exam',
                        'data-payload': exam.id
                    })
                ))
            ]));
        }
    },

    renderDetails() {
        const tabsContainer = document.getElementById('exam-tabs-container');
        const content = document.getElementById('details-content');
        
        if (!tabsContainer || !content) return;

        if (!Store.activeTab || !Store.exams.has(Store.activeTab)) {
            Store.activeTab = Store.exams.size > 0 ? Array.from(Store.exams)[0] : null;
        }

        this.updateReferencesVisibility();

        tabsContainer.replaceChildren();
        if (Store.exams.size === 0) {
            content.replaceChildren();
            this.updateBackground(['none']);
            return;
        }

        for (const examId of Store.exams) {
            const exam = getExamById(examId);
            if (!exam) continue;
            const tabEl = el('div', {
                className: `exam-tab${Store.activeTab === examId ? ' active' : ''}`,
                'data-action': 'select-tab',
                'data-payload': examId
            });
            const textSpan = el('span', { textContent: exam.title });
            const closeBtn = el('span', {
                className: 'exam-tab-close',
                textContent: '×',
                'data-action': 'remove-exam',
                'data-payload': examId
            });
            tabEl.appendChild(textSpan);
            tabEl.appendChild(closeBtn);
            tabsContainer.appendChild(tabEl);
        }

        const indicationInput = el('input', {
            className: 'input',
            style: 'flex: 1; min-width: 150px; font-weight: normal;',
            value: Store.indication || '',
            'data-action': 'update-indication',
            placeholder: 'Indikace'
        });
        tabsContainer.appendChild(indicationInput);

        content.replaceChildren();

        const activeExam = getExamById(Store.activeTab);
        if (!activeExam) return;

        const activeRegions = activeExam.regs;
        const usesSvg = activeRegions.some(r => ['brain', 'neck', 'thorax', 'abdomen'].includes(r));

        if (usesSvg) {
            const wrapper = el('div', { className: 'organ-wrapper' });
            
            const svgContainer = el('div', { className: 'organ-svg', id: 'organ-svg-container' });
            wrapper.appendChild(svgContainer);

            const overlay = el('div', { id: 'table-overlay-container' });
            wrapper.appendChild(overlay);

            if (!document.getElementById('organ-tooltip')) {
                document.body.appendChild(el('div', { id: 'organ-tooltip' }));
            }

            content.appendChild(wrapper);

            fetch('Organs_schematic_WB.svg')
                .then(r => r.text())
                .then(svgText => {
                    const container = document.getElementById('organ-svg-container');
                    if (container) {
                        const parser = new DOMParser();
                        const svgDoc = parser.parseFromString(svgText, "image/svg+xml");
                        const svgElement = svgDoc.documentElement;

                        while (container.firstChild) {
                            container.removeChild(container.firstChild);
                        }
                        container.appendChild(svgElement);
                        
                        // [VLOŽENO] Aplikování dimmingu ihned po vložení
                        this.updateSvgHighlighting(activeRegions);
                    }
                })
                .catch(err => console.warn('SVG načtení selhalo, ověřte web server.', err));

            this.renderActiveTable();
            this.updateBackground(['none']);
        } else {
            for (const regionId of activeRegions) {
                const region = REGIONS[regionId];
                if (!region) continue;
                content.appendChild(el('div', { className: 'region-header', textContent: region.title }));
                const layoutNodes = this.generateLayoutNodes(regionId, region);
                layoutNodes.forEach(node => content.appendChild(node));
            }
            this.updateBackground(activeRegions);
        }
    },

    generateLayoutNodes(regionId, region) {
        const handleArgs = (fn, id, arg2, arg3) => {
            if (typeof arg2 === 'string') {
                const wrap = el('div', { className: 'table-wrapper' });
                wrap.appendChild(el('div', { className: 'sub-table-title', textContent: arg2 }));
                wrap.appendChild(fn(id, arg3, regionId));
                return wrap;
            }
            return fn(id, arg2, regionId);
        };

        const helpers = {
            LesionMain:         (id, title, rowsContent) => LesionMain(id, title, rowsContent),
            TableMain:          (id, title, contents) => TableMain(id, title, contents),
            Table3colRL:        (id, arg2, arg3) => handleArgs(Table3colRL, id, arg2, arg3),
            Table3colRCL:       (id, arg2, arg3) => handleArgs(Table3colRCL, id, arg2, arg3),
            Table2colNormal:    (id, arg2, arg3) => handleArgs(Table2colNormal, id, arg2, arg3),
            Table2rowNormal:    (id, arg2, arg3) => handleArgs(Table2rowNormal, id, arg2, arg3),
            Table1col:          (id, arg2, arg3) => handleArgs(Table1col, id, arg2, arg3)
        };
        return region.layout(helpers);
    },

    renderActiveTable() {
        const overlay = document.getElementById('table-overlay-container');
        const svgContainer = document.getElementById('organ-svg-container');
        if (!overlay || !svgContainer) return;

        const existingViewer = document.getElementById('standalone-slice-viewer');
        const viewerExisted = !!existingViewer; // Uložíme si info, zda už tu viewer byl
        if (existingViewer) existingViewer.remove();

        if (!Store.activeTable) {
            overlay.classList.remove('active');
            overlay.replaceChildren();
            svgContainer.classList.remove('dimmed');
            return;
        }

        svgContainer.classList.add('dimmed');
        overlay.classList.add('active');
        overlay.replaceChildren();

        const activeExam = getExamById(Store.activeTab);
        if (!activeExam) return;

        if (Store.activeTable.startsWith('region:')) {
            const rId = Store.activeTable.substring(7);
            const region = REGIONS[rId];
            let foundAny = false;
            if (region) {
                const layoutNodes = this.generateLayoutNodes(rId, region);
                layoutNodes.forEach(n => {
                    if (n.id && !n.id.includes('lesion') && !n.id.includes('lymphnode')) {
                        overlay.appendChild(n);
                        foundAny = true;
                    }
                });
            }
            if (!foundAny) overlay.appendChild(el('div', { textContent: 'Tabulky nenalezeny.', className: 'label' }));
            return;
        }

        let tableNode = null;

        for (const regionId of Object.keys(REGIONS)) {
            const region = REGIONS[regionId];
            if (!region) continue;
            const layoutNodes = this.generateLayoutNodes(regionId, region);
            const found = layoutNodes.find(n => n.id === Store.activeTable);
            if (found) {
                tableNode = found;
                break;
            }
        }

        if (tableNode) {
            overlay.appendChild(tableNode);
            const baseTableId = Store.activeTable ? Store.activeTable.split('__')[0] : null;
            
            if (baseTableId && SLICE_VIEWERS[baseTableId]) {
                if (!viewerExisted || Store.activeViewerKey !== baseTableId) {
                    Store.activeViewerKey = baseTableId;
                    Store.activeSlice = 1;
                }
                
                const viewer = createImageViewer(baseTableId);
                if (viewer) {
                    viewer.id = 'standalone-slice-viewer';
                    overlay.parentElement.appendChild(viewer); 
                    
                    requestAnimationFrame(() => {
                        viewer.style.left = `${overlay.offsetLeft + overlay.offsetWidth + 15}px`;
                        viewer.style.top = `${overlay.offsetTop}px`;
                    });
                }
            }
        } else {
            overlay.appendChild(el('div', { textContent: 'Tabulka nenalezena nebo neobsahuje cílová data.', className: 'label' }));
        }
    },

    updateBackground(activeRegions) {
        const panel = document.getElementById('details-panel');
        if (activeRegions.includes('none')) {
            panel.dataset.bg = 'none';
            return;
        }
        let bgType = 'none';
        if (activeRegions.includes('thorax') || activeRegions.includes('abdomen')) bgType = 'wb';
        else if (activeRegions.includes('neck')) bgType = 'neck';
        panel.dataset.bg = bgType;
    },

    renderReport() {
        let reportBlocks = [];
        let mainConclusionBlocks = [];
        let incidentalBlocks = [];
        
        const multipleExams = Store.exams.size > 1;

        for (const examId of Store.exams) {
            const exam = getExamById(examId);
            if (!exam) continue;

            let examRepBlocks = [];
            let examConcMainBlocks = [];
            let examConcIncBlocks = [];

            let officialRegions = new Set(exam.regs);
            let regionsToCompile = new Set(exam.regs);

            Object.keys(REGIONS).forEach(rId => {
                const prefix = `${examId}_${rId}_`;
                const hasActiveState = Object.keys(Store.buttonStates).some(k => k.startsWith(prefix) && Store.buttonStates[k]);
                const hasActiveField = Object.keys(Store.fields).some(k => k.startsWith(prefix) && Store.fields[k] !== '');
                const hasActiveCustom = Object.keys(Store.customTexts).some(k => k.startsWith(prefix) && Store.customTexts[k] !== '');
                
                if (hasActiveState || hasActiveField || hasActiveCustom) {
                    regionsToCompile.add(rId);
                }
            });

            for (const regionId of regionsToCompile) {
                const region = REGIONS[regionId];
                if (!region || !region.compile) continue;
                const ctx = createContext(regionId, examId);
                const compiled = region.compile(ctx);
                
                if (compiled.report) {
                    let mappedReport = compiled.report.map(b => ({ ...b, examId }));
                    if (!officialRegions.has(regionId)) {
                        mappedReport.forEach(b => {
                            if (b.type === 'heading') {
                                b.text = b.text.replace(':', ' (v zachyceném rozsahu):');
                            }
                        });
                    }
                    examRepBlocks.push(...mappedReport);
                }
                
                if (compiled.conclusion) {
                    if (compiled.conclusion.main) examConcMainBlocks.push(...compiled.conclusion.main.map(b => ({ ...b, examId })));
                    if (compiled.conclusion.incidental) examConcIncBlocks.push(...compiled.conclusion.incidental.map(b => ({ ...b, examId })));
                }
            }

            const eIdLower = examId.toLowerCase();
            const isFdg = eIdLower.includes('fdg');
            const isPsma = eIdLower.includes('psma');
            const isDotatoc = eIdLower.includes('dotatoc');

            if (isFdg || isPsma || isDotatoc) {
                const hasHighActivity = Object.keys(Store.buttonStates).some(k => 
                    k.startsWith(examId) && k.endsWith('_act') && Store.buttonStates[k] >= 3
                );

                const repText = examRepBlocks.map(b => b.text).join(' ').toLowerCase();
                const hasRepKeywords = repText.includes('hyperakumulující') || 
                                       repText.includes('zvýšenou akumulací rf') || 
                                       repText.includes('vysokou akumulací rf');

                const concText = [...examConcMainBlocks, ...examConcIncBlocks].map(b => b.text).join(' ').toLowerCase();
                const hasConcKeywords = concText.includes('meta') || 
                                        concText.includes('tumor') || 
                                        concText.includes('maligní');

                if (!hasHighActivity && !hasRepKeywords && !hasConcKeywords) {
                    let autoText = '';
                    if (isFdg) autoText = "Bez známek přítomnosti FDG-avidní neoplazie.";
                    else if (isPsma) autoText = "Bez známek přítomnosti ložisek zvýšené exprese PSMA.";
                    else if (isDotatoc) autoText = "Bez známek přítomnosti ložisek se zvýšeným nakupením somatostatinových receptorů.";
                    
                    if (autoText) {
                        examConcMainBlocks.unshift({ type: 'frame', text: autoText, tableId: null, examId });
                    }
                }
            }

            /* ═════════ FYZIOLOGICKÁ DISTRIBUCE PRO PET ═════════ */
            const examIdForPhysio = examId.toLowerCase();
            let physioText = '';
            
            if (examIdForPhysio.includes('fdg')) {
                physioText = "Neložisková akumulace radiofarmaka ve svalech, v gastrointestinálním traktu a urotraktu je přítomna na podkladě fyziologických procesů či jako zcela nespecifický nález. Akumulace RF vztažena k referenčním játrům.";
            } else if (examIdForPhysio.includes('psma')) {
                physioText = "Neložisková akumulace radiofarmaka ve slinných a slzných žlazách, v jaterním parenchymu, slezině, v gastrointestinální traktu a urotraktu je přítomna na podkladě fyziologických procesů či jako zcela nespecifický nález. Akumulace RF vztažena k referenčním játrům a parotidám.";
            } else if (examIdForPhysio.includes('dotatoc')) {
                physioText = "Neložisková akumulace radiofarmaka v hypofýze, štítné žláze, nadledvinách a urotraktu je přítomna na podkladě fyziologických procesů či jako zcela nespecifický nález. Akumulace RF vztažena k referenčním játrům a slezině.";
            } else if (examIdForPhysio.includes('dopa')) {
                physioText = "Neložisková akumulace radiofarmaka v BG bilat., játrech a urotraktu je přítomna na podkladě fyziologických procesů či jako zcela nespecifický nález. Akumulace RF vztažena k referenčním játrům.";
            }

            if (physioText) {
                examRepBlocks.push({ type: 'frame', text: physioText, tableId: null, examId, hidden: true });
            }
            /* ════════════════════════════════════════════════ */

            if (multipleExams) {
                if (examRepBlocks.length > 0) reportBlocks.push({ type: 'exam-heading', text: exam.title });
                if (examConcMainBlocks.length > 0) examConcMainBlocks.unshift({ type: 'exam-heading', text: exam.title });
                if (examConcIncBlocks.length > 0) examConcIncBlocks.unshift({ type: 'exam-heading', text: exam.title });
            }

            reportBlocks.push(...examRepBlocks);
            mainConclusionBlocks.push(...examConcMainBlocks);
            incidentalBlocks.push(...examConcIncBlocks);
        }

        const buildNodes = (blocks) => {
            return blocks.map(b => {
                if (b.type === 'heading') {
                    const node = el('div', { className: 'report-heading', textContent: b.text });
                    if (b.action) {
                        node.dataset.action = b.action;
                        if (b.regionId) node.dataset.region = b.regionId;
                        if (b.examId) node.dataset.exam = b.examId;
                    }
                    return node;
                }
                if (b.type === 'exam-heading') {
                    return el('div', { className: 'report-exam-heading', textContent: b.text });
                }
                if (b.type === 'frame') {
                    let cleanText = (b.text || '')
                        .replace(/^([A-ZÁČĎÉĚÍŇÓŘŠŤÚŮÝŽ])(.*?)(?:,\s*nově|\(\s*nově\s*\))(.*)$/g, (match, firstChar, middle, rest) => {
                            return "Nově " + firstChar.toLowerCase() + middle + rest;
                        })
                        .replace(/bilat\.\./gi, 'bilat.')
                        .replace(/\s+\./g, '.')
                        .replace(/,\s*\./g, '.')
                        .replace(/\.{2,}/g, '.');

                    const classes = ['report-frame'];
                    if (b.dimmed) classes.push('text-dim');
                    if (b.hidden) classes.push('report-frame-hidden');

                    const node = el('div', { className: classes.join(' '), textContent: cleanText });
                    if (b.tableId) {
                        node.dataset.action = 'open-table';
                        node.dataset.table = b.tableId;
                        if (b.examId) node.dataset.exam = b.examId;
                    }
                    return node;
                }
                return document.createTextNode('');
            });
        };

        const repContainer = document.getElementById('report-container');
        repContainer.className = 'content-area report-content';
        repContainer.replaceChildren(...buildNodes(reportBlocks));
        
        const concContainer = document.getElementById('conclusion-container');
        concContainer.className = 'content-area report-content';
        let concNodes = [];
        if (mainConclusionBlocks.length > 0) {
            concNodes.push(el('div', { className: 'report-heading', textContent: 'Závěr:' }));
            concNodes.push(...buildNodes(mainConclusionBlocks));
        }
        if (incidentalBlocks.length > 0) {
            concNodes.push(el('div', { className: 'report-heading', textContent: 'Vedlejší nálezy:' }));
            concNodes.push(...buildNodes(incidentalBlocks));
        }
        concContainer.replaceChildren(...concNodes);
    }
};

/* ═══════════════════════════════════════════════
   STATE ACTIONS
═══════════════════════════════════════════════ */
let isDraggingSlice = false;
let dragSliceLastY = 0;

function getExclusiveStates(globalId, nextVal) {
    const btn = document.querySelector(`button[data-id="${globalId}"]`);
    if (!btn) return { block: false, states: null };
    
    const table = btn.closest('table[id*="_excl"]');
    if (!table) return { block: false, states: null };

    // Zamezení odkliknutí: v tabulce _excl musí zůstat vždy jedna volba aktivní
    if (nextVal === false || nextVal === 0) return { block: true, states: null };

    let states = { ...Store.buttonStates };
    table.querySelectorAll('button[data-id]').forEach(b => {
        const sid = b.dataset.id;
        if (sid !== globalId && ButtonConfigs[sid]) {
            states[sid] = ButtonConfigs[sid].type === 'standard' ? 0 : false;
        }
    });
    
    return { block: false, states };
}

function cycleState(globalId, dir = 1) {
    const cfg = ButtonConfigs[globalId];
    if (!cfg || cfg.type !== 'standard') return;
    const cur = Store.buttonStates[globalId] || 0;
    const next = Math.max(0, Math.min(cfg.states.length - 1, cur + dir));
    if (next === cur) return;

    const excl = getExclusiveStates(globalId, next);
    if (excl.block) return;
    
    Store.buttonStates = { ...(excl.states || Store.buttonStates), [globalId]: next };
    
    const nextStateStr = cfg.states[next];
    if (nextStateStr === 'custom') {
        setTimeout(() => {
            const inp = document.querySelector(`input.input-btn-inner[data-id="${globalId}"]`);
            if (inp) {
                inp.focus();
                inp.setSelectionRange(inp.value.length, inp.value.length);
            }
        }, 0);
    } else {
        const fieldMatch = nextStateStr.match(/\[field:[^:]+:([^\]]+)\]/);
        if (fieldMatch) {
            setTimeout(() => {
                const inp = document.querySelector(`input[data-action="update-field"][data-id="${globalId}_${fieldMatch[1]}"]`);
                if (inp) {
                    inp.focus();
                    inp.setSelectionRange(inp.value.length, inp.value.length);
                }
            }, 0);
        }
    }
}

function toggleBasic(globalId, force = null) {
    const cfg = ButtonConfigs[globalId];
    if (!cfg) return;
    const cur = Store.buttonStates[globalId] ?? false;
    let next;
    
    if (force === false)  next = false;
    else if (force === true) next = true;
    else if (cfg.custom)  next = cur === false ? true : cur === true ? 'custom' : false;
    else                  next = !cur;
    
    if (next === cur) return;

    const excl = getExclusiveStates(globalId, next);
    if (excl.block) return;

    Store.buttonStates = { ...(excl.states || Store.buttonStates), [globalId]: next };
    if (next === 'custom') focusInput(globalId);
}

function toggleBasicCustom(globalId, activate = null) {
    const cur = Store.buttonStates[globalId] || false;
    const next = activate !== null ? activate : !cur;
    if (next === cur) return;

    const excl = getExclusiveStates(globalId, next);
    if (excl.block) return;

    Store.buttonStates = { ...(excl.states || Store.buttonStates), [globalId]: next };
    if (next) focusInput(globalId);
}

document.addEventListener('click', e => {
    const modal = document.getElementById('settings-modal');
    const isSettingsBtn = e.target.closest('[data-action="toggle-settings"]');
    if (modal && modal.style.display === 'block' && !modal.contains(e.target) && !isSettingsBtn) {
        modal.style.display = 'none';
    }

    const target = e.target.closest('[data-action]');
    if (target) {
        const { action, id, payload, table, exam } = target.dataset;

        if (action === 'toggle-settings') {
            if (modal) modal.style.display = modal.style.display === 'none' ? 'block' : 'none';
            return;
        }

        
        const formatReport = (includeIndicationLabel = false) => {
            const container = document.getElementById('report-container');
            if (!container) return "";
            
            let lines = [];
            const indication = (Store.indication || "").trim();

            if (indication && includeIndicationLabel) { 
                lines.push(`Indikace: ${indication}`); 
                lines.push(""); 
            }

            if (Store.pastDate) {
                const [y, m, d] = Store.pastDate.split('-');
                lines.push(`Srovnáno s vyšetřením z ${d}.${m}.${y}:`);
            }

            let currentLine = "";
            Array.from(container.children).forEach(el => {
                const text = el.textContent.trim();
                if (el.classList.contains('report-heading')) {
                    if (currentLine) lines.push(currentLine.trim());
                    currentLine = text.toUpperCase().replace(/:$/, '') + ":";
                } else if (el.classList.contains('report-frame') || el.classList.contains('report-frame-hidden')) {
                    currentLine += " " + text.replace(/^- /, '');
                }
            });
            if (currentLine) lines.push(currentLine.trim());
            return lines.join('\n').replace(/  +/g, ' ').trim();
        };

        const formatConclusion = (includeIncidentalLabel = true) => {
            const container = document.getElementById('conclusion-container');
            if (!container) return "";
            let mainParts = [];
            let incidentalParts = [];
            let state = "none";

            if (Store.pastDate) {
                const [y, m, d] = Store.pastDate.split('-');
                mainParts.push(`Oproti vyšetření z ${d}.${m}.${y}:`);
            }

            Array.from(container.children).forEach(el => {
                const txt = el.textContent.trim();
                if (txt === "Závěr:") { state = "main"; return; }
                if (txt === "Vedlejší nálezy:") { state = "incidental"; return; }
                
                if (state === "main" && el.classList.contains('report-frame')) mainParts.push(txt);
                if (state === "incidental" && el.classList.contains('report-frame')) incidentalParts.push(txt);
            });

            let out = mainParts.join('\n');
            if (incidentalParts.length > 0) {
                out += "\n\n" + (includeIncidentalLabel ? "Vedlejší nálezy: " : "") + incidentalParts.join(' ');
            }
            return out.trim();
        };

        if (action === 'copy-text') {
            const isReport = target.dataset.target === 'report-container';
            const textToCopy = isReport ? formatReport() : formatConclusion();
            
            if (textToCopy) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const originalText = target.textContent;
                    target.textContent = 'Zkopírováno!';
                    target.style.color = '#58a6ff';
                    setTimeout(() => { target.textContent = originalText; target.style.color = ''; }, 1200);
                }).catch(err => console.error('Nelze kopírovat:', err));
            }
            return;
        }

        if (action === 'copy-all') {
            const activeExam = getExamById(Store.activeTab);
            const title = activeExam ? activeExam.title : "Lékařský nález";
            const report = formatReport(true);
            const conclusion = formatConclusion(true); 
            
            const incidentalMatch = conclusion.match(/\n\nVedlejší nálezy: (.*)/s);
            const mainConc = conclusion.replace(/\n\nVedlejší nálezy: .*/s, '');
            const incidental = incidentalMatch ? incidentalMatch[0].trim() : '';

            const combined = `${title}\n\n${report}\n\nZávěr:\n${mainConc}${incidental ? '\n\n' + incidental : ''}`.trim().replace(/\n{3,}/g, '\n\n');
            
            navigator.clipboard.writeText(combined).then(() => {
                const h2s = document.querySelectorAll('h2[data-action="copy-text"]');
                const originals = Array.from(h2s).map(h2 => h2.textContent);
                
                h2s.forEach(h2 => { h2.textContent = 'Zkopírováno!'; h2.style.color = '#58a6ff'; });
                
                setTimeout(() => {
                    h2s.forEach((h2, i) => { h2.textContent = originals[i]; h2.style.color = ''; });
                }, 1200);
            }).catch(err => console.error('Nelze kopírovat:', err));
            return;
        }

        if (action === 'open-region') {
            if (exam) Store.activeTab = exam;
            Store.activeTable = `region:${target.dataset.region}`;
            return;
        } else if (action === 'open-table') {
            if (exam) {
                Store.activeTab = exam;
            }
            // OPRAVA: Pokud ID tabulky z reportu už obsahuje '__', rovnou jej otevřeme
            if (table && table.includes('__')) {
                Store.activeTable = table;
            } 
            // Jinak vytvoříme novou instanci (pokud jde o generickou tabulku lézí/uzlin)
            else if (table && (table.includes('lesion') || table.includes('lymphnode'))) {
                const instId = Date.now().toString();
                if (!Store.instances) Store.instances = {};
                if (!Store.instances[table]) Store.instances[table] = [];
                Store.instances[table].push(instId);
                Store.activeTable = `${table}__${instId}`;
                
                const isLN = table.includes('lymphnode');
                const regionId = table.split('_')[0];
                const prefixMap = {
                    brain: 'bl',
                    thorax: isLN ? 'tln' : 'tl',
                    abdomen: isLN ? 'aln' : 'al',
                    neck: isLN ? 'ln' : 'l',
                    skeleton: 'l'
                };
                const pfx = prefixMap[regionId] || (isLN ? 'ln' : 'l');
                const p = `${pfx}_${instId}`;
                const defaultLesState = (regionId === 'skeleton' && !isLN) ? 1 : true;
                Store.buttonStates = { ...Store.buttonStates, [`${Store.activeTab}_${regionId}_${p}_c_soli`]: true, [`${Store.activeTab}_${regionId}_${p}_k_${isLN ? 'uzl' : 'les'}`]: defaultLesState };
            } else {
                Store.activeTable = table;
            }
            return;
        } else if (action === 'remove-instance') {
            const [baseTableId, instId] = id.split('__');
            if (Store.instances && Store.instances[baseTableId]) {
                Store.instances[baseTableId] = Store.instances[baseTableId].filter(i => i !== instId);
                Object.keys(Store.buttonStates).forEach(k => { if (k.includes(`_${instId}`)) delete Store.buttonStates[k]; });
                Object.keys(Store.customTexts).forEach(k => { if (k.includes(`_${instId}`)) delete Store.customTexts[k]; });
                Object.keys(Store.fields).forEach(k => { if (k.includes(`_${instId}`)) delete Store.fields[k]; });
                Store.activeTable = null;
                UI.renderReport();
            }
        } else if (action === 'toggle-exam') {
            const next = new Set(Store.exams);
            if (next.has(payload)) {
                next.delete(payload);
                if (Store.activeTab === payload) {
                    Store.activeTab = next.size > 0 ? Array.from(next).pop() : null;
                }
            } else {
                next.add(payload);
                Store.activeTab = payload;
            }
            Store.exams = next;
            Store.activeTable = null; 
        } else if (action === 'select-tab') {
            Store.activeTab = payload;
            Store.activeTable = null;
        } else if (action === 'remove-exam') {
            const next = new Set(Store.exams);
            next.delete(payload);
            if (Store.activeTab === payload) {
                Store.activeTab = next.size > 0 ? Array.from(next).pop() : null;
            }
            Store.exams = next;
            Store.activeTable = null;
        } else if (action === 'toggle-recist') {
            target.classList.toggle('selected');
            Store.recist = target.classList.contains('selected');
            UI.renderReport();
        } else if (action === 'cycle-state') {
            cycleState(id, 1);
        } else if (action === 'toggle-basic') {
            toggleBasic(id, null);
        } else if (action === 'toggle-basic-custom') {
            toggleBasicCustom(id, true);
        } else if (action === 'expand-notes') {
            Store.expandedNotes = { ...Store.expandedNotes, [payload]: true };
        }
        return;
    }

    if (!Store.activeTable) {
        const organEl = e.target.closest('svg [id]');
        if (organEl && organEl.id && ORGAN_MAP[organEl.id]) {
            const organDef = ORGAN_MAP[organEl.id];
            let baseTableId = organDef.table;
            
            if (organDef.resolveTable) {
                const activeExam = getExamById(Store.activeTab);
                const activeRegions = activeExam ? activeExam.regs : [];
                baseTableId = organDef.resolveTable(activeRegions);
            }
            
            if (baseTableId) {
                if (baseTableId.includes('lesion') || baseTableId.includes('lymphnode')) {
                    const instId = Date.now().toString();
                    if (!Store.instances) Store.instances = {};
                    if (!Store.instances[baseTableId]) Store.instances[baseTableId] = [];
                    Store.instances[baseTableId].push(instId);
                    Store.activeTable = `${baseTableId}__${instId}`;
                    
                    const isLN = baseTableId.includes('lymphnode');
                    const regionId = baseTableId.split('_')[0];
                    const prefixMap = {
                        brain: 'bl',
                        thorax: isLN ? 'tln' : 'tl',
                        abdomen: isLN ? 'aln' : 'al',
                        neck: isLN ? 'ln' : 'l',
                        skeleton: 'l'
                    };
                    const pfx = prefixMap[regionId] || (isLN ? 'ln' : 'l');
                    const p = `${pfx}_${instId}`;
                    const defaultLesState = (regionId === 'skeleton' && !isLN) ? 1 : true;
                    Store.buttonStates = { ...Store.buttonStates, [`${Store.activeTab}_${regionId}_${p}_c_soli`]: true, [`${Store.activeTab}_${regionId}_${p}_k_${isLN ? 'uzl' : 'les'}`]: defaultLesState };
                } else {
                    Store.activeTable = baseTableId;
                }
            }
            return;
        }
    }

    if (Store.activeTable) {
        const isInsideOverlay = e.target.closest('#table-overlay-container');
        const isInsideViewer = e.target.closest('#standalone-slice-viewer');
        const isInputOrInteractive = e.target.closest('.input, select, textarea');
        if (!isInsideOverlay && !isInsideViewer && !isInputOrInteractive) {
            Store.activeTable = null;
        }
    }
});

document.addEventListener('mousemove', e => {
    if (isDraggingSlice) {
        const delta = e.clientY - dragSliceLastY;
        if (Math.abs(delta) > 5) {
            const cfg = SLICE_VIEWERS[Store.activeViewerKey];
            const maxSlices = cfg ? cfg.max : 1;
            let idx = Store.activeSlice + (delta > 0 ? 1 : -1);
            Store.activeSlice = Math.max(1, Math.min(maxSlices, idx));
            dragSliceLastY = e.clientY;
        }
        return;
    }

    const tooltip = document.getElementById('organ-tooltip');
    if (!tooltip) return;

    // Vynutit skrytí tooltipu, pokud je otevřena tabulka (SVG ztmavlo)
    if (Store.activeTable) {
        tooltip.style.display = 'none';
        return;
    }

    const organEl = e.target.closest('svg [id]');
    if (organEl && organEl.id && ORGAN_MAP[organEl.id]) {
        tooltip.textContent = ORGAN_MAP[organEl.id].name;
        tooltip.style.display = 'block';
        tooltip.style.left = `${e.clientX + 15}px`;
        tooltip.style.top = `${e.clientY + 15}px`;
        
        if (organEl.classList.contains('organ-dimmed')) {
            tooltip.classList.add('tooltip-dimmed');
        } else {
            tooltip.classList.remove('tooltip-dimmed');
        }
    } else {
        tooltip.style.display = 'none';
    }
});

document.addEventListener('contextmenu', e => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    e.preventDefault();
    const { action, id } = btn.dataset;
    if (action === 'cycle-state')         cycleState(id, -1);
    if (action === 'toggle-basic')        toggleBasic(id, false);
    if (action === 'toggle-basic-custom') toggleBasicCustom(id, false);
});

document.addEventListener('wheel', e => {
    const t = e.target;

    if (t.id === 'slice-image') {
        e.preventDefault();
        const cfg = SLICE_VIEWERS[Store.activeViewerKey];
        const maxSlices = cfg ? cfg.max : 1;
        let idx = Store.activeSlice + (e.deltaY > 0 ? 1 : -1);
        Store.activeSlice = Math.max(1, Math.min(maxSlices, idx));
        return;
    }

    if (t.classList.contains('input') && t.dataset.action === 'update-field') {
        e.preventDefault();
        const id = t.dataset.id;
        
        if (t.classList.contains('field_size')) {
            let dims = t.dataset.dims ? JSON.parse(t.dataset.dims) : [null];
            let aI = dims.length - 1;
            let v  = dims[aI];
            
            if (v === null || isNaN(v)) {
                if (e.deltaY > 0) return;
                v = 0;
            } else if (e.deltaY < 0) {
                v = Math.min(999, v + 1);
            } else {
                v -= 1;
                if (v < 0) {
                    if (aI > 0) { dims.pop(); v = dims[aI - 1]; }
                    else v = null;
                }
            }
            dims[dims.length - 1] = v;
            
            const strVal = (!dims.length || dims[0] === null) ? '' : dims.map(x => x ?? '').join('x');
            t.dataset.dims = JSON.stringify(dims);
            Store.fields = { ...Store.fields, [id]: strVal, [`${id}_dims`]: t.dataset.dims };
            t.value = strVal;
            return;
        }

        if (t.classList.contains('field_suv')) {
            let textVal = t.value.replace(',', '.');
            let v = textVal === '' ? null : parseFloat(textVal);
            
            if (v === null || isNaN(v)) {
                if (e.deltaY > 0) return;
                v = 0.0;
            } else if (e.deltaY < 0) {
                v = Math.min(50.0, parseFloat((v + 0.1).toFixed(1)));
            } else {
                v = parseFloat((v - 0.1).toFixed(1));
                if (v < 0) v = null;
            }
            
            const strVal = v === null ? '' : v.toFixed(1);
            Store.fields = { ...Store.fields, [id]: strVal };
            t.value = strVal;
            
            MetricsEngine.updateActivityForField(id, strVal);
            return;
        }

        if (t.classList.contains('field_mm')) {
            const step = parseInt(t.dataset.step) || 1;
            let v = parseInt(t.value, 10);
            
            if (isNaN(v)) {
                if (e.deltaY > 0) return;
                v = 0;
            } else {
                v = e.deltaY < 0 ? v + step : v - step;
            }
            
            const strVal = v < 0 ? '' : v.toString();
            Store.fields = { ...Store.fields, [id]: strVal };
            t.value = strVal;
            return;
        }
    }

    const btn = t.closest('.btn');
    if (!btn) return;
    e.preventDefault();
    const dir = e.deltaY < 0 ? 1 : -1;
    const { action, id } = btn.dataset;
    
    if (action === 'cycle-state')         cycleState(id, dir);
    if (action === 'toggle-basic')        toggleBasic(id, dir > 0);
    if (action === 'toggle-basic-custom') toggleBasicCustom(id, dir > 0);

}, { passive: false });

document.addEventListener('input', e => {
    const actionTarget = e.target.closest('[data-action]');
    if (actionTarget && actionTarget.dataset.action === 'update-setting') {
        APP_SETTINGS[actionTarget.dataset.setting] = e.target.checked;
        saveSettings();
        return;
    }

    if (e.target.dataset.action === 'update-field') {
        e.target.dataset.edited = 'true';
        const id = e.target.dataset.id;
        let val = e.target.value;
        const sStart = e.target.selectionStart;
        const sEnd = e.target.selectionEnd;

        if (e.target.classList.contains('field_suv')) val = val.replace(',', '.');
        
        Store.fields = { ...Store.fields, [id]: val };
        
        if (e.target.classList.contains('field_size')) {
            const dims = e.target.value.split('x').map(d => { const n = parseInt(d); return isNaN(n) ? null : n; });
            Store.fields[`${id}_dims`] = JSON.stringify(dims);
            e.target.dataset.dims = JSON.stringify(dims);
        }
        
        MetricsEngine.updateActivityForField(id, val);

        setTimeout(() => {
            const restoredInput = document.querySelector(`input[data-id="${id}"]`);
            if (restoredInput) {
                restoredInput.focus();
                restoredInput.setSelectionRange(sStart, sEnd);
            }
        }, 0);

        return;
    }

    const target = e.target.closest('[data-action]');
    if (!target) return;
    const { action, id } = target.dataset;
    if (action === 'update-indication')   Store.indication  = e.target.value;
    if (action === 'update-date')         Store.pastDate    = e.target.value;
    if (action === 'update-custom-input') Store.customTexts = { ...Store.customTexts, [id]: e.target.value };
});

document.addEventListener('mouseover', e => {
    if (e.target.closest && e.target.closest('[data-action="copy-all"]')) {
        document.querySelectorAll('h2[data-action="copy-text"]').forEach(el => el.classList.add('highlight-force'));
    }
});
document.addEventListener('mouseout', e => {
    if (e.target.closest && e.target.closest('[data-action="copy-all"]')) {
        document.querySelectorAll('h2[data-action="copy-text"]').forEach(el => el.classList.remove('highlight-force'));
    }
});

document.addEventListener('mouseup', () => {
    isDraggingSlice = false;
});

document.addEventListener('mousedown', e => {
    if (e.target.id === 'slice-image') {
        e.preventDefault();
        isDraggingSlice = true;
        dragSliceLastY = e.clientY;
        return;
    }

    if (!e.target.classList.contains('field_size')) return;
    let dims = e.target.dataset.dims ? JSON.parse(e.target.dataset.dims) : [null];
    if (dims.length > 0 && dims.length < 3 && dims[dims.length - 1] !== null) {
        dims.push(null);
        e.target.dataset.dims = JSON.stringify(dims);
        const strVal = dims.map(x => x ?? '').join('x');
        Store.fields = { ...Store.fields, [e.target.dataset.id]: strVal, [`${e.target.dataset.id}_dims`]: e.target.dataset.dims };
        e.target.value = strVal;
    }
});

document.addEventListener('DOMContentLoaded', () => {
    const suvWordCheckbox = document.getElementById('setting-suv-word');
    if (suvWordCheckbox) suvWordCheckbox.checked = APP_SETTINGS.suvWord;
    
    const hidePredefinedCheckbox = document.getElementById('setting-hide-predefined');
    if (hidePredefinedCheckbox) hidePredefinedCheckbox.checked = APP_SETTINGS.hidePredefined;
    
    document.body.classList.toggle('hide-predefined', APP_SETTINGS.hidePredefined);
    
    UI.render('exams');
});
</script>
</body>
