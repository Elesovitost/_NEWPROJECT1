                        [ 'MTA (Mediotemporální):', { btn: 'br_mta', states: ['0', '1', '2', '3', '4'] } ],
                        [ 'Koedam (Parietální):', { btn: 'br_koedam', states: ['0', '1', '2', '3'] } ]
                    ]),
                    helpers.Table2colNormal('br_likvor_table', 'Komory a SA prostory', [
                        [ 'Komory:', { btn: 'br_kom_sire', states: ['0', '+', '++', 'asym.'] } ],
                        [ 'Hydrocefalus:', { btn: 'br_hydro', states: ['0', 'e vacuo', 'NPH', 'obstrukční', 'komunikující'] } ],
                        [ 'SA prostory:', { btn: 'br_sa_prostory', states: ['0', 'přiměřené', 'zúžené', 'vymizelé', 'rozšířené'] } ]
                    ]),
                    helpers.Table3colRL('br_cpa_table', 'Mostomozečkový kout', [
                        [ { btn: 'br_cpa_exp_r', states: ['0', 'schwanom', 'meningeom', 'cysta'] }, 'Expanze', { btn: 'br_cpa_exp_l', states: ['0', 'schwanom', 'meningeom', 'cysta'] } ],
                        [ { btn: 'br_cpa_kon_r', states: ['0', 'I', 'II', 'III'] }, 'NV konflikt', { btn: 'br_cpa_kon_l', states: ['0', 'I', 'II', 'III'] } ]
                    ]),
                    helpers.Table2colNormal('br_sella_table', 'Sella a epifýza', [
                        [ 'Sella:', { btn: 'br_sella', states: ['0', 'cysta', 'partial', 'empty'] } ],
                        [ 'Epifýza:', { btn: 'br_epi', states: ['0', 'cysta [field:field_mm:mm]', 'ložisko [field:field_mm:mm]'] } ]
                    ]),
                    helpers.Table1col('br_ost_add', [ 
                        { field: 'text', id: 'br_custom_desc', placeholder: 'vlastní popis mozku...' }, 
                        { field: 'text', id: 'br_custom_conc', placeholder: 'vlastní závěr mozku...' } 
                    ])
                ])
            );

            /* --- WILLISŮV OKRUH A ARTERIE --- */
            layoutNodes.push(
                helpers.TableMain('brain_vessels_main', 'Willisův okruh a arterie', [
                    helpers.Table3colRCL('br_ves_w_table', 'Tepny', [
                        [ { btn: 'br_ves_aca_r', states: ['ACA', 'ACA', 'A1 ACA', 'A2 ACA'] }, { btn: 'br_ves_acoa', type: 'basic', text: 'ACoA' }, { btn: 'br_ves_aca_l', states: ['ACA', 'ACA', 'A1 ACA', 'A2 ACA'] } ],
                        [ { btn: 'br_ves_ica_r', states: ['ICA', 'ICA', 'C7 ICA', 'C6 ICA', 'C5 ICA', 'C4 ICA', 'C3 ICA', 'C2 ICA', 'C1 ICA'] }, '', { btn: 'br_ves_ica_l', states: ['ICA', 'ICA', 'C7 ICA', 'C6 ICA', 'C5 ICA', 'C4 ICA', 'C3 ICA', 'C2 ICA', 'C1 ICA'] } ],
                        [ { btn: 'br_ves_mca_r', states: ['MCA', 'MCA', 'M1 MCA', 'M2 MCA', 'M3 MCA'] }, '', { btn: 'br_ves_mca_l', states: ['MCA', 'MCA', 'M1 MCA', 'M2 MCA', 'M3 MCA'] } ],
                        [ { btn: 'br_ves_acop_r', type: 'basic', text: 'ACoP' }, '', { btn: 'br_ves_acop_l', type: 'basic', text: 'ACoP' } ],
                        [ { btn: 'br_ves_pca_r', states: ['PCA', 'PCA', 'P1 PCA', 'P2 PCA'] }, '', { btn: 'br_ves_pca_l', states: ['PCA', 'PCA', 'P1 PCA', 'P2 PCA'] } ],
                        [ '', { btn: 'br_ves_ba', type: 'basic', text: 'BA' }, '' ],
                        [ { btn: 'br_ves_pica_r', type: 'basic', text: 'PICA' }, '', { btn: 'br_ves_pica_l', type: 'basic', text: 'PICA' } ],
                        [ { btn: 'br_ves_va_r', states: ['VA', 'VA', 'V4 VA', 'V3 VA', 'V2 VA', 'V1 VA'] }, '', { btn: 'br_ves_va_l', states: ['VA', 'VA', 'V4 VA', 'V3 VA', 'V2 VA', 'V1 VA'] } ]
                    ]),
                    helpers.Table2colNormal('br_ves_pat_table', '', [
                        [ 'Typ patologie:', { btn: 'br_ves_pat', states: ['0', 'aneurysma', 'stenóza', 'uzávěr', 'hypoplazie'] } ]
                    ]),
                    helpers.Table1col('br_ves_ost_add', [ 
                        { field: 'text', id: 'br_ves_custom_desc', placeholder: 'vlastní cévní popis...' }, 
                        { field: 'text', id: 'br_ves_custom_conc', placeholder: 'vlastní cévní závěr...' } 
                    ])
                ])
            );

            /* --- ORBITY --- */
            layoutNodes.push(
                helpers.TableMain('brain_orbits_main', 'Orbity', [
                    helpers.Table3colRL('br_orb_bulbus', 'Bulbus', [
                        [ { btn: 'br_orb_exo_r', states: ['0', '+'] }, 'Exoftalmus', { btn: 'br_orb_exo_l', states: ['0', '+'] } ],
                        [ { btn: 'br_orb_pht_r', states: ['0', '+'] }, 'Phthisis', { btn: 'br_orb_pht_l', states: ['0', '+'] } ],
                        [ { btn: 'br_orb_iol_r', states: ['0', '+'] }, 'IOL / Artefakie', { btn: 'br_orb_iol_l', states: ['0', '+'] } ],
                        [ { btn: 'br_orb_amo_r', states: ['0', '+'] }, 'Odchlípení sítnice', { btn: 'br_orb_amo_l', states: ['0', '+'] } ]
                    ]),
                    helpers.Table3colRL('br_orb_nerv', 'Nervus opticus a svaly', [
                        [ { btn: 'br_orb_no_ztl_r', states: ['0', '+'] }, 'N. opticus - ztluštění', { btn: 'br_orb_no_ztl_l', states: ['0', '+'] } ],
                        [ { btn: 'br_orb_no_atr_r', states: ['0', '+'] }, 'N. opticus - atrofie', { btn: 'br_orb_no_atr_l', states: ['0', '+'] } ],
                        [ { btn: 'br_orb_sval_r', states: ['0', '+'] }, 'Okohybné svaly - ztluštění', { btn: 'br_orb_sval_l', states: ['0', '+'] } ]
                    ]),
                    helpers.Table3colRL('br_orb_slz', 'Slzná žláza', [
                        [ { btn: 'br_orb_slz_zvet_r', states: ['0', '+'] }, 'Zvětšení', { btn: 'br_orb_slz_zvet_l', states: ['0', '+'] } ],
                        [ { btn: 'br_orb_slz_res_r', states: ['0', '+'] }, 'Resekce', { btn: 'br_orb_slz_res_l', states: ['0', '+'] } ]
                    ]),
                    helpers.Table1col('br_orb_ost_add', [
                        { field: 'text', id: 'br_orb_custom_desc', placeholder: 'vlastní popis orbit...' },
                        { field: 'text', id: 'br_orb_custom_conc', placeholder: 'vlastní závěr orbit...' }
                    ])
                ])
            );

            layoutNodes.push(
                helpers.TableMain('brain_sinus_main', 'VDN, středouší, mastoidy', [
                    helpers.Table3colRL('br_sinus_table', [
                        [ { btn: 'sinus_front_r', states: ['0', 'cysta', 'hyper+', 'hyper++', 'tekutina'] }, 'frontální', { btn: 'sinus_front_l', states: ['0', 'cysta', 'hyper+', 'hyper++', 'tekutina'] } ],
                        [ { btn: 'sinus_ethmo_r', states: ['0', 'cysta', 'hyper+', 'hyper++', 'tekutina'] }, 'ethmoidální', { btn: 'sinus_ethmo_l', states: ['0', 'cysta', 'hyper+', 'hyper++', 'tekutina'] } ],
                        [ { btn: 'sinus_sfeno_r', states: ['0', 'cysta', 'hyper+', 'hyper++', 'tekutina'] }, 'sfenoidální', { btn: 'sinus_sfeno_l', states: ['0', 'cysta', 'hyper+', 'hyper++', 'tekutina'] } ],
                        [ { btn: 'sinus_maxil_r', states: ['0', 'cysta', 'hyper+', 'hyper++', 'tekutina'] }, 'maxilární', { btn: 'sinus_maxil_l', states: ['0', 'cysta', 'hyper+', 'hyper++', 'tekutina'] } ]
                    ]),
                    helpers.Table3colRL('br_ucho_table', [
                        [ { btn: 'ucho_stred_r', states: ['0', 'tekutina', 'zastření', 'sklerotizace', 'defekt'] }, 'středouší', { btn: 'ucho_stred_l', states: ['0', 'tekutina', 'zastření', 'sklerotizace', 'defekt'] } ],
                        [ { btn: 'ucho_mast_r', states: ['0', 'tekutina', 'zastření', 'sklerotizace', 'defekt'] }, 'mastoidy', { btn: 'ucho_mast_l', states: ['0', 'tekutina', 'zastření', 'sklerotizace', 'defekt'] } ]
                    ]),
                    helpers.Table1col('neck_sinus_add', [
                        { field: 'text', id: 'sinus_custom_desc', placeholder: 'vlastní...popis...' },
                        { field: 'text', id: 'sinus_custom_conc', placeholder: 'vlastní...závěr...' }
                    ])
                ])
            );

            return layoutNodes;
        },
        compile: (ctx) => {
            let reportOut = [{ type: 'heading', text: 'Mozek:', action: 'open-region', regionId: 'brain' }];
            let concMain = [];
            let concInc = [];
            
            const examId = Store.activeTab || 'default';
            const isPET = (examId || '').toLowerCase().includes('pet');
            const isMR = (examId || '').toLowerCase().includes('mr');
            const cap = (s) => s && s.charAt(0).toUpperCase() + s.slice(1);

            let bilaHmotaRep = [];
            let atrofieSaRep = [];
            let komoryRep = [];
            let cpaRep = [];
            let sellaRep = [];
            let epiRep = [];
            let vesRep = [];

            // --- PŘÍPRAVA LÉZÍ A JEJICH LOKALIZACÍ ---
            const lesInsts = Store.instances?.['brain_lesion_main'] || [];
            let parsedLesions = [];
            let hasDwiPlus = false;
            let hasMmkLesion = false;
            let hasSellaLesion = false;

            if (lesInsts.length > 0) {
                lesInsts.forEach(instId => {
                    const p = `bl_${instId}`;
                    let lok = [];
                    const addS = (id, lab) => {
                        let r = ctx.isActive(`${p}_p_${id}_r`), l = ctx.isActive(`${p}_p_${id}_l`);
                        if (r && l) {
                            if (id === 'mes') lok.push('v mesencephalu centrálně');
                            else if (id === 'pon') lok.push('v pontu centrálně');
                            else if (id === 'obl') lok.push('v oblongatě centrálně');
                            else lok.push(`${lab} bilat.`);
                        } else if (r) {
                            lok.push(`${lab} vpravo`);
                        } else if (l) {
                            lok.push(`${lab} vlevo`);
                        }
                    };
                    const labs = { fro:'frontálně', par:'parietálně', tem:'temporálně', occ:'okcipitálně', bg:'v BG', tal:'v talamu', moz:'v mozečku', mes:'v mesencephalu', pon:'v pontu', obl:'v oblongatě', men:'na meningách', kal:'v kalvě' };
                    Object.entries(labs).forEach(([k,v]) => addS(k, v));
                    const orR = ctx.text(`${p}_p_orb_r`), orL = ctx.text(`${p}_p_orb_l`);
                    const getOrbText = (val, side) => {
                        if (val === 'bulbus') return side === 'bilat' ? 'v obou bulbech' : (side === 'r' ? 'v pravém bulbu' : 'v levém bulbu');
                        const orbStr = side === 'bilat' ? 'v orbitách bilat.' : (side === 'r' ? 'v pravé orbitě' : 'v levé orbitě');
                        return `${orbStr} ${val === 'intra' ? 'intrakonálně' : 'extrakonálně'}`;
                    };
                    
                    if (orR !== '0' || orL !== '0') {
                        if (orR === orL) {
                            lok.push(getOrbText(orR, 'bilat'));
                        } else {
                            if (orR !== '0') lok.push(getOrbText(orR, 'r'));
                            if (orL !== '0') lok.push(getOrbText(orL, 'l'));
                        }
                    }
                    if (ctx.isActive(`${p}_p_epi`)) lok.push('v epifýze');
                    if (ctx.isActive(`${p}_p_intra`)) lok.push('intraselárně');
                    if (ctx.isActive(`${p}_p_supra`)) lok.push('supraselárně');
                    addS('para', 'paraselárně');
                    addS('latk', 'v postranní komoře');
                    if (ctx.isActive(`${p}_p_3k`)) lok.push('ve III. komoře');
                    if (ctx.isActive(`${p}_p_4k`)) lok.push('ve IV. komoře');
                    addS('mmk', 'v MMK');
                    let axSuffix = "";
                    if (ctx.isActive(`${p}_p_extra`)) axSuffix += " extraaxiálně";
                    if (ctx.isActive(`${p}_p_intra_ax`)) axSuffix += " intraaxiálně";

                    // Sledování specifických lokací pro skrytí výchozích negativních textů
                    if (ctx.isActive(`${p}_p_mmk_r`) || ctx.isActive(`${p}_p_mmk_l`)) hasMmkLesion = true;
                    if (ctx.isActive(`${p}_p_supra`) || ctx.isActive(`${p}_p_para_r`) || ctx.isActive(`${p}_p_intra`) || ctx.isActive(`${p}_p_para_l`)) hasSellaLesion = true;
                    if (ctx.text(`${p}_mr_dwi`) === 'DWI +') hasDwiPlus = true;

                    let d = LESIONS_DEFINITION.parseDetails(ctx, examId, 'brain', p, `${p}_met`, `${p}_e`, false);
                    if (d.hasAny || lok.length > 0 || axSuffix) {
                        let fullLok = formatCzechList(lok);
                        if (fullLok && axSuffix) fullLok += axSuffix; 
                        else if (axSuffix) fullLok = axSuffix.trim();

                        let repText = `${d.baseText} ${fullLok}${d.vzhledText}${d.metrikyStr}${d.doplneniStr}.`.replace(/\s+/g, ' ').replace(' .', '.');
                        let c = `${d.baseText} ${fullLok}${d.actStr}${d.dynStr}`;
                        if (d.etioStr) c += `: ${d.etioStr}.`; else c += `.`;
                        let concText = c.replace(/\s+/g, ' ').replace(' : ', ': ');

                        parsedLesions.push({ tableId: `brain_lesion_main__${instId}`, repText, concText });
                    }
                });
            }

            // --- 1. LÉZE ---
            if (parsedLesions.length === 0) {
                reportOut.push({ type: 'frame', text: isPET ? 'Není patrné ložisko se zvýšenou akumulací RF v mozku.' : 'Bez patologických ložiskových změn.', tableId: 'brain_lesion_main', dimmed: true });
            } else {
                parsedLesions.forEach(les => {
                    reportOut.push({ type: 'frame', text: cap(les.repText), tableId: les.tableId });
                    concMain.push({ type: 'frame', text: cap(les.concText), tableId: les.tableId });
                });
            }

            // --- 2. RESTRIKCE DIFUZE (Pouze MR) ---
            if (isMR && !hasDwiPlus) {
                reportOut.push({ type: 'frame', text: 'Bez zvýšené restrikce difuze.', tableId: 'brain_lesion_main', dimmed: true });
            }

            // --- BÍLÁ HMOTA: SVD & PVS ---
            let faz = ctx.text('br_faz');
            if (faz && faz !== '0') {
                if (faz === '1') { bilaHmotaRep.push('ojedinělá tečkovitá T2W+ FLAIR+ ložiska'); concInc.push({ type: 'frame', text: 'Mírná chronická ischemizace bílé hmoty (Fazekas 1).', tableId: 'brain_organ_main' }); }
                if (faz === '2') { bilaHmotaRep.push('mnohočetná T2W+ FLAIR+ ložiska s tendencí ke splývání'); concInc.push({ type: 'frame', text: 'Střední chronická ischemizace bílé hmoty (Fazekas 2).', tableId: 'brain_organ_main' }); }
                if (faz === '3') { bilaHmotaRep.push('rozsáhlé konfluující T2W+ FLAIR+ změny'); concInc.push({ type: 'frame', text: 'Pokročilá chronická ischemizace bílé hmoty (Fazekas 3).', tableId: 'brain_organ_main' }); }
            }

            let lak = ctx.text('br_lak');
            if (lak && lak !== '0') {
                const lMap = { 'difuzně': 'difuzně', 'BG': 'v BG', 'talamus': 'v talamu', 'kmen': 'v kmeni' };
                bilaHmotaRep.push(`vícečetné lakuny ${lMap[lak] || lak}`);
                concInc.push({ type: 'frame', text: `Postmalatické změny char. lakunárních infarktů ${lMap[lak] || lak}.`, tableId: 'brain_organ_main' });
            }

            let pvs = ctx.text('br_pvs');
            if (pvs && pvs !== '0') {
                const pMap = { 'BG': 'v BG', 'CSO': 'v centrum semiovale', 'etat': 'etat crible' };
                let pTxt = `zvýrazněné perivaskulární prostory (${pMap[pvs] || pvs})`;
                bilaHmotaRep.push(pTxt);
                concInc.push({ type: 'frame', text: cap(pTxt) + '.', tableId: 'brain_organ_main' });
            }

            let gli = ctx.text('br_gli');
            if (gli && gli !== '0') {
                let gLoc = ctx.text('br_gli_loc');
                let locStr = (gLoc && gLoc !== '0') ? ` ${gLoc}` : '';
                let gWord = gli === '+' ? 'ojedinělé' : (gli === '++' ? 'sporadické' : 'vícečetné');
                bilaHmotaRep.push(`${gWord} drobné T2W+ FLAIR+ léze v hlubší bílé hmotě${locStr}`);
                concInc.push({ type: 'frame', text: `Vícečetné nespecifické drobné gliové léze${locStr}.`, tableId: 'brain_organ_main' });
            }

            // --- BÍLÁ HMOTA: DEMYELINIZACE ---
            const demLocs = [
                { id: 'br_dem_peri', name: 'periventrikulární' },
                { id: 'br_dem_jux', name: 'juxtakortikální' },
                { id: 'br_dem_inf', name: 'infratentoriální' },
                { id: 'br_dem_cc', name: 'v corpus callosum' }
            ];

            let demReportParts = [];
            let demConcParts = [];

            demLocs.forEach(l => {
                let val = ctx.text(l.id);
                if (val && val !== '0') {
                    let isPlural = val.includes('více');
                    let actSign = val.includes('-') ? '-' : (val.includes('+') ? '+' : '');

                    let countWord = isPlural ? 'vícečetné' : 'solitární';
                    let actRep = actSign === '-' ? ' bez sycení' : (actSign === '+' ? ' se sycením' : '');
                    let actConcAdj = actSign === '-' ? 'neaktivní ' : (actSign === '+' ? 'aktivní ' : '');

                    if (l.name === 'v corpus callosum') {
                        demReportParts.push(`${countWord} T2W+ FLAIR+ léze v corpus callosum${actRep}`);
                        demConcParts.push(`${countWord} ${actConcAdj}léze v corpus callosum`);
                    } else {
                        demReportParts.push(`${countWord} ${l.name} T2W+ FLAIR+ léze${actRep}`);
                        demConcParts.push(`${countWord} ${actConcAdj}${l.name} léze`);
                    }
                }
            });

            if (demReportParts.length > 0) {
                bilaHmotaRep.push(formatCzechList(demReportParts));
                let finalConc = cap(formatCzechList(demConcParts)) + " susp. demyelinizační etiologie.";
                concMain.push({ type: 'frame', text: finalConc, tableId: 'brain_organ_main' });
            }

            // --- 3. VÝSTUP: BÍLÁ HMOTA ---
            if (bilaHmotaRep.length === 0) {
                reportOut.push({ type: 'frame', text: 'Bez lézí v bílé hmotě.', tableId: 'brain_organ_main', dimmed: true });
            } else {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(bilaHmotaRep)) + '.', tableId: 'brain_organ_main' });
            }

            // --- ATROFIE A KORTEX ---
            let gca = ctx.text('br_gca');
            if (gca && gca !== '0') {
                if (gca === '1') { atrofieSaRep.push('mírné rozšíření kortikálních sulků'); concInc.push({ type: 'frame', text: 'Mírná globální kortikální atrofie (GCA 1).', tableId: 'brain_organ_main' }); }
                if (gca === '2') { atrofieSaRep.push('difuzní atrofie gyrů s rozšířením sulků'); concMain.push({ type: 'frame', text: 'Středně pokročilá globální kortikální atrofie (GCA 2).', tableId: 'brain_organ_main' }); }
                if (gca === '3') { atrofieSaRep.push('výrazná difuzní kortikální atrofie ("knife-blade")'); concMain.push({ type: 'frame', text: 'Pokročilá globální kortikální atrofie (GCA 3).', tableId: 'brain_organ_main' }); }
            }

            let mta = ctx.text('br_mta');
            if (mta && mta !== '0') {
                if (mta === '1') { atrofieSaRep.push('mírné rozšíření choroidálních fisur'); concInc.push({ type: 'frame', text: 'Mírná mediotemporální atrofie (MTA 1).', tableId: 'brain_organ_main' }); }
                if (mta === '2') { atrofieSaRep.push('rozšíření temporálních rohů postranních komor a choroidálních fisur'); concMain.push({ type: 'frame', text: 'Střední mediotemporální atrofie (MTA 2).', tableId: 'brain_organ_main' }); }
                if (mta === '3') { atrofieSaRep.push('výrazný úbytek objemu hipokampů'); concMain.push({ type: 'frame', text: 'Pokročilá mediotemporální atrofie (MTA 3).', tableId: 'brain_organ_main' }); }
                if (mta === '4') { atrofieSaRep.push('těžká atrofie hipokampů s rozsáhlou dilatací temporálních rohů'); concMain.push({ type: 'frame', text: 'Těžká mediotemporální atrofie (MTA 4).', tableId: 'brain_organ_main' }); }
            }

            let koedam = ctx.text('br_koedam');
            if (koedam && koedam !== '0') {
                if (koedam === '1') { atrofieSaRep.push('mírné rozšíření parietálních sulků'); concInc.push({ type: 'frame', text: 'Mírná parietální atrofie (Koedam 1).', tableId: 'brain_organ_main' }); }
                if (koedam === '2') { atrofieSaRep.push('zřetelná atrofie parietálního kortexu a precuneu'); concMain.push({ type: 'frame', text: 'Střední parietální atrofie (Koedam 2).', tableId: 'brain_organ_main' }); }
                if (koedam === '3') { atrofieSaRep.push('výrazná atrofie parietálních laloků'); concMain.push({ type: 'frame', text: 'Výrazná parietální atrofie (Koedam 3).', tableId: 'brain_organ_main' }); }
            }

            let saProstory = ctx.text('br_sa_prostory');
            if (saProstory && saProstory !== '0' && saProstory !== 'přiměřené') {
                if (saProstory === 'zúžené') {
                    atrofieSaRep.push('zúžené SA prostory');
                    concInc.push({ type: 'frame', text: 'Zúžení zevních likvorových prostorů.', tableId: 'brain_organ_main' });
                }
                else if (saProstory === 'vymizelé') {
                    atrofieSaRep.push('vymizelé SA prostory');
                    concMain.push({ type: 'frame', text: 'Vymizení SA prostorů (v.s. při edému mozku).', tableId: 'brain_organ_main' });
                }
                else if (saProstory === 'rozšířené') {
                    atrofieSaRep.push('rozšířené SA prostory');
                }
            }

            // --- 4. VÝSTUP: SA PROSTORY A ATROFIE ---
            if (atrofieSaRep.length === 0) {
                reportOut.push({ type: 'frame', text: 'Subarachnoidální prostory oboustranně šířkou přiměřené k věku.', tableId: 'brain_organ_main', dimmed: true });
            } else {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(atrofieSaRep)) + '.', tableId: 'brain_organ_main' });
            }

            // --- LIKVOR A KOMORY ---
            let komSire = ctx.text('br_kom_sire');
            if (komSire && komSire !== '0' && komSire !== 'štíhlé') {
                if (komSire === 'asym.') komoryRep.push('asymetrie postranních komor');
                else if (komSire === 'mírná dilatace') {
                    komoryRep.push('mírná dilatace komorového systému');
                    concInc.push({ type: 'frame', text: 'Mírná dilatace komorového systému.', tableId: 'brain_organ_main' });
                }
                else if (komSire === 'výrazná dilatace') {
                    komoryRep.push('výrazná dilatace komorového systému');
                    concMain.push({ type: 'frame', text: 'Výrazná dilatace komorového systému.', tableId: 'brain_organ_main' });
                }
            }

            let hydro = ctx.text('br_hydro');
            if (hydro && hydro !== '0') {
                if (hydro === 'e vacuo') {
                    komoryRep.push('rozšíření komor a SA prostorů úměrné úbytku parenchymu');
                    concInc.push({ type: 'frame', text: 'Hydrocefalus ex vacuo v rámci atrofie.', tableId: 'brain_organ_main' });
                } else if (hydro === 'NPH') {
                    komoryRep.push('disproporční dilatace komorového systému, zúžení SA prostorů na konvexitě a rozšíření Sylvijských rýh (obraz DESH)');
                    concMain.push({ type: 'frame', text: 'Obraz suspektní z normotenzního hydrocefalu (NPH).', tableId: 'brain_organ_main' });
                } else if (hydro === 'obstrukční') {
                    komoryRep.push('balónovitá dilatace komor orálně od suspektní překážky s transependymálním prosáknutím a zúžením zevních SA prostorů');
                    concMain.push({ type: 'frame', text: 'Obstrukční hydrocefalus.', tableId: 'brain_organ_main' });
                } else if (hydro === 'komunikující') {
                    komoryRep.push('symetrická dilatace komorového systému s volnou komunikací do zevních SA prostorů bez zjevné překážky');
                    concMain.push({ type: 'frame', text: 'Komunikující hydrocefalus.', tableId: 'brain_organ_main' });
                }
            }

            // --- 5. VÝSTUP: KOMOROVÝ SYSTÉM ---
            if (komoryRep.length === 0) {
                reportOut.push({ type: 'frame', text: 'Komorový systém obvyklé konfigurace, nedilatován.', tableId: 'brain_organ_main', dimmed: true });
            } else {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(komoryRep)) + '.', tableId: 'brain_organ_main' });
            }

            // --- MOSTOMOZEČKOVÝ KOUT (CPA) ---
            const cpaSides = ['r', 'l'];
            cpaSides.forEach(side => {
                const sSuffix = side === 'r' ? 'vpravo' : 'vlevo';
                const sLat = side === 'r' ? 'l.dx.' : 'l.sin.';
                
                let exp = ctx.text(`br_cpa_exp_${side}`);
                if (exp && exp !== '0') {
                    if (exp === 'schwanom') {
                        cpaRep.push(`drobná ložisková expanze ve vchodu do vnitřního zvukovodu ${sSuffix}`);
                        concMain.push({ type: 'frame', text: `Drobné ložisko ve vchodu do vnitřního zvukovodu ${sSuffix} charakteru vestibulárního schwanomu.`, tableId: 'brain_organ_main' });
                    } else if (exp === 'meningeom') {
                        cpaRep.push(`drobná ložisková expanze nasedající na zadní plochu pyramidy ${sSuffix}`);
                        concMain.push({ type: 'frame', text: `Drobné ložisko nasedající na zadní plochu pyramidy ${sSuffix} charakteru meningeomu.`, tableId: 'brain_organ_main' });
                    } else if (exp === 'cysta') {
                        cpaRep.push(`drobná arachnoideální cysta v MMK ${sSuffix}`);
                        concInc.push({ type: 'frame', text: `Drobná arachnoideální cysta v MMK ${sLat}.`, tableId: 'brain_organ_main' });
                    }
                }

                // NV Konflikt
                let kon = ctx.text(`br_cpa_kon_${side}`);
                if (kon && kon !== '0') {
                    const konMap = { 'I': 'kontakt cévy s nervem (Grade I)', 'II': 'dislokace nervu cévní kličkou (Grade II)', 'III': 'imprese nervu cévní kličkou (Grade III)' };
                    cpaRep.push(`${konMap[kon]} v CPA ${sSuffix}`);
                    if (kon === 'I') {
                        concInc.push({ type: 'frame', text: `Neurovaskulární kontakt v CPA ${sLat} bez známek imprese.`, tableId: 'brain_organ_main' });
                    } else {
                        concMain.push({ type: 'frame', text: `Neurovaskulární konflikt v CPA ${sLat} s ${kon === 'II' ? 'dislokací' : 'impresí'} nervu.`, tableId: 'brain_organ_main' });
                    }
                }
            });

            // --- 6. VÝSTUP: MMK A ZVUKOVODY ---
            if (cpaRep.length === 0 && !hasMmkLesion) {
                reportOut.push({ type: 'frame', text: 'Struktury v MMK a vnitřních zvukovodech bez patrné patologie.', tableId: 'brain_organ_main', dimmed: true });
            } else if (cpaRep.length > 0) {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(cpaRep)) + '.', tableId: 'brain_organ_main' });
            }

            // --- SELLA A EPIFÝZA ---
            let sella = ctx.text('br_sella');
            if (sella && sella !== '0') {
                if (sella === 'cysta') {
                    sellaRep.push('drobná cysta v sella turcica v pars intermedia');
                    concInc.push({ type: 'frame', text: 'Intrasellárně drobná cysta rathkeho výchlipky.', tableId: 'brain_organ_main' });
                } else {
                    const sellaMap = { 'partial': 'parciálně prázdná sella', 'empty': 'obraz empty sella' };
                    sellaRep.push(sellaMap[sella]);
                    concInc.push({ type: 'frame', text: `${cap(sellaMap[sella])}.`, tableId: 'brain_organ_main' });
                }
            }

            // --- 7. VÝSTUP: HYPOFÝZA A SELLA ---
            if (sellaRep.length === 0 && !hasSellaLesion) {
                 reportOut.push({ type: 'frame', text: 'Nezvětšená hypofýza uložena v nerozšířeném tureckém sedle.', tableId: 'brain_organ_main', dimmed: true });
            } else if (sellaRep.length > 0) {
                 reportOut.push({ type: 'frame', text: cap(formatCzechList(sellaRep)) + '.', tableId: 'brain_organ_main' });
            }

            let epiRaw = ctx.text('br_epi');
            if (epiRaw && epiRaw !== '0') {
                let size = ctx.field('br_epi_mm');
                let sizeStr = size ? ` vel. ${size} mm` : '';
                if (epiRaw.toLowerCase().includes('cysta')) {
                    epiRep.push(`drobná cysta epifýzy bez abnormit${sizeStr}`);
                    concInc.push({ type: 'frame', text: `Drobná epifyzární cysta${sizeStr}.`, tableId: 'brain_organ_main' });
                } else {
                    epiRep.push(`ložisko epifýzy${sizeStr}`);
                    concInc.push({ type: 'frame', text: `Ložisková léze epifýzy${sizeStr}.`, tableId: 'brain_organ_main' });
                }
            }
            if (epiRep.length > 0) {
                 reportOut.push({ type: 'frame', text: cap(formatCzechList(epiRep)) + '.', tableId: 'brain_organ_main' });
            }

            // --- VLASTNÍ POPIS ---
            let brDesc = ctx.field('br_custom_desc');
            if (brDesc) {
                reportOut.push({ type: 'frame', text: cap(brDesc), tableId: 'brain_organ_main' });
            }

            let brConc = ctx.field('br_custom_conc');
            if (brConc) concInc.push({ type: 'frame', text: brConc, tableId: 'brain_organ_main' });

            // --- WILLISŮV OKRUH A ARTERIE ---
            let vesPat = ctx.text('br_ves_pat');
            if (vesPat && vesPat !== '0') {
                let actVes = [];
                // Nepárové cévy
                if (ctx.isActive('br_ves_acoa')) actVes.push('ACoA');
                if (ctx.isActive('br_ves_ba')) actVes.push('BA');

                // Párové cévy
                const pairedVes = ['aca', 'ica', 'mca', 'acop', 'pca', 'pica', 'va'];
                pairedVes.forEach(v => {
                    let isR = ctx.isActive(`br_ves_${v}_r`);
                    let isL = ctx.isActive(`br_ves_${v}_l`);
                    let r = ctx.text(`br_ves_${v}_r`);
                    let l = ctx.text(`br_ves_${v}_l`);
                    
                    if (isR && isL) {
                        if (r === l) actVes.push(`${r} bilat.`);
                        else actVes.push(`${r} vpravo a ${l} vlevo`);
                    } else if (isR) {
                        actVes.push(`${r} vpravo`);
                    } else if (isL) {
                        actVes.push(`${l} vlevo`);
                    }
                });

                if (actVes.length > 0) {
                    let vStr = actVes.join(' a ');
                    if (actVes.length > 1) vStr = `na rozhraní ${vStr}`;
                    
                    let repText = `${vesPat} ${vStr}`;
                    let vesCust = ctx.field('br_ves_custom_desc');
                    let fullRep = vesCust ? `${repText}, ${vesCust}` : repText;

                    vesRep.push(fullRep);
                    
                    if (['aneurysma', 'stenóza', 'uzávěr'].includes(vesPat)) {
                        concMain.push({ type: 'frame', text: `${cap(repText)}.`, tableId: 'brain_vessels_main' });
                    } else {
                        concInc.push({ type: 'frame', text: `${cap(repText)}.`, tableId: 'brain_vessels_main' });
                    }
                }
            }

            let vesDescOnly = ctx.field('br_ves_custom_desc');
            if (vesDescOnly && (vesPat === '0' || !vesPat)) {
                vesRep.push(vesDescOnly);
            }

            // VÝSTUP: CÉVY (Bez prefixu)
            if (vesRep.length > 0) {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(vesRep)) + '.', tableId: 'brain_vessels_main' });
            }

            let vesConc = ctx.field('br_ves_custom_conc');
            if (vesConc) concInc.push({ type: 'frame', text: vesConc, tableId: 'brain_vessels_main' });

            // --- ORBITY ---
            const checkOrbSide = (baseId) => {
                let r = ctx.isActive(`${baseId}_r`), l = ctx.isActive(`${baseId}_l`);
                if (!r && !l) return null;
                return r && l ? 'bilat.' : (r ? 'vpravo' : 'vlevo');
            };

            let orbItems = [
                { id: 'br_orb_exo', rep: 'exoftalmus {s}', conc: 'Exoftalmus {s}', type: 'inc' },
                { id: 'br_orb_pht', rep: 'phthisis bulbi {s}', conc: 'Phthisis bulbi {s}', type: 'inc' },
                { id: 'br_orb_iol', rep: 'stav po implantaci nitrooční čočky (IOL) {s}', type: null },
                { id: 'br_orb_amo', rep: 'známky odchlípení sítnice {s}', conc: 'Amotio retinae {s}', type: 'main' },
                { id: 'br_orb_no_ztl', rep: 'ztluštění nervus opticus {s}', conc: 'Ztluštění zrakového nervu {s}', type: 'inc' },
                { id: 'br_orb_no_atr', rep: 'atrofie nervus opticus {s}', conc: 'Atrofie zrakového nervu {s}', type: 'inc' },
                { id: 'br_orb_sval', rep: 'ztluštění okohybných svalů {s}', conc: 'Myopatie okohybných svalů {s} (např. v rámci endokrinní orbitopatie)', type: 'inc' },
                { id: 'br_orb_slz_zvet', rep: 'zvětšení slzné žlázy {s}', conc: 'Dakryoadenomegalie {s}', type: 'inc' },
                { id: 'br_orb_slz_res', rep: 'stav po resekci slzné žlázy {s}', type: null }
            ];

            let orbRep = [];
            orbItems.forEach(item => {
                let s = checkOrbSide(item.id);
                if (s) {
                    orbRep.push(item.rep.replace('{s}', s));
                    if (item.type === 'main') concMain.push({ type: 'frame', text: item.conc.replace('{s}', s) + '.', tableId: 'brain_orbits_main' });
                    else if (item.type === 'inc') concInc.push({ type: 'frame', text: item.conc.replace('{s}', s) + '.', tableId: 'brain_orbits_main' });
                }
            });

            let orbDesc = ctx.field('br_orb_custom_desc');
            if (orbDesc) orbRep.push(orbDesc);

            // --- 8. VÝSTUP: ORBITY ---
            if (orbRep.length === 0) {
                reportOut.push({ type: 'frame', text: 'Orbity bez patologie.', tableId: 'brain_orbits_main', dimmed: true });
            } else {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(orbRep)) + '.', tableId: 'brain_orbits_main' });
            }

            // --- SINY (Vedlejší nosní dutiny) ---
            let sinyStates = ctx.mapStates({
                separator: ', ',
                items: [
                    { id: 'sinus_front_r', 1: 'cysta/polyp ve frontálním sinu vpravo', 2: 'hyperplázie sliznic ve frontálním sinu vpravo', 3: 'výrazná hyperplázie sliznic ve frontálním sinu vpravo', 4: 'tekutina ve frontálním sinu vpravo' },
                    { id: 'sinus_front_l', 1: 'cysta/polyp ve frontálním sinu vlevo', 2: 'hyperplázie sliznic ve frontálním sinu vlevo', 3: 'výrazná hyperplázie sliznic ve frontálním sinu vlevo', 4: 'tekutina ve frontálním sinu vlevo' },
                    { id: 'sinus_ethmo_r', 1: 'cysta/polyp v ethmoidálním sinu vpravo', 2: 'hyperplázie sliznic v ethmoidálním sinu vpravo', 3: 'výrazná hyperplázie sliznic v ethmoidálním sinu vpravo', 4: 'tekutina v ethmoidálním sinu vpravo' },
                    { id: 'sinus_ethmo_l', 1: 'cysta/polyp v ethmoidálním sinu vlevo', 2: 'hyperplázie sliznic v ethmoidálním sinu vlevo', 3: 'výrazná hyperplázie sliznic v ethmoidálním sinu vlevo', 4: 'tekutina v ethmoidálním sinu vlevo' },
                    { id: 'sinus_sfeno_r', 1: 'cysta/polyp ve sfenoidálním sinu vpravo', 2: 'hyperplázie sliznic ve sfenoidálním sinu vpravo', 3: 'výrazná hyperplázie sliznic ve sfenoidálním sinu vpravo', 4: 'tekutina ve sfenoidálním sinu vpravo' },
                    { id: 'sinus_sfeno_l', 1: 'cysta/polyp ve sfenoidálním sinu vlevo', 2: 'hyperplázie sliznic ve sfenoidálním sinu vlevo', 3: 'výrazná hyperplázie sliznic ve sfenoidálním sinu vlevo', 4: 'tekutina ve sfenoidálním sinu vlevo' },
                    { id: 'sinus_maxil_r', 1: 'cysta/polyp v maxilárním sinu vpravo', 2: 'hyperplázie sliznic v maxilárním sinu vpravo', 3: 'výrazná hyperplázie sliznic v maxilárním sinu vpravo', 4: 'tekutina v maxilárním sinu vpravo' },
                    { id: 'sinus_maxil_l', 1: 'cysta/polyp v maxilárním sinu vlevo', 2: 'hyperplázie sliznic v maxilárním sinu vlevo', 3: 'výrazná hyperplázie sliznic v maxilárním sinu vlevo', 4: 'tekutina v maxilárním sinu vlevo' }
                ]
            });
            let sinyCustomDesc = ctx.field('sinus_custom_desc');
            let sinyParts = [];
            if (sinyStates) sinyParts.push(sinyStates);
            if (sinyCustomDesc) sinyParts.push(sinyCustomDesc);
            
            // --- 10. VÝSTUP: SINY ---
            if (sinyParts.length === 0) {
                reportOut.push({ type: 'frame', text: 'Dutiny vzdušné.', tableId: 'brain_sinus_main', dimmed: true });
            } else {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(sinyParts)) + '.', tableId: 'brain_sinus_main' });
            }

            const sinusItems = [
                { id: 'sinus_front_r', text: 've frontálním sinu vpravo' },
                { id: 'sinus_front_l', text: 've frontálním sinu vlevo' },
                { id: 'sinus_ethmo_r', text: 'v ethmoidálním sinu vpravo' },
                { id: 'sinus_ethmo_l', text: 'v ethmoidálním sinu vlevo' },
                { id: 'sinus_sfeno_r', text: 've sfenoidálním sinu vpravo' },
                { id: 'sinus_sfeno_l', text: 've sfenoidálním sinu vlevo' },
                { id: 'sinus_maxil_r', text: 'v maxilárním sinu vpravo' },
                { id: 'sinus_maxil_l', text: 'v maxilárním sinu vlevo' }
            ];
            
            let sinyConcStr = ctx.mapConditions([
                { states: [3], prefix: 'Chronická sinusitis (', suffix: ').', separator: ', ', items: sinusItems },
                { states: [4], prefix: 'Akutní sinusitis (', suffix: ').', separator: ', ', items: sinusItems }
            ]).trim();
            let customSinusConc = ctx.field('sinus_custom_conc');
            if (sinyConcStr || customSinusConc) {
                let s = [sinyConcStr, customSinusConc].filter(Boolean).join('\n');
                concInc.push({ type: 'frame', text: s, tableId: 'brain_sinus_main' });
            }

            // --- UŠI A MASTOIDY ---
            let uchoRep = [];
            const earItems = [
                { id: 'ucho_stred', loc: 'středouší' },
                { id: 'ucho_mast', loc: 'mastoidy' }
            ];

            earItems.forEach(item => {
                let r = ctx.text(`${item.id}_r`), l = ctx.text(`${item.id}_l`);
                if ((!r || r === '0') && (!l || l === '0')) return;

                const makeEarText = (state, side) => {
                    let textR = '', textC = '', typeC = 'incidental';
                    const sideL = side === 'vpravo' ? 'l.dx.' : (side === 'vlevo' ? 'l.sin.' : 'bilat.');
                    
                    if (item.loc === 'středouší') {
                        if (state === 'tekutina') { textR = `tekutina ve středoušní dutině ${side}`; textC = `Fluidotympanum ${sideL}.`; }
                        else if (state === 'zastření') { textR = `zastření středoušní dutiny ${side}`; textC = `Zánětlivé změny středouší ${sideL}.`; }
                        else if (state === 'sklerotizace') { textR = `chronické sklerotické změny středouší ${side}`; textC = `Chronické změny středouší ${sideL}.`; }
                        else if (state === 'defekt') { textR = `stav po operaci středouší ${side}`; textC = ``; typeC = null; }
                    } else if (item.loc === 'mastoidy') {
                        if (state === 'tekutina') { textR = `tekutina v mastoidálních sklípcích ${side}`; textC = `Fluidomastoid ${sideL}.`; }
                        else if (state === 'zastření') { textR = `snížená vzdušnost až zastření mastoidálních sklípků ${side}`; textC = `Mastoiditis ${sideL}.`; typeC = 'main'; }
                        else if (state === 'sklerotizace') { textR = `sklerotizace mastoidálních sklípků ${side}`; textC = `Chronická mastoiditis ${sideL}.`; }
                        else if (state === 'defekt') { textR = `stav po mastoidektomii ${side}`; textC = ``; typeC = null; }
                    }
                    return { textR, textC, typeC };
                };

                if (r === l && r !== '0') {
                    const t = makeEarText(r, 'bilat.');
                    uchoRep.push(t.textR);
                    if (t.typeC === 'main') concMain.push({ type: 'frame', text: t.textC, tableId: 'brain_sinus_main' });
                    else if (t.typeC === 'incidental') concInc.push({ type: 'frame', text: t.textC, tableId: 'brain_sinus_main' });
                } else {
                    if (r && r !== '0') {
                        const t = makeEarText(r, 'vpravo');
                        uchoRep.push(t.textR);
                        if (t.typeC === 'main') concMain.push({ type: 'frame', text: t.textC, tableId: 'brain_sinus_main' });
                        else if (t.typeC === 'incidental') concInc.push({ type: 'frame', text: t.textC, tableId: 'brain_sinus_main' });
                    }
                    if (l && l !== '0') {
                        const t = makeEarText(l, 'vlevo');
                        uchoRep.push(t.textR);
                        if (t.typeC === 'main') concMain.push({ type: 'frame', text: t.textC, tableId: 'brain_sinus_main' });
                        else if (t.typeC === 'incidental') concInc.push({ type: 'frame', text: t.textC, tableId: 'brain_sinus_main' });
                    }
                }
            });

            // --- 9. VÝSTUP: UŠI A MASTOIDY ---
            if (uchoRep.length === 0) {
                reportOut.push({ type: 'frame', text: 'Mastoideální sklípky vzdušné.', tableId: 'brain_sinus_main', dimmed: true });
            } else {
                reportOut.push({ type: 'frame', text: cap(formatCzechList(uchoRep)) + '.', tableId: 'brain_sinus_main' });
            }

            return { report: reportOut, conclusion: { main: concMain, incidental: concInc } };
        }
    },

    neck: RegionNeck,

    thorax: {
        title: 'Hrudník',
        layout: (helpers) => {
            let layoutNodes = [];

            const lesInsts = Store.instances?.['thorax_lesion_main'] || [];
            lesInsts.forEach((instId, idx) => {
                const p = `tl_${instId}`;
                layoutNodes.push(
                    helpers.LesionMain(`thorax_lesion_main__${instId}`, `Léze (${idx + 1})`, [
                        ...LESIONS_DEFINITION.getLesionRowsPre(helpers, p, 'konsolidace'),
                        helpers.Table3colRCL(`${p}_r3`, 'Lokalizace', [
                            [ { btn: `${p}_p_pulm_r`, states: ['0', '+'] }, 'plíce', { btn: `${p}_p_pulm_l`, states: ['0', '+'] } ],
                            [ { btn: `${p}_p_hl_r`, states: ['0', '+', 'S1', 'S2', 'S3'] }, 'horní lalok', { btn: `${p}_p_hl_l`, states: ['0', '+', 'S1', 'S2', 'S3'] } ],
                            [ { btn: `${p}_p_sl_r`, states: ['0', '+', 'S4', 'S5'] }, 'střední lalok / lingula', { btn: `${p}_p_sl_l`, states: ['0', '+', 'S4', 'S5'] } ],

        compile: (ctx) => {
            let reportOut = [{ type: 'heading', text: 'Hrudník:', action: 'open-region', regionId: 'thorax' }];
            let concMain = [];
            let concInc = [];
            
            const examId = Store.activeTab || 'default';
            const formatList = formatCzechList;
            const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);

            const isPET = (examId || '').toLowerCase().includes('pet');

            const lesInsts = Store.instances?.['thorax_lesion_main'] || [];
            let highAct = false, badEtio = false;
            lesInsts.forEach(id => {
                if (['intermediární', 'zvýšená', 'vysoká'].includes(ctx.text(`tl_${id}_met_act`, true))) highAct = true;
                if (!ctx.isActive(`tl_${id}_e_b`) && !ctx.isActive(`tl_${id}_e_inf`)) badEtio = true;
            });

            if (lesInsts.length === 0 || (lesInsts.length > 0 && isPET && !highAct)) {
                reportOut.push({ type: 'frame', text: isPET ? 'Bez patrných hyperakumulujících ložiskových změn.' : 'Bez patrných ložiskových změn.', tableId: 'thorax_lesion_main', dimmed: true });
            }

            lesInsts.forEach(instId => {
                const p = `tl_${instId}`;
                    let lokace = [];
                    const lokItems = [
                        { id: 'hl', name: 'v horním laloku' }, 
                        { id: 'sl', name: 've středním laloku / lingule' }, 
                        { id: 'dl', name: 'v dolním laloku' },
                        { id: 'pl', name: 'pleurálně' }, 
                        { id: 'sw', name: 'v hrudní stěně' }, 
                        { id: 'ma', name: 'v mammě' },
                        { id: 'th', name: 'v thymu' }
                    ];
                    lokItems.forEach(l => {
                        let r = ctx.isActive(`${p}_p_${l.id}_r`), left = ctx.isActive(`${p}_p_${l.id}_l`);
                        if (r || left) {
                            let segR = r && ctx.text(`${p}_p_${l.id}_r`) !== '+' ? ` (${ctx.text(`${p}_p_${l.id}_r`)})` : '';
                            let segL = left && ctx.text(`${p}_p_${l.id}_l`) !== '+' ? ` (${ctx.text(`${p}_p_${l.id}_l`)})` : '';
                            if (r && left) lokace.push(`${l.name}${segR} bilat.`);
                            else if (r) lokace.push(`${l.name}${segR} vpravo`);
                            else if (left) lokace.push(`${l.name}${segL} vlevo`);
                        }
                    });
                    
                    if (ctx.isActive(`${p}_p_pulm_r`) && ctx.isActive(`${p}_p_pulm_l`)) lokace.push('v plicích bilat.');
                    else if (ctx.isActive(`${p}_p_pulm_r`)) lokace.push('v pravé plíci');
                    else if (ctx.isActive(`${p}_p_pulm_l`)) lokace.push('v levé plíci');
                    
                    if (ctx.isActive(`${p}_p_ji`)) {
                        let jiVal = ctx.text(`${p}_p_ji`);
                        if (jiVal === 'horní') lokace.push('v horním jícnu');
                        else if (jiVal === 'střední') lokace.push('ve středním jícnu');
                        else if (jiVal === 'dolní') lokace.push('v dolním jícnu');
                    }

                    let lokText = lokace.length > 0 ? formatCzechList(lokace) : '';
                    
                    let d = LESIONS_DEFINITION.parseDetails(ctx, examId, 'thorax', p, `${p}_met`, `${p}_e`, false);

                    if (d.hasAny || lokace.length > 0) {
                        let repSentence = `${d.baseText} ${lokText}${d.vzhledText}${d.metrikyStr}${d.doplneniStr}.`.replace(/\s+/g, ' ').replace(' .', '.');
                        reportOut.push({ type: 'frame', text: repSentence, tableId: `thorax_lesion_main__${instId}` });
                        
                        let concSentence = `${d.baseText} ${lokText}${d.actStr}${d.dynStr}`;
                        if (d.etioStr) concSentence += `: ${d.etioStr}.`;
                        else concSentence += `.`;
                        
                        concSentence = concSentence.replace(/\s+/g, ' ').replace(' : ', ': ').replace(' .', '.');
                        concMain.push({ type: 'frame', text: concSentence, tableId: `thorax_lesion_main__${instId}` });
                    }
                });

            if (lesInsts.length > 0 && (!isPET || highAct) && !badEtio) {
                reportOut.push({ type: 'frame', text: 'Jinak bez patrných ložiskových změn.', tableId: 'thorax_lesion_main', dimmed: true });

                    if (ctx.isActive(`${p}_p_2_l`)) activeRegs.push('2L');

                    if (ctx.isActive(`${p}_p_4_r`)) activeRegs.push('4R');
                    if (ctx.isActive(`${p}_p_4_l`)) activeRegs.push('4L');
                    if (ctx.isActive(`${p}_p_5_c`)) activeRegs.push('5');

                    if (im_r && im_l) lokaceLN.push('interní mammární bilat.');
                    else if (im_r) lokaceLN.push('interní mammární vpravo');
                    else if (im_l) lokaceLN.push('interní mammární vlevo');

                    let dLN = LESIONS_DEFINITION.parseDetails(ctx, examId, 'thorax', p, `${p}_met`, `${p}_e`, true);

                    if (dLN.hasAny || lokaceLN.length > 0) {
                        let repSentence = `${dLN.baseText} ${lokTextLN}${dLN.vzhledText}${dLN.metrikyStr}${dLN.doplneniStr}.`.replace(/\s+/g, ' ').replace(' .', '.');
                        reportOut.push({ type: 'frame', text: repSentence, tableId: `thorax_lymphnode_main__${instId}` });

                        else concSentence += `.`;

                        concMain.push({ type: 'frame', text: concSentence, tableId: `thorax_lymphnode_main__${instId}` });

                concInc.push({ type: 'frame', text: fibConcText, tableId: 'thorax_plice_main' }); 
            }
            
            let emf = ctx.text('pl_emf'), emfLoc = ctx.text('pl_emf_loc');
            if (emf && emf !== '0') { 
                pliceRep.push(`${emf} emfyzém${emfLoc !== '0' ? ' ' + emfLoc : ''}`); 
                concInc.push({ type: 'frame', text: `${cap(emf)} plicní emfyzém.`, tableId: 'thorax_plice_main' });

        compile: (ctx) => {
            let reportOut = [{ type: 'heading', text: 'Břicho:', action: 'open-region', regionId: 'abdomen' }];
            let concMain = [];
            let concInc = [];
            
            const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
            const formatList = formatCzechList;
            const examId = Store.activeTab || 'default';

            // Generic helper for R/L elements
            const checkSide = (baseId) => {
                let p = ctx.text(`${baseId}_r`), l = ctx.text(`${baseId}_l`);
                if ((!p || p === '0') && (!l || l === '0')) return null;
                let isP = p && p !== '0', isL = l && l !== '0';
                return { p, l, isP, isL, sideText: (isP && isL) ? 'bilat.' : (isP ? 'vpravo' : 'vlevo'), isPlural: (p === 'více' || l === 'více' || (isP && isL)) };
            };

            const isPET = (examId || '').toLowerCase().includes('pet');

            const lesInsts = Store.instances?.['abdomen_lesion_main'] || [];
            let highAct = false, badEtio = false;
            lesInsts.forEach(id => {
                if (['intermediární', 'zvýšená', 'vysoká'].includes(ctx.text(`al_${id}_met_act`, true))) highAct = true;
                if (!ctx.isActive(`al_${id}_e_b`) && !ctx.isActive(`al_${id}_e_inf`)) badEtio = true;
            });

            if (lesInsts.length === 0 || (lesInsts.length > 0 && isPET && !highAct)) {
                reportOut.push({ type: 'frame', text: isPET ? 'Bez patrných hyperakumulujících ložiskových změn.' : 'Bez patrných ložiskových změn.', tableId: 'abdomen_lesion_main', dimmed: true });
            }

            lesInsts.forEach(instId => {
                const p = `al_${instId}`;
                    let lokace = [];
                    
                    let ja = ctx.text(`${p}_p_ja`);
                    let segs = [];
                    ['s1', 's2', 's3', 's4a', 's4b', 's5', 's6', 's7', 's8'].forEach(s => {
                        if (ctx.isActive(`${p}_p_ja_${s}`)) segs.push(s.toUpperCase());
                    });
                    let vse = ctx.isActive(`${p}_p_ja_vse`);

                    if (ja === 'pravý l.') lokace.push('v pravém laloku jater');
                    else if (ja === 'levý l.') lokace.push('v levém laloku jater');
                    else if (ja === '+') lokace.push('jater');

                    if (vse) lokace.push('ve všech segmentech jater');
                    else if (segs.length > 0) lokace.push(`v ${segs.join(', ')} jater`);

                    let zl = ctx.text(`${p}_p_zl`);
                    if (zl === '+') lokace.push('stěny žlučníku');
                    else if (zl === 'fundus') lokace.push('fundu žlučníku');
                    else if (zl === 'tělo') lokace.push('těla žlučníku');

                    }
                }
            };

            processHernia('aw_her_scar', 'v jizvě', 'Hernie v jizvě');
            processHernia('aw_her_supra', 'supraumbilikálně', 'Supraumbilikální hernie');

        compile: (ctx) => {
            let reportOut = [{ type: 'heading', text: 'Skelet:', action: 'open-region', regionId: 'skeleton' }];
            let concMain = [];
            let concInc = [];
            
            const examId = Store.activeTab || 'default';
            const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
            const formatList = formatCzechList;

            // --- LÉZE ---
            const isPET = (examId || '').toLowerCase().includes('pet');

            const lesInsts = Store.instances?.['skeleton_lesion_main'] || [];
            let highAct = false, badEtio = false;
            lesInsts.forEach(id => {
                if (['intermediární', 'zvýšená', 'vysoká'].includes(ctx.text(`l_${id}_met_act`, true))) highAct = true;
                if (!ctx.isActive(`l_${id}_e_b`) && !ctx.isActive(`l_${id}_e_inf`)) badEtio = true;
            });

            if (lesInsts.length === 0 || (lesInsts.length > 0 && isPET && !highAct)) {
                reportOut.push({ type: 'frame', text: isPET ? 'Bez patrných hyperakumulujících ložiskových změn.' : 'Bez patrných ložiskových změn.', tableId: 'skeleton_lesion_main', dimmed: true });
            }

            lesInsts.forEach(instId => {
                const p = `l_${instId}`;
                    let lokace = [];
                    
                    if (ctx.isActive(`${p}_p_cely`)) lokace.push('v celém skeletu');
                    if (ctx.isActive(`${p}_p_dren`)) lokace.push('v kostní dřeni');
                    
                    const parseVert = (suffix) => {
                        const localId = `${p}_${suffix}`;
                        const idx = ctx._val(localId) || 0;
                        if (idx === 0) return null;
                        const txt = ctx.text(localId);
                        if (txt === 'custom') return Store.customTexts[`${examId}_skeleton_${localId}`];
                        return `v obratli ${txt}`;
                    };

                    let cO = parseVert('p_c_obr'); if (cO) lokace.push(cO);
                    let tO = parseVert('p_t_obr'); if (tO) lokace.push(tO);
                    let lO = parseVert('p_l_obr'); if (lO) lokace.push(lO);
                    
                    if (ctx.isActive(`${p}_p_sakrum`)) lokace.push('v sakru');
                    if (ctx.isActive(`${p}_p_sternum`)) lokace.push('ve sternu');

                    const addBilat = (id, sR, sL, sB) => {
                        let r = ctx.isActive(`${p}_p_${id}_r`), l = ctx.isActive(`${p}_p_${id}_l`);
                        if (r && l) lokace.push(sB);
                        else if (r) lokace.push(sR);
                        else if (l) lokace.push(sL);
                    };

                    addBilat('klav', 'v pravé klavikule', 'v levé klavikule', 'v klavikulách bilat.');
                    addBilat('scap', 'v pravé lopatce', 'v levé lopatce', 'v lopatkách bilat.');
                    addBilat('hum', 'v pravém humeru', 'v levém humeru', 'v humerech bilat.');
                    
                    const parseZebro = (side) => {
                        const localId = `${p}_p_zeb_${side}`;
                        const idx = ctx._val(localId) || 0;
                        if (idx === 0) return null;
                        const txt = ctx.text(localId);
                        const suffix = side === 'r' ? 'vpravo' : 'vlevo';
                        if (txt === 'custom') return Store.customTexts[`${examId}_skeleton_${localId}`];
                        return `v ${txt} žebru ${suffix}`;
                    };

                    let zR = parseZebro('r'), zL = parseZebro('l');
                    if (zR && zL && ctx.text(`${p}_p_zeb_r`) === ctx.text(`${p}_p_zeb_l`)) {
                        const val = ctx.text(`${p}_p_zeb_r`);
                        lokace.push(val === 'custom' ? Store.customTexts[`${examId}_skeleton_${p}_p_zeb_r`] : `v ${val} žebru bilat.`);
                    } else {
                        if (zR) lokace.push(zR);
                        if (zL) lokace.push(zL);
                    }

                    addBilat('kyc', 'v pravé kyčelní kosti', 'v levé kyčelní kosti', 'v kyčelních kostech bilat.');
                    addBilat('sed', 'v pravé sedací kosti', 'v levé sedací kosti', 'v sedacích kostech bilat.');
                    addBilat('styd', 'v pravé stydké kosti', 'v levé stydké kosti', 've stydkých kostech bilat.');
                    addBilat('fem', 'v pravém femuru', 'v levém femuru', 've femurech bilat.');
                    addBilat('mek', 'v měkkých tkáních vpravo', 'v měkkých tkáních vlevo', 'v měkkých tkáních bilat.');

                    let lokText = lokace.length > 0 ? formatList(lokace) : '';
                    let d = LESIONS_DEFINITION.parseDetails(ctx, examId, 'skeleton', p, `${p}_met`, `${p}_e`, false);

                    if (d.hasAny || lokace.length > 0) {
                        let repSentence = `${d.baseText} ${lokText}${d.vzhledText}${d.metrikyStr}${d.doplneniStr}.`.replace(/\s+/g, ' ').replace(' .', '.').trim();
                        reportOut.push({ type: 'frame', text: repSentence, tableId: `skeleton_lesion_main__${instId}` });
                        
                        let concSentence = `${d.baseText} ${lokText}${d.actStr}${d.dynStr}`;
                        if (d.etioStr) concSentence += `: ${d.etioStr}.`;
                        else concSentence += `.`;
                        
                        concSentence = concSentence.replace(/\s+/g, ' ').replace(' : ', ': ').replace(' .', '.').trim();
                        concMain.push({ type: 'frame', text: concSentence, tableId: `skeleton_lesion_main__${instId}` });
                    }
                });

            if (lesInsts.length > 0 && (!isPET || highAct) && !badEtio) {
                reportOut.push({ type: 'frame', text: 'Jinak bez patrných ložiskových změn.', tableId: 'skeleton_lesion_main', dimmed: true });
            }

            // --- KOSTNÍ DŘEŇ ---
            let marrow = [];
            if (ctx.isActive('sk_md_akt')) marrow.push("difuzně zvýšená akumulace RF při aktivaci");
            if (ctx.isActive('sk_md_neakt')) marrow.push("lokálně snížená akumulace RF po ozáření");
            let enost = ctx.text('sk_md_enost');
            if (enost === '1') marrow.push("drobný sklerotický okrsek (enostóza)");
            else if (enost === 'více') marrow.push("drobné sklerotické okrsky (enostózy)");
            if (marrow.length > 0) {
                reportOut.push({ type: 'frame', text: `- Kostní dřeň: ${cap(formatList(marrow))}.`, tableId: 'skeleton_marrow' });
            }

            // --- DEGENERACE & ZÁNĚT ---
            const processDegInflam = (pfx, isDeg) => {
                let locs = [];
                if (ctx.isActive(`${pfx}_c_pat`)) locs.push(isDeg ? 'krční páteře' : 'krční páteř');
                if (ctx.isActive(`${pfx}_t_pat`)) locs.push(isDeg ? 'hrudní páteře' : 'hrudní páteř');
                if (ctx.isActive(`${pfx}_l_pat`)) locs.push(isDeg ? 'bederní páteře' : 'bederní páteř');

                const addBilatDI = (id, baseR, baseL, baseB) => {
                    let r = ctx.isActive(`${pfx}_${id}_r`), l = ctx.isActive(`${pfx}_${id}_l`);
                    if (r && l) locs.push(baseB);
                    else if (r) locs.push(baseR);
                    else if (l) locs.push(baseL);
                };

                addBilatDI('ac', 'AC skloubení vpravo', 'AC skloubení vlevo', 'AC skloubení bilat.');
                addBilatDI('si', 'SI skloubení vpravo', 'SI skloubení vlevo', 'SI skloubení bilat.');
                
                if (isDeg) {
                    addBilatDI('ram', 'ramenního kloubu vpravo', 'ramenního kloubu vlevo', 'ramenních kloubů bilat.');
                    addBilatDI('kyc', 'kyčelního kloubu vpravo', 'kyčelního kloubu vlevo', 'kyčelních kloubů bilat.');
                } else {
                    addBilatDI('ram', 'ramenní kloub vpravo', 'ramenní kloub vlevo', 'ramenní klouby bilat.');
                    addBilatDI('kyc', 'kyčelní kloub vpravo', 'kyčelní kloub vlevo', 'kyčelní klouby bilat.');
                }

                if (locs.length > 0) {
                    const locsStr = formatList(locs);
                    if (isDeg) {
                        const degText = `Pokročilé degenerativní změny ${locsStr}.`;
                        reportOut.push({ type: 'frame', text: `- Degenerace: ${degText}`, tableId: 'skeleton_degen' });
                        concInc.push({ type: 'frame', text: degText, tableId: 'skeleton_degen' });
                    } else {
                        reportOut.push({ type: 'frame', text: `- Zánět: ${cap(locsStr)} se zvýšenou aktivitou okolních měkkých tkání v rámci nespec. zánětlivých změn.`, tableId: 'skeleton_inflam' });
                    }
                }
            };
            processDegInflam('sk_dg', true);
            processDegInflam('sk_za', false);

            // --- SYSTÉMOVÉ PROCESY ---
            if (ctx.isActive('sk_sy_dish')) {
                reportOut.push({ type: 'frame', text: `- Systémové procesy: Osifikace v oblasti předního longitudinálního lig. páteře, nejvýrazněji v thorakálním úseku, s tvorbou osteofytů. Zachovaná výška meziobratlových plotének a bez známek erozí SI či sakroiliitidy. Osifikační změny v oblasti entézí pánevního skeletu.`, tableId: 'skeleton_systemic' });
                concInc.push({ type: 'frame', text: "Strukturální změny skeletu obrazu DISH.", tableId: 'skeleton_systemic' });
            }
            if (ctx.isActive('sk_sy_bech')) {
                reportOut.push({ type: 'frame', text: `- Systémové procesy: Změny v oblasti sakroiliakálních kloubů, bilaterálně, s ankylózou. Osifikace zejména předních longitudinálních ligament a interspinozní úponů.`, tableId: 'skeleton_systemic' });
                concMain.push({ type: 'frame', text: "Obraz suspektní ze spondyloartritidy charakteru m. Bechtěrev. Bilaterální sakroiliitida, entezopatie axiálního skeletu.", tableId: 'skeleton_systemic' });
            }
            if (ctx.isActive('sk_sy_poly')) {
                reportOut.push({ type: 'frame', text: `- Systémové procesy: Zvýšená akumulace RF v oblastech ramenních, SC, AC, kyčelních kloubech, při symfýze, velkých trochanterech, interspinózně.`, tableId: 'skeleton_systemic' });
                concMain.push({ type: 'frame', text: "Obraz suspektní z polymyalgia rheumatica. Zvýšená metabolická aktivita v mnohočetných kloubních lokalizacích a při šlachových úponech v rámci burzitis, entezitis a synovitis.", tableId: 'skeleton_systemic' });
            }

            // --- TRAUMA ---
            const processTrauma = (pfx, isAcute) => {
                let locsVert = [];
                let locsOther = [];

                const parseVert = (idSuffix) => {
                    const txt = ctx.text(`${pfx}_${idSuffix}`);
                    if (txt && txt !== '0' && !txt.includes('obratel')) {
                        locsVert.push(txt === 'custom' ? ctx.field(`${pfx}_${idSuffix}`) || 'vlastní' : txt);
                    }
                };
                parseVert('c_obr');
                parseVert('t_obr');
                parseVert('l_obr');

                if (ctx.isActive(`${pfx}_sakrum`)) locsOther.push('kosti křížové');
                if (ctx.isActive(`${pfx}_sternum`)) locsOther.push('sterna');

                const addBilatTrauma = (id, baseName) => {
                    let r = ctx.isActive(`${pfx}_${id}_r`), l = ctx.isActive(`${pfx}_${id}_l`);
                    if (r && l) locsOther.push(`${baseName} bilat.`);
                    else if (r) locsOther.push(`${baseName} vpravo`);
                    else if (l) locsOther.push(`${baseName} vlevo`);
                };

                addBilatTrauma('klav', 'klavikuly');
                addBilatTrauma('scap', 'lopatky');
                addBilatTrauma('hum', 'prox. humeru');
                addBilatTrauma('kyc', 'kosti kyčelní');
                addBilatTrauma('sed', 'kosti sedací');
                addBilatTrauma('styd', 'kosti stydké');
                addBilatTrauma('fem', 'prox. femuru');

                let zR = ctx.text(`${pfx}_zeb_r`), zL = ctx.text(`${pfx}_zeb_l`);
                let rAct = zR && zR !== '0' && zR !== 'žebro';
                let lAct = zL && zL !== '0' && zL !== 'žebro';
                
                if (rAct && lAct && zR === zL) {
                    locsOther.push(`${zR} žebra bilat.`);
                } else {
                    if (rAct) locsOther.push(`${zR} žebra vpravo`);
                    if (lAct) locsOther.push(`${zL} žebra vlevo`);
                }

                if (locsVert.length > 0 || locsOther.length > 0) {
                    let repParts = [];
                    let conclParts = [];

                    if (locsVert.length > 0) {
                        const vertStr = formatList(locsVert);
                        const telWord = (locsVert.length > 1 || vertStr.includes(' a ') || vertStr.includes(',')) ? 'těl' : 'těla';
                        if (isAcute) {
                            repParts.push(`klínovité snížení obratl. ${telWord} ${vertStr}`);
                            conclParts.push(`Kompresivní fraktura obratl. ${telWord} ${vertStr}.`);
                        } else {
                            const txt = `stav po starší kompresi obratl. ${telWord} ${vertStr}`;
                            repParts.push(txt);
                            conclParts.push(cap(txt) + '.');
                        }
                    }

                    if (locsOther.length > 0) {
                        const otherStr = formatList(locsOther);
                        if (isAcute) {
                            repParts.push(`fraktura ${otherStr}`);
                            conclParts.push(`Fraktura ${otherStr}.`);
                        } else {
                            const txt = `stav po starší fraktuře ${otherStr}`;
                            repParts.push(txt);
                            conclParts.push(cap(txt) + '.');
                        }
                    }

                    reportOut.push({ type: 'frame', text: `- ${isAcute ? 'Akutní' : 'Chronické'} trauma: ${cap(repParts.join(', '))}.`, tableId: `skeleton_${isAcute ? 'acute' : 'chronic'}` });
                    conclParts.forEach(c => concInc.push({ type: 'frame', text: c, tableId: `skeleton_${isAcute ? 'acute' : 'chronic'}` }));
                }
            };
            
            processTrauma('sk_ta', true);
            processTrauma('sk_tc', false);

            let skDesc = ctx.field('sk_custom_desc'); 
            if (skDesc) reportOut.push({ type: 'frame', text: `- Ostatní: ${skDesc}`, tableId: 'skeleton_ostatni' });
            
            let skConc = ctx.field('sk_custom_conc'); 
            if (skConc) concInc.push({ type: 'frame', text: skConc, tableId: 'skeleton_ostatni' });

            return { report: reportOut, conclusion: { main: concMain, incidental: concInc } };
        }
    }
}; // <-- Tohle už je uzavření celého REGIONS objektu

function el(tag, attrs = {}, children = []) {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
        if (k === 'className') node.className = v;
        else if (k.startsWith('data-')) node.setAttribute(k, v);
        else node[k] = v;
    }
    for (const child of children)
        node.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
    return node;
}

function focusInput(id) {
